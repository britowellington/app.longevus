  <script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const SUPA_URL = "https://jpduxfbigcdxmtcozqpp.supabase.co";
const SUPA_KEY = "sb_publishable_VZSgcxu5ps3eR9UAjuRr4Q_B65WTx_h";
const supa = window.supabase.createClient(SUPA_URL, SUPA_KEY);

async function authHeaders() {
  const { data } = await supa.auth.getSession();
  const token = data?.session?.access_token || SUPA_KEY;
  return { "apikey": SUPA_KEY, "Authorization": "Bearer "+token, "Content-Type": "application/json" };
}

const Login = ({ onLogin }) => {
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);
  const submit = async (e) => {
    e.preventDefault();
    setError(""); setLoading(true);
    try {
      const { error } = await supa.auth.signInWithPassword({ email, password });
      if (error) throw error;
      onLogin();
    } catch(err) {
      setError(err.message || "Erro ao autenticar.");
    } finally {
      setLoading(false);
    }
  };
  return (
    <div style={{ minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f8fafc",padding:20,fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" }}>
      <form onSubmit={submit} style={{ background:"#fff",borderRadius:16,padding:28,width:"100%",maxWidth:380,boxShadow:"0 4px 24px rgba(0,0,0,0.06)" }}>
        <div style={{ textAlign:"center",marginBottom:18 }}>
          <img src={__LOGO_1__} alt="Longevus" style={{ width:56,height:56,margin:"0 auto 8px",display:"block" }}/>
          <div style={{ fontWeight:900,fontSize:20 }}>Longevus Admin</div>
          <div style={{ fontSize:12,color:"#94a3b8" }}>Painel administrativo</div>
        </div>
        <div style={{ marginBottom:12 }}>
          <label style={{ fontSize:12,fontWeight:600,color:"#475569",display:"block",marginBottom:4 }}>E-mail</label>
          <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} style={{ width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:14,boxSizing:"border-box" }}/>
        </div>
        <div style={{ marginBottom:16 }}>
          <label style={{ fontSize:12,fontWeight:600,color:"#475569",display:"block",marginBottom:4 }}>Senha</label>
          <input type="password" required value={password} onChange={e=>setPassword(e.target.value)} style={{ width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:14,boxSizing:"border-box" }}/>
        </div>
        {error && <div style={{ fontSize:12,color:"#dc2626",marginBottom:12,textAlign:"center" }}>{error}</div>}
        <button type="submit" disabled={loading} style={{ width:"100%",padding:"11px",borderRadius:8,border:"none",background:"#FF5603",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",opacity:loading?0.7:1 }}>
          {loading ? "Aguarde..." : "Entrar"}
        </button>
      </form>
    </div>
  );
};

const BarChart = ({ data, color="#FF5603", onBarClick, selected }) => {
  const max = Math.max(1, ...data.map(d=>d.value));
  return (
    <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
      {data.map(d=>(
        <div key={d.label} onClick={()=>onBarClick && onBarClick(d.label)} style={{ cursor:onBarClick?"pointer":"default",opacity: (selected && selected!==d.label) ? 0.45 : 1 }}>
          <div style={{ display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3 }}>
            <span style={{ color: selected===d.label ? "#FF5603" : "#475569",fontWeight:600 }}>{d.label}</span>
            <span style={{ color:"#94a3b8" }}>{d.value}</span>
          </div>
          <div style={{ background:"#f1f5f9",borderRadius:6,height:8,overflow:"hidden" }}>
            <div style={{ background:d.color||color,height:"100%",width:(d.value/max*100)+"%",borderRadius:6,transition:"width 0.3s" }}/>
          </div>
        </div>
      ))}
    </div>
  );
};

const ProfList = ({ items, onSelect, counts }) => (
  <div style={{ display:"flex",flexDirection:"column",gap:6,marginTop:12,borderTop:"1px solid #f1f5f9",paddingTop:12 }}>
    {items.length===0 ? (
      <div style={{ fontSize:12,color:"#94a3b8" }}>Nenhum profissional nesse grupo.</div>
    ) : items.map(p=>(
      <div key={p.id} onClick={()=>onSelect(p)} style={{ cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:"#f8fafc",borderRadius:8 }}>
        <div style={{ minWidth:0 }}>
          <div style={{ fontSize:13,fontWeight:700 }}>{p.nome || p.email}</div>
          <div style={{ fontSize:11,color:"#94a3b8" }}>{p.email}</div>
        </div>
        {counts && <div style={{ fontSize:12,color:"#94a3b8",flexShrink:0 }}>{counts[p.id]||0} aluno(s)</div>}
      </div>
    ))}
  </div>
);

function App() {
  const [session,setSession]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [isAdmin,setIsAdmin]=useState(null); // null=checking, true/false
  const [profs,setProfs]=useState([]);
  const [counts,setCounts]=useState({});
  const [loadingData,setLoadingData]=useState(false);
  const [selected,setSelected]=useState(null); // professional object being viewed
  const [selStudents,setSelStudents]=useState([]);
  const [selLoading,setSelLoading]=useState(false);
  const [savingProf,setSavingProf]=useState(false);
  const [planPrices,setPlanPrices]=useState({});
  const [savingPrices,setSavingPrices]=useState(false);
  const [resetMsg,setResetMsg]=useState("");
  const [drill,setDrill]=useState(null); // { section, label }
  const [planoEdit,setPlanoEdit]=useState(null);
  const [statusEdit,setStatusEdit]=useState(null);
  const [priceEdits,setPriceEdits]=useState({});

  const toggleDrill = (section, label) => {
    setDrill(d => (d && d.section===section && d.label===label) ? null : { section, label });
  };

  const openProfessional = (p) => {
    setResetMsg("");
    setSelected(p);
    setPlanoEdit(p.plano||"trial");
    setStatusEdit(p.status_assinatura||"ativo");
  };

  const savePlanStatus = async () => {
    await updateProfFields({ plano: planoEdit, status_assinatura: statusEdit });
  };

  const savePrices = async () => {
    setSavingPrices(true);
    try {
      const headers = await authHeaders();
      for (const [plano, valor] of Object.entries(priceEdits)) {
        await fetch(SUPA_URL+"/rest/v1/plan_prices", {
          method:"POST", headers: { ...headers, "Prefer":"resolution=merge-duplicates,return=representation" },
          body: JSON.stringify({ plano, valor })
        });
      }
      setPlanPrices(m=>({ ...m, ...priceEdits }));
      setPriceEdits({});
    } catch(e) {}
    setSavingPrices(false);
  };

  useEffect(()=>{
    supa.auth.getSession().then(({data})=>{ setSession(data?.session||null); setAuthLoading(false); });
    const { data: listener } = supa.auth.onAuthStateChange((_event, sess)=>{ setSession(sess); });
    return ()=>{ listener?.subscription?.unsubscribe(); };
  },[]);

  useEffect(()=>{
    if (!session) { setIsAdmin(null); return; }
    (async()=>{
      try {
        const headers = await authHeaders();
        const r = await fetch(SUPA_URL+"/rest/v1/professionals?select=is_admin&id=eq."+session.user.id, { headers });
        const rows = await r.json();
        setIsAdmin(!!rows?.[0]?.is_admin);
      } catch(e) { setIsAdmin(false); }
    })();
  },[session]);

  useEffect(()=>{
    if (!isAdmin) return;
    (async()=>{
      setLoadingData(true);
      try {
        const headers = await authHeaders();
        const [profsRes, countsRes, pricesRes] = await Promise.all([
          fetch(SUPA_URL+"/rest/v1/professionals?select=*&order=created_at.desc", { headers }),
          fetch(SUPA_URL+"/rest/v1/rpc/admin_student_counts", { method:"POST", headers, body: JSON.stringify({}) }),
          fetch(SUPA_URL+"/rest/v1/plan_prices?select=*", { headers })
        ]);
        const profsData = await profsRes.json().catch(()=>[]);
        const countsData = await countsRes.json().catch(()=>[]);
        const pricesData = await pricesRes.json().catch(()=>[]);
        const map = {};
        (Array.isArray(countsData)?countsData:[]).forEach(c=>{ map[c.owner_id] = c.total; });
        const priceMap = {};
        (Array.isArray(pricesData)?pricesData:[]).forEach(p=>{ priceMap[p.plano] = p.valor; });
        setProfs(Array.isArray(profsData)?profsData:[]);
        setCounts(map);
        setPlanPrices(priceMap);
      } catch(e) {}
      setLoadingData(false);
    })();
  },[isAdmin]);

  useEffect(()=>{
    if (!selected) { setSelStudents([]); return; }
    (async()=>{
      setSelLoading(true);
      try {
        const headers = await authHeaders();
        const r = await fetch(SUPA_URL+"/rest/v1/rpc/admin_students_by_owner", { method:"POST", headers, body: JSON.stringify({ target_owner: selected.id }) });
        const rows = await r.json();
        setSelStudents(rows||[]);
      } catch(e) { setSelStudents([]); }
      setSelLoading(false);
    })();
  },[selected]);

  const updateProf = async (field, value) => {
    if (!selected) return;
    setSavingProf(true);
    try {
      const headers = await authHeaders();
      await fetch(SUPA_URL+"/rest/v1/professionals?id=eq."+selected.id, {
        method:"PATCH", headers: { ...headers, "Prefer":"return=representation" },
        body: JSON.stringify({ [field]: value })
      });
      setSelected(p=>({ ...p, [field]: value }));
      setProfs(list=>list.map(p=>p.id===selected.id?{ ...p,[field]:value }:p));
    } catch(e) {}
    setSavingProf(false);
  };

  const updateProfFields = async (fields) => {
    if (!selected) return;
    setSavingProf(true);
    try {
      const headers = await authHeaders();
      await fetch(SUPA_URL+"/rest/v1/professionals?id=eq."+selected.id, {
        method:"PATCH", headers: { ...headers, "Prefer":"return=representation" },
        body: JSON.stringify(fields)
      });
      setSelected(p=>({ ...p, ...fields }));
      setProfs(list=>list.map(p=>p.id===selected.id?{ ...p, ...fields }:p));
    } catch(e) {}
    setSavingProf(false);
  };

  const extendTrial = async (days) => {
    if (!selected) return;
    const base = (selected.trial_ends_at && new Date(selected.trial_ends_at).getTime() > Date.now())
      ? new Date(selected.trial_ends_at)
      : new Date();
    const newDate = new Date(base.getTime() + days*86400000).toISOString();
    await updateProf("trial_ends_at", newDate);
  };

  const trialExpired = (p) => p.trial_ends_at && new Date(p.trial_ends_at).getTime() < Date.now();

  const updatePlanPrice = async (plano, valor) => {
    setSavingPrices(true);
    try {
      const headers = await authHeaders();
      await fetch(SUPA_URL+"/rest/v1/plan_prices", {
        method:"POST", headers: { ...headers, "Prefer":"resolution=merge-duplicates,return=representation" },
        body: JSON.stringify({ plano, valor })
      });
      setPlanPrices(m=>({ ...m, [plano]: valor }));
    } catch(e) {}
    setSavingPrices(false);
  };

  const sendPasswordReset = async (email) => {
    setResetMsg("Enviando...");
    try {
      const { error } = await supa.auth.resetPasswordForEmail(email, { redirectTo: "https://britowellington.github.io/app.longevus/longevus-app-test.html" });
      if (error) throw error;
      setResetMsg("Email de redefinição enviado para "+email);
    } catch(err) {
      setResetMsg("Erro: "+(err.message||"não foi possível enviar"));
    }
  };

  if (authLoading || (session && isAdmin===null)) {
    return <div style={{ minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8",fontFamily:"-apple-system,sans-serif" }}>Carregando...</div>;
  }
  if (!session) {
    return <Login onLogin={()=>{}}/>;
  }
  if (!isAdmin) {
    return (
      <div style={{ minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,fontFamily:"-apple-system,sans-serif",padding:20,textAlign:"center" }}>
        <div style={{ fontSize:18,fontWeight:700 }}>Acesso restrito</div>
        <div style={{ fontSize:14,color:"#64748b" }}>Esta área é exclusiva para administradores do Longevus.</div>
        <button onClick={()=>supa.auth.signOut()} style={{ marginTop:8,border:"1.5px solid #e2e8f0",background:"#fff",borderRadius:8,padding:"8px 16px",fontSize:13,cursor:"pointer" }}>Sair</button>
      </div>
    );
  }

  const totalProfs = profs.length;
  const totalAlunos = Object.values(counts).reduce((a,b)=>a+Number(b||0),0);
  const fmtDate = (d) => d ? new Date(d).toLocaleDateString("pt-BR") : "—";
  const fmtDateTime = (d) => d ? new Date(d).toLocaleString("pt-BR") : "—";

  // --- Métricas ---
  const monthLabel = (d) => {
    const dt = new Date(d);
    return dt.toLocaleDateString("pt-BR",{ month:"short", year:"2-digit" });
  };
  const growthMap = {};
  profs.forEach(p=>{
    if (!p.created_at) return;
    const key = monthLabel(p.created_at);
    growthMap[key] = (growthMap[key]||0) + 1;
  });
  // Ordenar cronologicamente pela data real
  const growthOrder = [...new Set(profs.filter(p=>p.created_at).map(p=>p.created_at))]
    .sort()
    .map(monthLabel);
  const growthData = [...new Set(growthOrder)].map(label=>({ label, value: growthMap[label]||0 }));

  const planoMap = {};
  profs.forEach(p=>{ const k = p.plano||"trial"; planoMap[k] = (planoMap[k]||0)+1; });
  const planoData = Object.entries(planoMap).map(([label,value])=>({ label, value }));

  const statusMap = {};
  profs.forEach(p=>{ const k = p.status_assinatura||"ativo"; statusMap[k] = (statusMap[k]||0)+1; });
  const statusColors = { ativo:"#16a34a", inadimplente:"#f59e0b", cancelado:"#dc2626" };
  const statusData = Object.entries(statusMap).map(([label,value])=>({ label, value, color: statusColors[label]||"#94a3b8" }));

  const comAlunos = profs.filter(p=>(counts[p.id]||0) > 0).length;
  const semAlunos = totalProfs - comAlunos;
  const engajamentoData = [
    { label:"Com alunos cadastrados", value: comAlunos, color:"#16a34a" },
    { label:"Sem alunos ainda", value: semAlunos, color:"#94a3b8" },
  ];

  // --- Métricas financeiras ---
  const fmtBRL = (v) => "R$ " + Number(v||0).toLocaleString("pt-BR",{ minimumFractionDigits:2, maximumFractionDigits:2 });
  const monthlyValue = (p) => {
    const plano = p.plano||"trial";
    const valor = Number(planPrices[plano]||0);
    if (plano==="anual") return valor/12;
    if (plano==="vitalicio") return 0; // não recorrente
    if (plano==="trial") return 0;
    return valor; // mensal
  };
  const activePaying = profs.filter(p=>(p.status_assinatura||"ativo")==="ativo" && (p.plano||"trial")!=="trial");
  const mrr = activePaying.reduce((sum,p)=>sum+monthlyValue(p),0);
  const payingRecurring = activePaying.filter(p=>(p.plano||"trial")!=="vitalicio");
  const ticketMedio = payingRecurring.length>0 ? mrr/payingRecurring.length : 0;
  const cancelados = profs.filter(p=>p.status_assinatura==="cancelado").length;
  const everPaid = profs.filter(p=>(p.plano||"trial")!=="trial").length;
  const churn = everPaid>0 ? (cancelados/everPaid)*100 : 0;
  const ltv = churn>0 ? ticketMedio/(churn/100) : null;
  const vitaliciosRevenue = profs.filter(p=>p.plano==="vitalicio").length * Number(planPrices.vitalicio||0);
  const arr = mrr * 12;

  // --- Engajamento real (última atividade) ---
  const fmtRelative = (d) => {
    if (!d) return "Nunca acessou";
    const diffMs = Date.now() - new Date(d).getTime();
    const days = Math.floor(diffMs/86400000);
    if (days<1) return "Hoje";
    if (days===1) return "Ontem";
    if (days<30) return "há "+days+" dias";
    const months = Math.floor(days/30);
    return "há "+months+" mês"+(months>1?"es":"");
  };
  const activos7d = profs.filter(p=>p.last_active && (Date.now()-new Date(p.last_active).getTime())<7*86400000).length;
  const inativos7d = totalProfs - activos7d;
  const ativ7dData = [
    { label:"Ativos (últimos 7 dias)", value: activos7d, color:"#16a34a" },
    { label:"Inativos", value: inativos7d, color:"#94a3b8" },
  ];

  // --- Lista filtrada para drill-down ---
  const drillList = (() => {
    if (!drill) return null;
    const { section, label } = drill;
    if (section==="growth") return profs.filter(p=>p.created_at && monthLabel(p.created_at)===label);
    if (section==="plano") return profs.filter(p=>(p.plano||"trial")===label);
    if (section==="status") return profs.filter(p=>(p.status_assinatura||"ativo")===label);
    if (section==="engajamento") return label==="Com alunos cadastrados"
      ? profs.filter(p=>(counts[p.id]||0)>0)
      : profs.filter(p=>(counts[p.id]||0)===0);
    if (section==="ativ7d") return label==="Ativos (últimos 7 dias)"
      ? profs.filter(p=>p.last_active && (Date.now()-new Date(p.last_active).getTime())<7*86400000)
      : profs.filter(p=>!(p.last_active && (Date.now()-new Date(p.last_active).getTime())<7*86400000));
    if (section==="financeiro") {
      if (label==="churn") return profs.filter(p=>p.status_assinatura==="cancelado");
      if (label==="paying") return activePaying;
    }
    return [];
  })();

  if (selected) {
    const p = selected;
    return (
      <div style={{ minHeight:"100vh",background:"#f8fafc",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",paddingBottom:40 }}>
        <div style={{ background:"#fff",borderBottom:"1.5px solid #e2e8f0",padding:"12px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10 }}>
          <div style={{ display:"flex",alignItems:"center",gap:10 }}>
            <button onClick={()=>setSelected(null)} style={{ border:"none",background:"transparent",fontSize:14,color:"#FF5603",fontWeight:700,cursor:"pointer" }}>← Voltar</button>
          </div>
          <button onClick={()=>supa.auth.signOut()} style={{ border:"none",background:"transparent",color:"#94a3b8",fontSize:12,cursor:"pointer",textDecoration:"underline" }}>Sair</button>
        </div>
        <div style={{ padding:"20px 16px",maxWidth:800,margin:"0 auto" }}>
          <div style={{ background:"#fff",borderRadius:12,padding:"16px",border:"1px solid #e2e8f0",marginBottom:16 }}>
            <div style={{ display:"flex",alignItems:"center",gap:12,marginBottom:4 }}>
              {p.logo_url
                ? <img src={p.logo_url} alt="" style={{ width:48,height:48,borderRadius:"50%",objectFit:"cover",flexShrink:0 }}/>
                : <div style={{ width:48,height:48,borderRadius:"50%",background:"#f1f5f9",flexShrink:0 }}/>
              }
              <div style={{ fontWeight:800,fontSize:18,display:"flex",alignItems:"center",gap:8 }}>
                {p.nome || p.email}
                {p.is_admin && <span style={{ fontSize:10,background:"#FF560318",color:"#FF5603",borderRadius:999,padding:"2px 8px",fontWeight:700 }}>ADMIN</span>}
              </div>
            </div>
            <div style={{ fontSize:13,color:"#94a3b8",marginTop:2 }}>{p.email}</div>
            {p.whatsapp && (
              <a href={"https://wa.me/"+String(p.whatsapp).replace(/\D/g,"")} target="_blank" style={{ fontSize:13,color:"#16a34a",fontWeight:700,marginTop:4,display:"inline-flex",alignItems:"center",gap:4,textDecoration:"none" }}>
                📱 {p.whatsapp}
              </a>
            )}
            <div style={{ fontSize:12,color:"#cbd5e1",marginTop:4 }}>Cadastrado em {fmtDate(p.created_at)} · Última atividade: {fmtRelative(p.last_active)}</div>
            <div style={{ fontSize:12,color:"#cbd5e1",marginTop:2 }}>ID: {p.id}</div>
            {(p.cref || p.especializacao) && (
              <div style={{ fontSize:12,color:"#475569",marginTop:8,paddingTop:8,borderTop:"1px solid #f1f5f9" }}>
                {p.cref && <div><strong>CREF:</strong> {p.cref}</div>}
                {p.especializacao && <div style={{ marginTop:2 }}><strong>Especialização:</strong> {p.especializacao}</div>}
              </div>
            )}

            <div style={{ display:"flex",gap:12,marginTop:16,flexWrap:"wrap" }}>
              <div style={{ flex:"1 1 140px" }}>
                <label style={{ fontSize:12,fontWeight:600,color:"#475569",display:"block",marginBottom:4 }}>Plano</label>
                <select value={planoEdit} disabled={savingProf} onChange={e=>setPlanoEdit(e.target.value)} style={{ width:"100%",padding:"8px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:13 }}>
                  <option value="trial">trial</option>
                  <option value="mensal">mensal</option>
                  <option value="anual">anual</option>
                  <option value="vitalicio">vitalício</option>
                </select>
              </div>
              <div style={{ flex:"1 1 140px" }}>
                <label style={{ fontSize:12,fontWeight:600,color:"#475569",display:"block",marginBottom:4 }}>Status</label>
                <select value={statusEdit} disabled={savingProf} onChange={e=>setStatusEdit(e.target.value)} style={{ width:"100%",padding:"8px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:13 }}>
                  <option value="ativo">ativo</option>
                  <option value="inadimplente">inadimplente</option>
                  <option value="cancelado">cancelado</option>
                </select>
              </div>
            </div>
            {(planoEdit!==(p.plano||"trial") || statusEdit!==(p.status_assinatura||"ativo")) && (
              <button onClick={savePlanStatus} disabled={savingProf} style={{ marginTop:10,border:"none",background:"#FF5603",color:"#fff",borderRadius:8,padding:"9px 16px",fontSize:13,fontWeight:700,cursor:"pointer" }}>
                {savingProf?"Salvando...":"Salvar alterações"}
              </button>
            )}

            {p.plano==="trial" && (
              <div style={{ borderTop:"1px solid #f1f5f9",marginTop:16,paddingTop:12 }}>
                <div style={{ fontSize:12,color: trialExpired(p)?"#dc2626":"#475569",fontWeight:600,marginBottom:8 }}>
                  {p.trial_ends_at
                    ? (trialExpired(p) ? "Trial expirado em "+fmtDate(p.trial_ends_at) : "Trial expira em "+fmtDate(p.trial_ends_at))
                    : "Sem data de expiração de trial definida"}
                </div>
                <div style={{ display:"flex",gap:8,flexWrap:"wrap" }}>
                  <button onClick={()=>extendTrial(7)} disabled={savingProf} style={{ border:"1.5px solid #e2e8f0",background:"#fff",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer",color:"#475569" }}>+7 dias</button>
                  <button onClick={()=>extendTrial(14)} disabled={savingProf} style={{ border:"1.5px solid #e2e8f0",background:"#fff",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer",color:"#475569" }}>+14 dias</button>
                  <button onClick={()=>extendTrial(30)} disabled={savingProf} style={{ border:"1.5px solid #e2e8f0",background:"#fff",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer",color:"#475569" }}>+30 dias</button>
                </div>
              </div>
            )}

            <div style={{ borderTop:"1px solid #f1f5f9",marginTop:16,paddingTop:12 }}>
              <button onClick={()=>sendPasswordReset(p.email)} style={{ border:"1.5px solid #e2e8f0",background:"#fff",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer",color:"#475569" }}>
                Enviar redefinição de senha
              </button>
              {resetMsg && <div style={{ fontSize:12,color:"#64748b",marginTop:8 }}>{resetMsg}</div>}
            </div>
          </div>

          <div style={{ fontWeight:800,fontSize:16,marginBottom:10 }}>Alunos ({selStudents.length})</div>
          {selLoading ? (
            <div style={{ color:"#94a3b8",fontSize:13 }}>Carregando...</div>
          ) : selStudents.length===0 ? (
            <div style={{ color:"#94a3b8",fontSize:13 }}>Nenhum aluno cadastrado.</div>
          ) : (
            <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
              {selStudents.map(s=>(
                <div key={s.id} style={{ background:"#fff",borderRadius:12,padding:"12px 16px",border:"1px solid #e2e8f0" }}>
                  <div style={{ fontWeight:700,fontSize:14 }}>{s.data?.name || s.data?.nome || "Sem nome"}</div>
                  <div style={{ fontSize:11,color:"#cbd5e1",marginTop:2 }}>Criado em {fmtDateTime(s.created_at)} · Atualizado em {fmtDateTime(s.updated_at)}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight:"100vh",background:"#f8fafc",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",paddingBottom:40 }}>
      <div style={{ background:"#fff",borderBottom:"1.5px solid #e2e8f0",padding:"12px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10 }}>
        <div style={{ display:"flex",alignItems:"center",gap:10 }}>
          <img src={__LOGO_1__} alt="Longevus" style={{ height:34,width:"auto" }}/>
          <span style={{ fontWeight:800,fontSize:15 }}>Admin</span>
        </div>
        <button onClick={()=>supa.auth.signOut()} style={{ border:"none",background:"transparent",color:"#94a3b8",fontSize:12,cursor:"pointer",textDecoration:"underline" }}>Sair</button>
      </div>

      <div style={{ padding:"20px 16px",maxWidth:800,margin:"0 auto" }}>
        <div style={{ display:"flex",gap:12,marginBottom:20,flexWrap:"wrap" }}>
          <div style={{ flex:"1 1 140px",background:"#fff",borderRadius:12,padding:"16px",border:"1px solid #e2e8f0" }}>
            <div style={{ fontSize:24,fontWeight:900,color:"#FF5603" }}>{totalProfs}</div>
            <div style={{ fontSize:12,color:"#94a3b8" }}>Profissionais</div>
          </div>
          <div style={{ flex:"1 1 140px",background:"#fff",borderRadius:12,padding:"16px",border:"1px solid #e2e8f0" }}>
            <div style={{ fontSize:24,fontWeight:900,color:"#FF5603" }}>{totalAlunos}</div>
            <div style={{ fontSize:12,color:"#94a3b8" }}>Alunos (total)</div>
          </div>
        </div>

        {!loadingData && profs.length>0 && (
          <div style={{ display:"flex",flexDirection:"column",gap:12,marginBottom:24 }}>
            <div style={{ background:"#fff",borderRadius:12,padding:"16px",border:"1px solid #e2e8f0" }}>
              <div style={{ fontWeight:800,fontSize:14,marginBottom:12 }}>Crescimento (cadastros por mês)</div>
              {growthData.length>0 ? <BarChart data={growthData} color="#FF5603" onBarClick={l=>toggleDrill("growth",l)} selected={drill?.section==="growth"?drill.label:null}/> : <div style={{ fontSize:12,color:"#94a3b8" }}>Sem dados.</div>}
              {drill?.section==="growth" && <ProfList items={drillList} onSelect={openProfessional} counts={counts}/>}
            </div>
            <div style={{ display:"flex",gap:12,flexWrap:"wrap" }}>
              <div style={{ flex:"1 1 220px",background:"#fff",borderRadius:12,padding:"16px",border:"1px solid #e2e8f0" }}>
                <div style={{ fontWeight:800,fontSize:14,marginBottom:12 }}>Por plano</div>
                <BarChart data={planoData} color="#6366f1" onBarClick={l=>toggleDrill("plano",l)} selected={drill?.section==="plano"?drill.label:null}/>
                {drill?.section==="plano" && <ProfList items={drillList} onSelect={openProfessional} counts={counts}/>}
              </div>
              <div style={{ flex:"1 1 220px",background:"#fff",borderRadius:12,padding:"16px",border:"1px solid #e2e8f0" }}>
                <div style={{ fontWeight:800,fontSize:14,marginBottom:12 }}>Por status</div>
                <BarChart data={statusData} onBarClick={l=>toggleDrill("status",l)} selected={drill?.section==="status"?drill.label:null}/>
                {drill?.section==="status" && <ProfList items={drillList} onSelect={openProfessional} counts={counts}/>}
              </div>
            </div>
            <div style={{ background:"#fff",borderRadius:12,padding:"16px",border:"1px solid #e2e8f0" }}>
              <div style={{ fontWeight:800,fontSize:14,marginBottom:12 }}>Engajamento (alunos cadastrados)</div>
              <BarChart data={engajamentoData} onBarClick={l=>toggleDrill("engajamento",l)} selected={drill?.section==="engajamento"?drill.label:null}/>
              {drill?.section==="engajamento" && <ProfList items={drillList} onSelect={openProfessional} counts={counts}/>}
            </div>
            <div style={{ background:"#fff",borderRadius:12,padding:"16px",border:"1px solid #e2e8f0" }}>
              <div style={{ fontWeight:800,fontSize:14,marginBottom:12 }}>Engajamento real (acessou nos últimos 7 dias)</div>
              <BarChart data={ativ7dData} onBarClick={l=>toggleDrill("ativ7d",l)} selected={drill?.section==="ativ7d"?drill.label:null}/>
              {drill?.section==="ativ7d" && <ProfList items={drillList} onSelect={openProfessional} counts={counts}/>}
            </div>

            <div style={{ background:"#fff",borderRadius:12,padding:"16px",border:"1px solid #e2e8f0" }}>
              <div style={{ fontWeight:800,fontSize:14,marginBottom:4 }}>Visão financeira</div>
              <div style={{ fontSize:11,color:"#94a3b8",marginBottom:12 }}>Estimativas com base nos preços configurados abaixo</div>
              <div style={{ display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:16 }}>
                <div onClick={()=>toggleDrill("financeiro","paying")} style={{ cursor:"pointer" }}>
                  <div style={{ fontSize:20,fontWeight:900,color:"#FF5603" }}>{fmtBRL(mrr)}</div>
                  <div style={{ fontSize:11,color:"#94a3b8" }}>MRR (receita mensal recorrente)</div>
                </div>
                <div onClick={()=>toggleDrill("financeiro","paying")} style={{ cursor:"pointer" }}>
                  <div style={{ fontSize:20,fontWeight:900,color:"#FF5603" }}>{fmtBRL(arr)}</div>
                  <div style={{ fontSize:11,color:"#94a3b8" }}>ARR (projeção anual)</div>
                </div>
                <div onClick={()=>toggleDrill("financeiro","paying")} style={{ cursor:"pointer" }}>
                  <div style={{ fontSize:20,fontWeight:900,color:"#FF5603" }}>{fmtBRL(ticketMedio)}</div>
                  <div style={{ fontSize:11,color:"#94a3b8" }}>Ticket médio / mês</div>
                </div>
                <div onClick={()=>toggleDrill("financeiro","churn")} style={{ cursor:"pointer" }}>
                  <div style={{ fontSize:20,fontWeight:900,color: churn>10?"#dc2626":"#0f172a" }}>{churn.toFixed(1)}%</div>
                  <div style={{ fontSize:11,color:"#94a3b8" }}>Churn ({cancelados}/{everPaid} clientes pagantes)</div>
                </div>
                <div>
                  <div style={{ fontSize:20,fontWeight:900,color:"#0f172a" }}>{ltv!==null ? fmtBRL(ltv) : "—"}</div>
                  <div style={{ fontSize:11,color:"#94a3b8" }}>LTV estimado</div>
                </div>
              </div>
              {drill?.section==="financeiro" && (
                <ProfList items={drillList} onSelect={openProfessional} counts={counts}/>
              )}
              {vitaliciosRevenue>0 && (
                <div style={{ fontSize:12,color:"#94a3b8",marginBottom:12 }}>+ {fmtBRL(vitaliciosRevenue)} em receita vitalícia (pagamento único, fora do MRR)</div>
              )}
              <div style={{ borderTop:"1px solid #f1f5f9",paddingTop:12 }}>
                <div style={{ fontSize:12,fontWeight:700,color:"#475569",marginBottom:8 }}>Configurar preços dos planos (R$)</div>
                <div style={{ display:"flex",gap:8,flexWrap:"wrap" }}>
                  {["mensal","anual","vitalicio"].map(plano=>(
                    <div key={plano} style={{ flex:"1 1 100px" }}>
                      <label style={{ fontSize:11,color:"#94a3b8",display:"block",marginBottom:3,textTransform:"capitalize" }}>{plano}</label>
                      <input type="number" step="0.01" value={priceEdits[plano]!==undefined?priceEdits[plano]:(planPrices[plano]||0)} disabled={savingPrices}
                        onChange={e=>setPriceEdits(m=>({ ...m, [plano]: parseFloat(e.target.value)||0 }))}
                        style={{ width:"100%",padding:"6px 8px",borderRadius:6,border:"1.5px solid #e2e8f0",fontSize:13 }}/>
                    </div>
                  ))}
                </div>
                {Object.keys(priceEdits).length>0 && (
                  <button onClick={savePrices} disabled={savingPrices} style={{ marginTop:10,border:"none",background:"#FF5603",color:"#fff",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:700,cursor:"pointer" }}>
                    {savingPrices?"Salvando...":"Salvar preços"}
                  </button>
                )}
              </div>
            </div>
          </div>
        )}

        <div style={{ fontWeight:800,fontSize:16,marginBottom:10 }}>Profissionais cadastrados</div>

        {loadingData ? (
          <div style={{ color:"#94a3b8",fontSize:13 }}>Carregando...</div>
        ) : profs.length===0 ? (
          <div style={{ color:"#94a3b8",fontSize:13 }}>Nenhum profissional encontrado.</div>
        ) : (
          <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
            {profs.map(p=>(
              <div key={p.id} onClick={()=>openProfessional(p)} style={{ cursor:"pointer",background:"#fff",borderRadius:12,padding:"14px 16px",border:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12 }}>
                {p.logo_url
                  ? <img src={p.logo_url} alt="" style={{ width:38,height:38,borderRadius:"50%",objectFit:"cover",flexShrink:0 }}/>
                  : <div style={{ width:38,height:38,borderRadius:"50%",background:"#f1f5f9",flexShrink:0 }}/>
                }
                <div style={{ minWidth:0,flex:1 }}>
                  <div style={{ fontWeight:700,fontSize:14,display:"flex",alignItems:"center",gap:6 }}>
                    {p.nome || p.email}
                    {p.is_admin && <span style={{ fontSize:10,background:"#FF560318",color:"#FF5603",borderRadius:999,padding:"2px 8px",fontWeight:700 }}>ADMIN</span>}
                  </div>
                  <div style={{ fontSize:12,color:"#94a3b8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis" }}>{p.email}{p.whatsapp ? " · "+p.whatsapp : ""}</div>
                  <div style={{ fontSize:11,color:"#cbd5e1",marginTop:2 }}>Cadastrado em {fmtDate(p.created_at)} · {fmtRelative(p.last_active)}</div>
                </div>
                <div style={{ textAlign:"right",flexShrink:0 }}>
                  <div style={{ fontSize:18,fontWeight:900 }}>{counts[p.id]||0}</div>
                  <div style={{ fontSize:11,color:"#94a3b8" }}>aluno(s)</div>
                  <div style={{ fontSize:11,marginTop:4,fontWeight:700,color: p.status_assinatura==="ativo" ? "#16a34a" : "#dc2626" }}>
                    {p.plano || "trial"} · {p.status_assinatura || "ativo"}
                  </div>
                  {p.plano==="trial" && trialExpired(p) && (
                    <div style={{ fontSize:10,marginTop:2,fontWeight:700,color:"#dc2626" }}>TRIAL EXPIRADO</div>
                  )}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
  </script>
</body>
</html>
