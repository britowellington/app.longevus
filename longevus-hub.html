const { useState, useEffect, useRef, useCallback } = React;

const SUPA_URL = "https://jpduxfbigcdxmtcozqpp.supabase.co";
const SUPA_KEY = "sb_publishable_VZSgcxu5ps3eR9UAjuRr4Q_B65WTx_h";
const supa = window.supabase.createClient(SUPA_URL, SUPA_KEY);

const Login = ({ onLogin }) => {
const [nome,setNome]=useState("");
const [email,setEmail]=useState("");
const [password,setPassword]=useState("");
const [mode,setMode]=useState("signin");
const [error,setError]=useState("");
const [loading,setLoading]=useState(false);
const submit = async (e) => {
e.preventDefault();
setError(""); setLoading(true);
try {
if (mode==="signin") {
const { error } = await supa.auth.signInWithPassword({ email, password });
if (error) throw error;
} else {
const { error } = await supa.auth.signUp({ email, password, options: { data: { nome } } });
if (error) throw error;
setError("Conta criada! Faça login.");
setMode("signin");
setLoading(false);
return;
}
onLogin();
} catch(err) {
setError(err.message || "Erro ao autenticar.");
} finally {
setLoading(false);
}
};
return (
<div style={{ minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f8fafc",padding:20 }}>
<form onSubmit={submit} style={{ background:"#fff",borderRadius:16,padding:28,width:"100%",maxWidth:380,boxShadow:"0 4px 24px rgba(0,0,0,0.06)" }}>
<div style={{ textAlign:"center",marginBottom:18 }}>
<img src={LONGEVUS_LOGO} alt="Longevus" style={{ width:56,height:56,margin:"0 auto 8px",display:"block" }}/>
<div style={{ fontWeight:900,fontSize:20 }}>Longevus</div>
<div style={{ fontSize:12,color:"#94a3b8" }}>Treinamento Neurofuncional</div>
</div>
{mode==="signup" && (
<div style={{ marginBottom:12 }}>
<label style={{ fontSize:12,fontWeight:600,color:"#475569",display:"block",marginBottom:4 }}>Nome</label>
<input type="text" required value={nome} onChange={e=>setNome(e.target.value)} style={{ width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:14,boxSizing:"border-box" }}/>
</div>
)}
<div style={{ marginBottom:12 }}>
<label style={{ fontSize:12,fontWeight:600,color:"#475569",display:"block",marginBottom:4 }}>E-mail</label>
<input type="email" required value={email} onChange={e=>setEmail(e.target.value)} style={{ width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:14,boxSizing:"border-box" }}/>
</div>
<div style={{ marginBottom:16 }}>
<label style={{ fontSize:12,fontWeight:600,color:"#475569",display:"block",marginBottom:4 }}>Senha</label>
<input type="password" required value={password} onChange={e=>setPassword(e.target.value)} style={{ width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:14,boxSizing:"border-box" }}/>
</div>
{error && <div style={{ fontSize:12,color:"#dc2626",marginBottom:12,textAlign:"center" }}>{error}</div>}
<button type="submit" disabled={loading} style={{ width:"100%",padding:"11px",borderRadius:8,border:"none",background:"#FF5603",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",opacity:loading?0.7:1 }}>
{loading ? "Aguarde..." : (mode==="signin" ? "Entrar" : "Criar conta")}
</button>
<div style={{ textAlign:"center",marginTop:14,fontSize:13 }}>
{mode==="signin" ? (
<span>Não tem conta? <a href="#" onClick={e=>{e.preventDefault();setMode("signup");setError("");}} style={{ color:"#FF5603",fontWeight:600 }}>Criar conta</a></span>
) : (
<span>Já tem conta? <a href="#" onClick={e=>{e.preventDefault();setMode("signin");setError("");}} style={{ color:"#FF5603",fontWeight:600 }}>Entrar</a></span>
)}
</div>
</form>
</div>
);
};



const C={bg:"#F0F4F8",surface:"#FFFFFF",border:"#DDE3EC",text:"#1A2340",muted:"#6B7A99",orange:"#FF5603",green:"#10B981",red:"#EF4444",blue:"#3B82F6",yellow:"#F59E0B"};

}

                </div>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13,color:"#0f172a",marginBottom:2}}>{m.label}</div>

                </div>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="2.5"><path d="M9 18l6-6-6-6"/></svg>
              </div>
            ))}
          </div>
        </div>;
      })}
    </div>
  </div>;
}

function genCardQuestions(card) {
  if(!card) return null;
  const title = card.title || "";
  const rnd = (n) => Math.floor(Math.random()*n);
  if(title.includes("Aritm")||title.includes("Mental")) {
    const ops=[];
    for(let i=0;i<5;i++){const a=rnd(9)+1,b=rnd(9)+1,t=["+","-","x"][rnd(3)];
      if(t==="+") ops.push(a+" + "+b+" = "+(a+b));
      else if(t==="-") ops.push(Math.max(a,b)+" - "+Math.min(a,b)+" = "+(Math.max(a,b)-Math.min(a,b)));
      else ops.push(a+" x "+b+" = "+(a*b));}
    return {type:"lista", label:"Operacoes", items:ops};
  }
  if(title.includes("Digit")||title.includes("Span"))
    return {type:"lista", label:"Sequencias — repita ao contrario", items:Array.from({length:5},(_,i)=>Array.from({length:3+i},()=>rnd(9)+1).join(" - "))};
  if(title.includes("Lista")||title.includes("Memorize"))
    return {type:"lista", label:"Memorize estas palavras", items:["JANELA","CHAPEU","PEDRA","ARVORE","SAPATO","NUVEM","FACA","LIVRO","CHUVA","VENTO","MESA","PORTA"].sort(()=>Math.random()-0.5).slice(0,5)};
  if(title.includes("Stroop")){
    const colors=["VERMELHO","AZUL","VERDE","AMARELO","ROXO"],inks=["#ef4444","#3b82f6","#22c55e","#eab308","#a855f7"];
    return {type:"stroop", label:"Diga a cor da TINTA, nao a palavra!", items:Array.from({length:10},()=>{const wi=rnd(5);return {word:colors[wi],ink:inks[(wi+1+rnd(4))%5]};})};
  }
  if(title.includes("Go")){
    const targets=["CACHORRO","GATO","PASSARO"],target=targets[rnd(3)];
    const pool=["MESA","CARRO","CASA","AZUL","PEDRA",target,"LIVRO","CHUVA",target,"FACA",target,"PORTA"];
    return {type:"gonogo", label:"Bata palma SO em: "+target, items:pool.sort(()=>Math.random()-0.5).slice(0,10), target};
  }
  if(title.includes("Categor"))
    return {type:"lista", label:"Nomeie palavras das categorias", items:["Frutas","Animais","Profissoes","Cidades","Cores","Esportes"].sort(()=>Math.random()-0.5).slice(0,3)};
  if(title.includes("Unipodal"))
    return {type:"lista", label:"Nomeie palavras com a letra", items:["ABCDEFGHIJKLMNOPQRSTUVWXYZ"[rnd(26)]]};
  return null;
}

// ── TELA DO JOGO ─────────────────────────────────────────
function SeqGame({ level, onFinish, onBack }) {
  const cfg = SEQ_LEVELS[level];
  const count = cfg.count;
  const cols = cfg.cols;

  const [numbers, setNumbers] = useState([]);
  const [next, setNext] = useState(1);
  const [errors, setErrors] = useState(0);
  const [phase, setPhase] = useState("countdown"); // countdown | playing | done
  const [countdown, setCountdown] = useState(3);
  const [elapsed, setElapsed] = useState(0);
  const [flash, setFlash] = useState(null); // { idx, type: 'ok'|'err' }
  const [completed, setCompleted] = useState([]);
  const startRef = useRef(null);
  const timerRef = useRef(null);

  // Gera grid embaralhado
  useEffect(() => {
    const nums = Array.from({ length: count }, (_, i) => i + 1);
    setNumbers(sh(nums));
  }, [count]);

  // Countdown
  useEffect(() => {
    if (phase !== "countdown") return;
    if (countdown <= 0) { setPhase("playing"); startRef.current = Date.now(); return; }
    const t = setTimeout(() => setCountdown(c => c - 1), 1000);
    return () => clearTimeout(t);
  }, [phase, countdown]);

  // Timer
  useEffect(() => {
    if (phase !== "playing") return;
    timerRef.current = setInterval(() => setElapsed(Date.now() - startRef.current), 100);
    return () => clearInterval(timerRef.current);
  }, [phase]);

  const handleTap = useCallback((num, idx) => {
    if (phase !== "playing") return;
    if (num === next) {
      setFlash({ idx, type: "ok" });
      setCompleted(c => [...c, num]);
      setTimeout(() => setFlash(null), 300);
      if (next === count) {
        clearInterval(timerRef.current);
        setPhase("done");
        setTimeout(() => onFinish({ level, time: Date.now() - startRef.current, errors }), 400);
      } else {
        setNext(n => n + 1);
      }
    } else {
      setErrors(e => e + 1);
      setFlash({ idx, type: "err" });
      setTimeout(() => setFlash(null), 400);
    }
  }, [phase, next, count, errors, level, onFinish]);

  const cellSize = cols === 3 ? 90 : cols === 4 ? 72 : 58;
  const fontSize = cols === 3 ? 32 : cols === 4 ? 26 : 20;

  const s = {
    wrap: { fontFamily: "'DM Sans', sans-serif", background: C.bg, minHeight: "100vh", maxWidth: 480, margin: "0 auto", display: "flex", flexDirection: "column" },
    header: { background: C.text, padding: "14px 20px", display: "flex", alignItems: "center", justifyContent: "space-between" },
    logo: { fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 17, color: "#fff" },
    backBtn: { background: "rgba(255,255,255,0.1)", border: "none", borderRadius: 10, padding: "6px 12px", color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer" },
    body: { padding: "18px 16px", flex: 1, display: "flex", flexDirection: "column", alignItems: "center" },
    infoRow: { display: "flex", gap: 10, width: "100%", marginBottom: 20 },
    chip: (accent) => ({ flex: 1, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: "10px 8px", textAlign: "center", borderTop: `3px solid ${accent}` }),
    chipVal: { fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 20, color: C.text },
    chipLbl: { fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: "0.5px", marginTop: 2 },
    nextBox: { background: C.surface, border: `2px solid ${cfg.color}`, borderRadius: 14, padding: "10px 20px", marginBottom: 20, textAlign: "center", width: "100%" },
    nextLabel: { fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 2 },
    nextNum: { fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 28, color: cfg.color },
    grid: { display: "grid", gridTemplateColumns: `repeat(${cols}, ${cellSize}px)`, gap: cols === 5 ? 6 : 8 },
    cell: (num, idx) => {
      const done = completed.includes(num);
      const isFlashOk = flash?.idx === idx && flash.type === "ok";
      const isFlashErr = flash?.idx === idx && flash.type === "err";
      return {
        width: cellSize, height: cellSize,
        background: done ? C.green + "20" : isFlashOk ? C.green + "40" : isFlashErr ? C.red + "20" : C.surface,
        border: `2px solid ${done ? C.green : isFlashErr ? C.red : C.border}`,
        borderRadius: 14, display: "flex", alignItems: "center", justifyContent: "center",
        cursor: done ? "default" : "pointer",
        transition: "all 0.15s",
        transform: isFlashOk ? "scale(0.92)" : isFlashErr ? "scale(0.95)" : "scale(1)",
        boxShadow: isFlashOk ? `0 0 0 3px ${C.green}40` : isFlashErr ? `0 0 0 3px ${C.red}40` : "0 1px 4px #00000010",
      };
    },
    cellNum: (num) => ({
      fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize,
      color: completed.includes(num) ? C.green : C.text,
      userSelect: "none",
    }),
    countdownOverlay: {
      position: "fixed", inset: 0, background: "#1A234099", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50,
    },
    countdownBox: { background: "#fff", borderRadius: 24, padding: "40px 60px", textAlign: "center" },
    countdownNum: { fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 72, color: C.orange, lineHeight: 1 },
    countdownSub: { fontSize: 14, color: C.muted, marginTop: 8 },
  };

  const timeStr = elapsed > 0 ? `${(elapsed / 1000).toFixed(1)}s` : "0.0s";

  return (
    <div style={s.wrap}>
      {phase === "countdown" && (
        <div style={s.countdownOverlay}>
          <div style={s.countdownBox}>
            <div style={s.countdownNum}>{countdown === 0 ? "Vai!" : countdown}</div>
            <div style={s.countdownSub}>Prepare-se para começar</div>
          </div>
        </div>
      )}

      <div style={s.header}>
        <button style={s.backBtn} onClick={onBack}><IcoBack/> Sair</button>
        <div style={s.logo}>🔢 Sequência</div>
        <div style={{ fontSize: 12, color: "#ffffff80", fontWeight: 600 }}>{cfg.label}</div>
      </div>

      <div style={s.body}>
        <div style={s.infoRow}>
          <div style={s.chip(C.orange)}>
            <div style={s.chipVal}>{timeStr}</div>
            <div style={s.chipLbl}>Tempo</div>
          </div>
          <div style={s.chip(cfg.color)}>
            <div style={{ ...s.chipVal, color: cfg.color }}>{next - 1}/{count}</div>
            <div style={s.chipLbl}>Progresso</div>
          </div>
          <div style={s.chip(C.red)}>
            <div style={{ ...s.chipVal, color: errors > 0 ? C.red : C.text }}>{errors}</div>
            <div style={s.chipLbl}>Erros</div>
          </div>
        </div>

        <div style={s.nextBox}>
          <div style={s.nextLabel}>Próximo número</div>
          <div style={s.nextNum}>{next}</div>
        </div>

        <div style={s.grid}>
          {numbers.map((num, idx) => (
            <div key={idx} style={s.cell(num, idx)} onClick={() => handleTap(num, idx)}>
              <span style={s.cellNum(num)}>
                {completed.includes(num) ? "✓" : num}
              </span>
            </div>
          ))}
        </div>

        {/* Barra de progresso */}
        <div style={{ width: "100%", background: C.border, borderRadius: 4, height: 4, marginTop: 20, overflow: "hidden" }}>
          <div style={{ width: `${((next - 1) / count) * 100}%`, background: cfg.color, height: "100%", borderRadius: 4, transition: "width 0.3s ease" }} />
        </div>
      </div>
    </div>
  );
}

// ── APP PRINCIPAL ────────────────────────────────────────
function ModuleSequencia({onBack}) {
  const [screen, setScreen] = useState("home"); // home | game | result
  const [level, setLevel] = useState(null);
  const [result, setResult] = useState(null);

  function handleStart(lvl) {
    setLevel(lvl);
    setScreen("game");
  }

  function handleFinish(res) {
    setResult(res);
    setScreen("result");
  }

  if (screen === "game") return (
    <SeqGame
      level={level}
      onFinish={handleFinish}
      onBack={() => setScreen("home")}
    />
  );

  if (screen === "result") return (
    <SeqResult
      result={result}
      onReplay={() => { setScreen("game"); }}
      onHome={() => setScreen("home")}
    />
  );

  return <SeqHome onStart={handleStart} />;
}

// ── JOGO ─────────────────────────────────────────────────
function GenGame({ onFinish, onBack }) {
  const [phase, setPhase] = useState("starting"); // starting | showing | input | wrong | levelup
  const [sequence, setSequence] = useState([]);
  const [userSeq, setUserSeq] = useState([]);
  const [level, setLevel] = useState(1);
  const [lit, setLit] = useState(null); // id da cor acesa
  const [message, setMessage] = useState("Prepare-se...");
  const [inputEnabled, setInputEnabled] = useState(false);
  const [wrongIdx, setWrongIdx] = useState(null);
  const startTimeRef = useRef(null);
  const isMounted = useRef(true);

  useEffect(() => { isMounted.current = true; return () => { isMounted.current = false; }; }, []);

  // Adiciona cor e mostra sequência
  const showSequence = useCallback(async (seq) => {
    if (!isMounted.current) return;
    setPhase("showing");
    setInputEnabled(false);
    setMessage(`Nível ${seq.length} — Memorize!`);
    await ps(600);

    for (let i = 0; i < seq.length; i++) {
      if (!isMounted.current) return;
      setLit(seq[i]);
      await ps(700);
      setLit(null);
      await ps(300);
    }

    if (!isMounted.current) return;
    setPhase("input");
    setInputEnabled(true);
    setMessage("Sua vez! Repita a sequência.");
    startTimeRef.current = Date.now();
  }, []);

  // Inicia primeiro nível
  useEffect(() => {
    const first = [GEN_COLORS[Math.floor(Math.random() * 4)].id];
    setSequence(first);
    setLevel(1);
    const run = async () => { await ps(800); showSequence(first); };
    run();
  }, []);

  const handleTap = useCallback(async (colorId) => {
    if (!inputEnabled || phase !== "input") return;

    const newUser = [...userSeq, colorId];
    const pos = newUser.length - 1;

    // Flash da cor tocada
    setLit(colorId);
    await ps(200);
    setLit(null);

    if (colorId !== sequence[pos]) {
      // ERROU
      setPhase("wrong");
      setInputEnabled(false);
      setWrongIdx(pos);
      setMessage("Ops! Sequência errada.");
      await ps(900);
      onFinish({ level, time: startTimeRef.current ? Date.now() - startTimeRef.current : 0 });
      return;
    }

    if (newUser.length === sequence.length) {
      // COMPLETOU O NÍVEL
      setUserSeq([]);
      setPhase("levelup");
      setInputEnabled(false);
      setMessage(`✓ Nível ${sequence.length} completo!`);
      await ps(900);
      if (!isMounted.current) return;

      const nextSeq = [...sequence, GEN_COLORS[Math.floor(Math.random() * 4)].id];
      setSequence(nextSeq);
      setLevel(nextSeq.length);
      showSequence(nextSeq);
    } else {
      setUserSeq(newUser);
    }
  }, [inputEnabled, phase, userSeq, sequence, level, onFinish, showSequence]);

  const progress = userSeq.length;
  const total = sequence.length;

  const phaseColor = phase === "wrong" ? C.red : phase === "levelup" ? C.green : phase === "showing" ? C.orange : C.text;

  const s = {
    wrap: { fontFamily:"'DM Sans',sans-serif", background:C.bg, minHeight:"100vh", maxWidth:480, margin:"0 auto", display:"flex", flexDirection:"column" },
    header: { background:C.text, padding:"14px 20px", display:"flex", alignItems:"center", justifyContent:"space-between" },
    logo: { fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:17, color:"#fff" },
    backBtn: { background:"rgba(255,255,255,0.1)", border:"none", borderRadius:10, padding:"6px 12px", color:"#fff", fontSize:13, fontWeight:600, cursor:"pointer" },
    body: { padding:"20px 18px", flex:1, display:"flex", flexDirection:"column", alignItems:"center" },
    levelBadge: { background:C.surface, border:`2px solid ${C.orange}`, borderRadius:20, padding:"8px 24px", marginBottom:16, textAlign:"center" },
    levelNum: { fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:28, color:C.orange },
    levelLbl: { fontSize:11, color:C.muted, textTransform:"uppercase", letterSpacing:1 },
    msgBox: { background:C.surface, border:`1px solid ${C.border}`, borderRadius:14, padding:"12px 20px", marginBottom:20, width:"100%", textAlign:"center" },
    msgText: { fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:15, color:phaseColor },
    progressRow: { display:"flex", gap:6, marginBottom:24, flexWrap:"wrap", justifyContent:"center" },
    progDot: (i) => ({
      width:12, height:12, borderRadius:"50%",
      background: i < userSeq.length ? C.green : i < total ? C.border : C.border,
      border: i === userSeq.length && phase === "input" ? `2px solid ${C.orange}` : "2px solid transparent",
      transition:"all 0.2s",
    }),
    gridWrap: { display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, width:"100%", maxWidth:320, marginBottom:24 },
    colorBtn: (c) => {
      const isLit = lit === c.id;
      const isWrong = phase === "wrong" && userSeq[userSeq.length-1] === c.id;
      return {
        height:130,
        background: isLit ? c.bg : isWrong ? C.red : c.bg + "CC",
        borderRadius:22,
        border: `3px solid ${isLit ? "#fff" : isWrong ? C.red : c.dark}`,
        cursor: inputEnabled ? "pointer" : "default",
        display:"flex", alignItems:"center", justifyContent:"center",
        boxShadow: isLit ? `0 0 0 6px ${c.bg}50, 0 8px 24px ${c.bg}60` : `0 4px 12px ${c.bg}30`,
        transform: isLit ? "scale(0.95)" : "scale(1)",
        transition:"all 0.15s",
        userSelect:"none",
      };
    },
    colorLabel: (c) => ({
      fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:15,
      color: lit === c.id ? "#fff" : "#ffffff",
      textShadow:"0 1px 4px #00000040",
      userSelect:"none",
    }),
    seqIndicator: { display:"flex", gap:8, marginBottom:16, alignItems:"center" },
    seqTitle: { fontSize:12, color:C.muted, fontWeight:600 },
    seqDots: { display:"flex", gap:4 },
    seqDot: (i) => {
      const cid = sequence[i];
      const col = GEN_COLORS.find(c => c.id === cid);
      const done = i < userSeq.length;
      const current = i === userSeq.length && phase === "input";
      return {
        width:14, height:14, borderRadius:"50%",
        background: done ? col?.bg : current ? col?.bg + "80" : "#DDE3EC",
        border: current ? `2px solid ${col?.bg}` : "2px solid transparent",
        transition:"all 0.2s",
      };
    },
  };

  return (
    <div style={s.wrap}>
      <div style={s.header}>
        <button style={s.backBtn} onClick={onBack}><IcoBack/> Sair</button>
        <div style={s.logo}>🎨 Gênio das Cores</div>
        <div style={{fontSize:12, color:"#ffffff80", fontWeight:600}}>Nível {level}</div>
      </div>
      <div style={s.body}>

        <div style={s.levelBadge}>
          <div style={s.levelLbl}>Nível Atual</div>
          <div style={s.levelNum}>{level}</div>
        </div>

        <div style={s.msgBox}>
          <div style={s.msgText}>{message}</div>
        </div>

        {/* Indicador da sequência */}
        {sequence.length > 0 && (
          <div style={s.seqIndicator}>
            <div style={s.seqTitle}>Sequência:</div>
            <div style={s.seqDots}>
              {sequence.map((_, i) => (
                <div key={i} style={s.seqDot(i)} />
              ))}
            </div>
          </div>
        )}

        {/* Grid de cores */}
        <div style={s.gridWrap}>
          {GEN_COLORS.map(c => (
            <div key={c.id} style={s.colorBtn(c)} onClick={() => handleTap(c.id)}>
              <span style={s.colorLabel(c)}>{c.label}</span>
            </div>
          ))}
        </div>

        {/* Progresso da entrada */}
        {phase === "input" && (
          <div style={{textAlign:"center", fontSize:13, color:C.muted}}>
            {userSeq.length}/{total} cores tocadas
          </div>
        )}
      </div>
    </div>
  );
}

// ── APP PRINCIPAL ─────────────────────────────────────────
function ModuleGenio({onBack}) {
  const [screen, setScreen] = useState("home");
  const [result, setResult] = useState(null);
  const [bestLevel, setBestLevel] = useState(0);

  function handleFinish(res) {
    if (res.level > bestLevel) setBestLevel(res.level);
    setResult(res);
    setScreen("result");
  }

  if (screen === "game") return (
    <GenGame
      onFinish={handleFinish}
      onBack={() => setScreen("home")}
    />
  );

  if (screen === "result") return (
    <GenResult
      result={result}
      onReplay={() => setScreen("game")}
      onHome={() => setScreen("home")}
    />
  );

  return <GenHome onStart={() => setScreen("game")} bestLevel={bestLevel} />;
}

  const [preview, setPreview] = useState(true); // mostra todas as cartas por 2s
  const [previewCount, setPreviewCount] = useState(2);
  const [locked, setLocked] = useState(true);
  const [elapsed, setElapsed] = useState(0);
  const startRef = useRef(null);
  const timerRef = useRef(null);
  const lockRef = useRef(false);

  useEffect(() => {
    const items = sh(themeData.items).slice(0, cfg.pairs);
    const deck = sh([...items, ...items].map((emoji, i) => ({ id: i, emoji, pairId: emoji })));
    setCards(deck);

    // Conta regressiva do preview
    setPreview(true);
    setLocked(true);
    setPreviewCount(2);
    const interval = setInterval(() => {
      setPreviewCount(p => {
        if (p <= 1) {
          clearInterval(interval);
          setPreview(false);
          setLocked(false);
          startRef.current = Date.now();
          timerRef.current = setInterval(() => setElapsed(Date.now() - startRef.current), 500);
          return 0;
        }
        return p - 1;
      });
    }, 1000);
    return () => { clearInterval(interval); clearInterval(timerRef.current); };
  }, []);

  const handleFlip = useCallback((idx) => {
    if (lockRef.current || locked || flipped.includes(idx) || matched.includes(idx)) return;

    const newFlipped = [...flipped, idx];
    setFlipped(newFlipped);

    if (newFlipped.length === 2) {
      lockRef.current = true;
      setMoves(m => m + 1);
      const [a, b] = newFlipped;
      if (cards[a].pairId === cards[b].pairId) {
        // PAR ENCONTRADO
        const newMatched = [...matched, a, b];
        setMatched(newMatched);
        setFlipped([]);
        lockRef.current = false;
        if (newMatched.length === cards.length) {
          clearInterval(timerRef.current);
          setTimeout(() => onFinish({ diff, theme, moves: moves + 1, time: Date.now() - startRef.current, pairs: cfg.pairs }), 600);
        }
      } else {
        // NÃO COMBINA
        setTimeout(() => {
          setFlipped([]);
          lockRef.current = false;
        }, 1000);
      }
    }
  }, [flipped, matched, locked, cards, moves, diff, theme, cfg.pairs, onFinish]);

  const pairsFound = matched.length / 2;
  const cols = cfg.cols;
  const cellSize = cols === 2 ? 130 : cols === 4 ? 76 : 76;
  const fontSize = cols === 2 ? 52 : 38;

  const s = {
    wrap: { fontFamily:"'DM Sans',sans-serif", background:C.bg, minHeight:"100vh", maxWidth:480, margin:"0 auto", display:"flex", flexDirection:"column" },
    header: { background:C.text, padding:"12px 16px", display:"flex", alignItems:"center", justifyContent:"space-between" },
    logo: { fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:16, color:"#fff" },
    backBtn: { background:"rgba(255,255,255,0.1)", border:"none", borderRadius:10, padding:"6px 12px", color:"#fff", fontSize:13, fontWeight:600, cursor:"pointer" },
    body: { padding:"14px 14px", flex:1, display:"flex", flexDirection:"column", alignItems:"center" },
    statsRow: { display:"flex", gap:8, width:"100%", marginBottom:14 },
    chip: (color) => ({ flex:1, background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:"8px 6px", textAlign:"center", borderTop:`3px solid ${color}` }),
    chipVal: { fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:17, color:C.text },
    chipLbl: { fontSize:9, color:C.muted, textTransform:"uppercase", letterSpacing:"0.5px", marginTop:1 },
    previewBanner: { background:"#3B82F620", border:`1px solid #3B82F6`, borderRadius:12, padding:"8px 16px", marginBottom:12, textAlign:"center", width:"100%" },
    previewText: { fontSize:13, fontWeight:700, color:"#3B82F6" },
    grid: { display:"grid", gridTemplateColumns:`repeat(${cols}, ${cellSize}px)`, gap:cols===2?12:8, justifyContent:"center" },
    card: (idx) => {
      const isFlipped = flipped.includes(idx) || matched.includes(idx);
      const isMatched = matched.includes(idx);
      const isPreview = preview;
      const show = isFlipped || isPreview;
      return {
        width:cellSize, height:cellSize, borderRadius:14,
        background: show ? (isMatched ? C.green+"20" : C.surface) : cfg.color+"15",
        border: `2px solid ${isMatched ? C.green : show ? cfg.color : C.border}`,
        display:"flex", alignItems:"center", justifyContent:"center",
        cursor: (!locked && !flipped.includes(idx) && !matched.includes(idx)) ? "pointer" : "default",
        transition:"all 0.2s",
        boxShadow: isMatched ? `0 0 0 3px ${C.green}30` : show ? `0 2px 8px ${cfg.color}20` : "0 1px 4px #00000010",
        transform: isMatched ? "scale(0.96)" : "scale(1)",
        userSelect:"none",
        fontSize,
      };
    },
    cardBack: { fontSize:28, color:cfg.color, userSelect:"none" },
  };

  return (
    <div style={s.wrap}>
      <div style={s.header}>
        <button style={s.backBtn} onClick={onBack}><IcoBack/> Sair</button>
        <div style={s.logo}>🃏 {themeData.label}</div>
        <div style={{fontSize:12,color:"#ffffff80",fontWeight:600}}>{cfg.label}</div>
      </div>
      <div style={s.body}>
        <div style={s.statsRow}>
          <div style={s.chip(C.green)}>
            <div style={{...s.chipVal,color:C.green}}>{pairsFound}/{cfg.pairs}</div>
            <div style={s.chipLbl}>Pares</div>
          </div>
          <div style={s.chip(C.orange)}>
            <div style={s.chipVal}>{moves}</div>
            <div style={s.chipLbl}>Movimentos</div>
          </div>
          <div style={s.chip(cfg.color)}>
            <div style={{...s.chipVal,color:cfg.color}}>{fm(elapsed)}</div>
            <div style={s.chipLbl}>Tempo</div>
          </div>
        </div>

        {preview && (
          <div style={s.previewBanner}>
            <div style={s.previewText}>👀 Memorize as cartas... {previewCount}s</div>
          </div>
        )}

        <div style={s.grid}>
          {cards.map((card, idx) => (
            <div key={idx} style={s.card(idx)} onClick={() => handleFlip(idx)}>
              {(flipped.includes(idx) || matched.includes(idx) || preview)
                ? card.emoji
                : <span style={s.cardBack}>✦</span>
              }
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ModulePares({onBack}) {
  const [screen, setScreen] = useState("home");
  const [config, setConfig] = useState({ diff:"medio", theme:"frutas" });
  const [result, setResult] = useState(null);

  function handleStart(diff, theme) {
    setConfig({ diff, theme });
    setScreen("game");
  }
  function handleFinish(res) {
    setResult(res);
    setScreen("result");
  }

  if (screen === "game") return (
    <ParGame key={JSON.stringify(config)} diff={config.diff} theme={config.theme}
      onFinish={handleFinish} onBack={() => setScreen("home")} />
  );
  if (screen === "result") return (
    <ParResult result={result} onReplay={() => setScreen("game")} onHome={() => setScreen("home")} />
  );
  return <ParHome onStart={handleStart} />;
}

const PAD_DIFFS = {
  facil:   { label:"Fácil",   cols:3, totalPatterns:10, color:C.green,  desc:"Grid 3×3 · 9 células",  minFilled:3, maxFilled:5 },
  medio:   { label:"Médio",   cols:4, totalPatterns:10, color:C.blue,   desc:"Grid 4×4 · 16 células", minFilled:5, maxFilled:9 },
  dificil: { label:"Difícil", cols:5, totalPatterns:10, color:C.yellow, desc:"Grid 5×5 · 25 células", minFilled:8, maxFilled:14 },
  expert:  { label:"Expert",  cols:6, totalPatterns:10, color:C.red,    desc:"Grid 6×6 · 36 células", minFilled:12,maxFilled:20 },
};

function genPat(cols, min, max) {
  const total = cols * cols;
  const count = min + Math.floor(Math.random() * (max - min + 1));
  const cells = Array(total).fill(false);
  let filled = 0;
  while (filled < count) {
    const idx = Math.floor(Math.random() * total);
    if (!cells[idx]) { cells[idx] = true; filled++; }
  }
  return cells;
}

function cntDiff(a, b) {
  return a.reduce((acc, v, i) => acc + (v !== b[i] ? 1 : 0), 0);
}

// ── JOGO ─────────────────────────────────────────────────
function PadGame({ diff, onFinish, onBack }) {
  const cfg = PAD_DIFFS[diff];
  const cols = cfg.cols;
  const total = cols * cols;

  const [patternIdx, setPatternIdx] = useState(0);
  const [pattern, setPattern] = useState([]);
  const [userGrid, setUserGrid] = useState(Array(total).fill(false));
  const [phase, setPhase] = useState("playing"); // playing | checked | correct
  const [result, setResult] = useState(null); // { correct, wrong, missing }
  const [score, setScore] = useState({ acertos:0, erradas:0 });
  const [elapsed, setElapsed] = useState(0);
  const startRef = useRef(Date.now());
  const timerRef = useRef(null);

  // Gera novo padrão
  function nextPattern(idx) {
    const p = genPat(cols, cfg.minFilled, cfg.maxFilled);
    setPattern(p);
    setUserGrid(Array(total).fill(false));
    setPhase("playing");
    setResult(null);
  }

  useEffect(() => {
    nextPattern(0);
    startRef.current = Date.now();
    timerRef.current = setInterval(() => setElapsed(Date.now() - startRef.current), 500);
    return () => clearInterval(timerRef.current);
  }, []);

  function toggleCell(idx) {
    if (phase !== "playing") return;
    setUserGrid(g => { const n=[...g]; n[idx]=!n[idx]; return n; });
  }

  function clearGrid() {
    setUserGrid(Array(total).fill(false));
    setPhase("playing");
    setResult(null);
  }

  function verify() {
    const errors = cntDiff(pattern, userGrid);
    const correct = total - errors;
    // células corretas preenchidas
    const correctFilled = pattern.filter((v,i) => v && userGrid[i]).length;
    // células erradas (usuário marcou mas não devia)
    const wrongFilled = userGrid.filter((v,i) => v && !pattern[i]).length;
    // células faltando (devia marcar mas não marcou)
    const missing = pattern.filter((v,i) => v && !userGrid[i]).length;

    setResult({ correctFilled, wrongFilled, missing, errors });
    setPhase("checked");

    if (errors === 0) {
      setScore(s => ({...s, acertos: s.acertos+1}));
      setTimeout(() => {
        if (patternIdx + 1 >= cfg.totalPatterns) {
          clearInterval(timerRef.current);
          onFinish({ diff, score: score.acertos + 1, total: cfg.totalPatterns, time: Date.now() - startRef.current });
        } else {
          setPatternIdx(p => p+1);
          nextPattern(patternIdx+1);
        }
      }, 900);
    } else {
      setScore(s => ({...s, erradas: s.erradas+1}));
    }
  }

  function skip() {
    setScore(s => ({...s, erradas: s.erradas+1}));
    if (patternIdx + 1 >= cfg.totalPatterns) {
      clearInterval(timerRef.current);
      onFinish({ diff, score: score.acertos, total: cfg.totalPatterns, time: Date.now() - startRef.current });
    } else {
      setPatternIdx(p => p+1);
      nextPattern(patternIdx+1);
    }
  }

  const progress = ((patternIdx) / cfg.totalPatterns) * 100;
  const cellPx = cols <= 3 ? 54 : cols <= 4 ? 44 : cols <= 5 ? 36 : 30;
  const gap = cols <= 3 ? 6 : 5;

  function cellStyle(idx, isModel) {
    const filled = isModel ? pattern[idx] : userGrid[idx];
    const base = {
      width:cellPx, height:cellPx, borderRadius: cellPx > 40 ? 10 : 8,
      cursor: (!isModel && phase==="playing") ? "pointer" : "default",
      display:"flex", alignItems:"center", justifyContent:"center",
      transition:"all 0.15s", userSelect:"none",
      border:"2px solid transparent",
    };
    if (isModel) {
      return { ...base, background: filled ? cfg.color : C.border+"80", border:`2px solid ${filled?cfg.color:C.border}` };
    }
    // User grid com feedback
    if (phase === "checked") {
      if (filled && pattern[idx]) return {...base, background:C.green+"30", border:`2px solid ${C.green}`, boxShadow:`0 0 0 2px ${C.green}30` };
      if (filled && !pattern[idx]) return {...base, background:C.red+"20", border:`2px solid ${C.red}` };
      if (!filled && pattern[idx]) return {...base, background:C.yellow+"20", border:`2px dashed ${C.yellow}` };
      return {...base, background:C.border+"50", border:`2px solid ${C.border}` };
    }
    return { ...base, background: filled ? cfg.color+"CC" : C.border+"50", border:`2px solid ${filled?cfg.color:C.border}` };
  }

  const s = {
    wrap:{ fontFamily:"'DM Sans',sans-serif", background:C.bg, minHeight:"100vh", maxWidth:480, margin:"0 auto", display:"flex", flexDirection:"column" },
    header:{ background:C.text, padding:"12px 16px", display:"flex", alignItems:"center", justifyContent:"space-between" },
    logo:{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:15, color:"#fff" },
    backBtn:{ background:"rgba(255,255,255,0.1)", border:"none", borderRadius:10, padding:"5px 10px", color:"#fff", fontSize:12, fontWeight:600, cursor:"pointer" },
    progWrap:{ background:"#2e3a5a", height:4 },
    progBar:{ height:"100%", background:cfg.color, width:`${progress}%`, transition:"width 0.4s ease" },
    body:{ padding:"12px 14px", flex:1, display:"flex", flexDirection:"column" },
    statsRow:{ display:"flex", gap:8, marginBottom:12 },
    chip:(color)=>({ flex:1, background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:"8px 6px", textAlign:"center", borderTop:`3px solid ${color}` }),
    chipVal:{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:16, color:C.text },
    chipLbl:{ fontSize:9, color:C.muted, textTransform:"uppercase", letterSpacing:"0.4px", marginTop:1 },
    patternRow:{ display:"flex", gap:8, justifyContent:"center", alignItems:"flex-start", marginBottom:14, flex:1 },
    gridWrap:{ display:"flex", flexDirection:"column", alignItems:"center" },
    gridLabel:{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:10, color:C.muted, textTransform:"uppercase", letterSpacing:1, marginBottom:8, textAlign:"center" },
    grid:(n)=>({ display:"grid", gridTemplateColumns:`repeat(${n}, ${cellPx}px)`, gap:`${gap}px` }),

};

const CW_SIZES = {
  medio:  { label:"Médio",  size:10, wordCount:6, color:C.yellow },
  dificil:{ label:"Difícil",size:12, wordCount:9, color:C.red },
};

const CW_DIRS = [
  [0,1],[1,0],[1,1],[0,-1],[-1,0],[-1,-1],[1,-1],[-1,1]
];

function buildCW(size, words) {
  const grid = Array.from({length:size},()=>Array(size).fill(""));
  const placed = [];

  for (const word of words) {
    let ok = false;
    for (let tries=0; tries<200 && !ok; tries++) {
      const [dr,dc] = CW_DIRS[Math.floor(Math.random()*CW_DIRS.length)];
      const r = Math.floor(Math.random()*size);
      const c = Math.floor(Math.random()*size);
      let valid = true;
      const cells = [];
      for (let i=0; i<word.length; i++) {
        const nr=r+dr*i, nc=c+dc*i;
        if (nr<0||nr>=size||nc<0||nc>=size) { valid=false; break; }
        if (grid[nr][nc]!=="" && grid[nr][nc]!==word[i]) { valid=false; break; }
        cells.push([nr,nc]);
      }
      if (valid) {
        cells.forEach(([nr,nc],i)=>grid[nr][nc]=word[i]);
        placed.push({ word, cells });
        ok=true;
      }
    }
  }

  // Preenche espaços vazios
  const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  for (let r=0;r<size;r++)
    for (let c=0;c<size;c++)
      if (!grid[r][c]) grid[r][c]=letters[Math.floor(Math.random()*letters.length)];

  return { grid, placed };
}

// ── JOGO ─────────────────────────────────────────────────
function CwGame({ theme, size, onFinish, onBack }) {
  const themeData = CW_THEMES[theme];
  const sizeCfg = CW_SIZES[size];
  const gridSize = sizeCfg.size;

  const [gameData, setGameData] = useState(null);
  const [foundWords, setFoundWords] = useState([]);
  const [selecting, setSelecting] = useState(null); // {start, cells}
  const [highlighted, setHighlighted] = useState([]); // células selecionadas agora
  const [wrongFlash, setWrongFlash] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const startRef = useRef(Date.now());
  const timerRef = useRef(null);
  const isSelecting = useRef(false);

  useEffect(()=>{
    const words = [...themeData.words].sort(()=>Math.random()-0.5).slice(0, sizeCfg.wordCount);
    const data = buildCW(gridSize, words);
    setGameData(data);
    startRef.current = Date.now();
    timerRef.current = setInterval(()=>setElapsed(Date.now()-startRef.current), 500);
    return ()=>clearInterval(timerRef.current);
  },[]);

  const foundCells = foundWords.flatMap(fw => fw.cells.map(([r,c])=>`${r},${c}`));

  function getDirection(r1,c1,r2,c2) {
    if (r1===r2&&c1===c2) return [0,0];
    const dr=Math.sign(r2-r1), dc=Math.sign(c2-c1);
    return [dr,dc];
  }

  function cellsBetween(r1,c1,r2,c2) {
    const [dr,dc]=getDirection(r1,c1,r2,c2);
    if (dr===0&&dc===0) return [[r1,c1]];
    const cells=[];
    let r=r1,c=c1;
    while (true) {
      cells.push([r,c]);
      if (r===r2&&c===c2) break;
      r+=dr; c+=dc;
      if (cells.length>gridSize*2) break;
    }
    return cells;
  }

  function handleCellPress(r,c) {
    if (!selecting) {
      isSelecting.current=true;
      setSelecting({start:[r,c]});
      setHighlighted([[r,c]]);
    } else {
      // fim da seleção
      const [r1,c1]=selecting.start;
      const cells=cellsBetween(r1,c1,r,c);
      const word=cells.map(([rr,cc])=>gameData.grid[rr][cc]).join("");
      const wordRev=[...word].reverse().join("");
      const match=gameData.placed.find(p=>p.word===word||p.word===wordRev);

      if (match && !foundWords.find(f=>f.word===match.word)) {
        const newFound=[...foundWords,match];
        setFoundWords(newFound);
        setSelecting(null);
        setHighlighted([]);
        if (newFound.length===gameData.placed.length) {
          clearInterval(timerRef.current);
          setTimeout(()=>onFinish({theme,size,words:newFound.length,time:Date.now()-startRef.current}),600);
        }
      } else {
        setWrongFlash(true);
        setTimeout(()=>{ setWrongFlash(false); setSelecting(null); setHighlighted([]); },500);
      }
    }
  }

  function handleCellHover(r,c) {
    if (!selecting) return;
    const [r1,c1]=selecting.start;
    const cells=cellsBetween(r1,c1,r,c);
    setHighlighted(cells);
  }

  if (!gameData) return <div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"sans-serif",color:C.muted}}>Gerando...</div>;

  const cellPx = gridSize<=10 ? 32 : 27;
  const fontSize = gridSize<=10 ? 14 : 12;
  const foundCellSet = new Set(foundWords.flatMap(fw=>fw.cells.map(([r,c])=>`${r},${c}`)));
  const highlightSet = new Set(highlighted.map(([r,c])=>`${r},${c}`));
  const startCell = selecting ? `${selecting.start[0]},${selecting.start[1]}` : null;

  const s = {
    wrap:{ fontFamily:"'DM Sans',sans-serif", background:C.bg, minHeight:"100vh", maxWidth:480, margin:"0 auto", display:"flex", flexDirection:"column" },
    header:{ background:C.text, padding:"12px 16px", display:"flex", alignItems:"center", justifyContent:"space-between" },
    logo:{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:15, color:"#fff" },
    backBtn:{ background:"rgba(255,255,255,0.1)", border:"none", borderRadius:10, padding:"5px 10px", color:"#fff", fontSize:12, fontWeight:600, cursor:"pointer" },
    body:{ padding:"12px 12px", flex:1, display:"flex", flexDirection:"column", alignItems:"center" },
    statsRow:{ display:"flex", gap:8, width:"100%", marginBottom:12 },
    chip:(color)=>({ flex:1, background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:"8px 6px", textAlign:"center", borderTop:`3px solid ${color}` }),
    chipVal:{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:16, color:C.text },
    chipLbl:{ fontSize:9, color:C.muted, textTransform:"uppercase", letterSpacing:"0.4px", marginTop:1 },
    gridWrap:{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:16, padding:10, marginBottom:12, boxShadow:"0 2px 10px #1A234010" },
    row:{ display:"flex" },
    cell:(r,c)=>{
      const key=`${r},${c}`;
      const isFound=foundCellSet.has(key);
      const isHl=highlightSet.has(key);
      const isStart=startCell===key;
      const isWrong=wrongFlash&&isHl;
      return {
        width:cellPx, height:cellPx,
        display:"flex", alignItems:"center", justifyContent:"center",
        fontSize, fontWeight:700,
        fontFamily:"'Syne',sans-serif",
        cursor:"pointer",
        borderRadius:6,
        background: isWrong?C.red+"30": isFound?themeData.color+"25": isStart?"#FF560325": isHl?themeData.color+"35":"transparent",
        color: isFound?themeData.color: isStart?C.orange: isHl?themeData.color:C.text,
        border:`1.5px solid ${isFound?themeData.color:isStart?C.orange:isHl?themeData.color+"80":"transparent"}`,
        transition:"all 0.1s",
        userSelect:"none",
      };
    },

            <div style={s.chipLbl}>Progresso</div>
          </div>
        </div>

        <div style={s.hint}>
          {selecting ? "🎯 Toque na letra final da palavra" : "👆 Toque na letra inicial da palavra"}
        </div>

        <div style={s.gridWrap}>
          {gameData.grid.map((row,r)=>(
            <div key={r} style={s.row}>
              {row.map((letter,c)=>(
                <div key={c} style={s.cell(r,c)}
                  onClick={()=>handleCellPress(r,c)}
                  onMouseEnter={()=>handleCellHover(r,c)}
                  onTouchMove={(e)=>{
                    const t=e.touches[0];
                    const el=document.elementFromPoint(t.clientX,t.clientY);
                    if (el?.dataset?.row) handleCellHover(+el.dataset.row,+el.dataset.col);
                  }}
                  data-row={r} data-col={c}
                >{letter}</div>
              ))}
            </div>
          ))}
        </div>

        <div style={s.wordList}>
          {gameData.placed.map(({word})=>{
            const found=!!foundWords.find(f=>f.word===word);
            return <div key={word} style={s.wordChip(found)}>{word}</div>;
          })}
        </div>
      </div>
    </div>
  );
}

function ModuleCaca({onBack}) {
  const [screen, setScreen] = useState("home");
  const [config, setConfig] = useState({theme:"frutas",size:"medio"});
  const [result, setResult] = useState(null);

  if (screen==="game") return (

      onFinish={r=>{setResult(r);setScreen("result");}} onBack={()=>setScreen("home")}/>

  if (screen==="result") return (
    <CwResult result={result} onReplay={()=>setScreen("game")} onHome={()=>setScreen("home")}/>

  return <CwHome onStart={(t,s)=>{setConfig({theme:t,size:s});setScreen("game");}}/>;
}

// ── ATIVIDADE ─────────────────────────────────────────────
function LwActivity({ activity, onFinish, onBack }) {
  const [words, setWords] = useState(Array(activity.goal).fill(""));
  const [answered, setAnswered] = useState(0);
  const [elapsed, setElapsed] = useState(0);
  const [finished, setFinished] = useState(false);
  const startRef = useRef(Date.now());
  const timerRef = useRef(null);
  const inputRefs = useRef([]);

  useEffect(()=>{
    timerRef.current = setInterval(()=>setElapsed(Date.now()-startRef.current),500);
    return ()=>clearInterval(timerRef.current);
  },[]);

  function handleChange(idx, val) {
    const newWords=[...words];
    newWords[idx]=val;
    setWords(newWords);
    const filled=newWords.filter(w=>w.trim().length>0).length;
    setAnswered(filled);
  }

  function handleKeyDown(idx, e) {
    if (e.key==="Enter" && idx<activity.goal-1) {
      inputRefs.current[idx+1]?.focus();
    }
  }

  function handleFinish() {
    clearInterval(timerRef.current);
    const validWords=words.filter(w=>w.trim().length>0);
    onFinish({ activity, words:validWords, time:Date.now()-startRef.current });
  }

  const progress=(answered/activity.goal)*100;

  const s = {
    wrap:{ fontFamily:"'DM Sans',sans-serif", background:C.bg, minHeight:"100vh", maxWidth:480, margin:"0 auto", display:"flex", flexDirection:"column" },
    header:{ background:C.text, padding:"12px 16px", display:"flex", alignItems:"center", justifyContent:"space-between" },
    logo:{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:15, color:"#fff" },
    backBtn:{ background:"rgba(255,255,255,0.1)", border:"none", borderRadius:10, padding:"5px 10px", color:"#fff", fontSize:12, fontWeight:600, cursor:"pointer" },
    progWrap:{ background:"#2e3a5a", height:4 },
    progBar:{ height:"100%", background:activity.color, width:`${progress}%`, transition:"width 0.3s ease" },
    body:{ padding:"14px 16px", flex:1, display:"flex", flexDirection:"column", overflowY:"auto" },
    titleBox:{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:14, padding:"14px 16px", marginBottom:14 },
    titleText:{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:17, color:C.text, marginBottom:4 },
    hintText:{ fontSize:12, color:C.muted },
    statsRow:{ display:"flex", gap:8, marginBottom:14 },
    chip:(color)=>({ flex:1, background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:"8px 6px", textAlign:"center", borderTop:`3px solid ${color}` }),
    chipVal:{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:16, color:C.text },
    chipLbl:{ fontSize:9, color:C.muted, textTransform:"uppercase", letterSpacing:"0.4px", marginTop:1 },
    inputList:{ display:"flex", flexDirection:"column", gap:8, marginBottom:16 },
    inputRow:{ display:"flex", alignItems:"center", gap:10 },
    numLabel:{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:13, color:C.muted, width:28, textAlign:"right", flexShrink:0 },
    inputField:(val)=>({ flex:1, background:val.trim()?activity.color+"12":C.surface, border:`1.5px solid ${val.trim()?activity.color:C.border}`, borderRadius:10, padding:"10px 14px", fontSize:14, color:C.text, outline:"none", fontFamily:"'DM Sans',sans-serif", transition:"all 0.2s" }),
    checkIcon:(val)=>({ fontSize:16, color:val.trim()?activity.color:C.border, transition:"color 0.2s", flexShrink:0 }),
    finishBtn:{ background:C.orange, color:"#fff", border:"none", borderRadius:14, padding:16, fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:15, cursor:"pointer", width:"100%", boxShadow:`0 6px 20px ${C.orange}40` },
  };

  return (
    <div style={s.wrap}>
      <div style={s.header}>
        <button style={s.backBtn} onClick={onBack}><IcoBack/> Sair</button>
        <div style={s.logo}>📋 Listar Palavras</div>
        <div style={{fontSize:11,color:"#ffffff80",fontWeight:600}}>{fm(elapsed)}</div>
      </div>
      <div style={s.progWrap}><div style={s.progBar}/></div>
      <div style={s.body}>
        <div style={s.titleBox}>
          <div style={s.titleText}>{activity.label}</div>
          <div style={s.hintText}>{activity.hint}</div>
        </div>

        <div style={s.statsRow}>
          <div style={s.chip(activity.color)}>
            <div style={{...s.chipVal,color:activity.color}}>{answered}</div>
            <div style={s.chipLbl}>Respondidas</div>
          </div>
          <div style={s.chip(C.muted)}>
            <div style={s.chipVal}>{activity.goal-answered}</div>
            <div style={s.chipLbl}>Restantes</div>
          </div>
          <div style={s.chip(C.orange)}>
            <div style={s.chipVal}>{fm(elapsed)}</div>
            <div style={s.chipLbl}>Tempo</div>
          </div>
        </div>

        <div style={s.inputList}>
          {words.map((w,i)=>(
            <div key={i} style={s.inputRow}>
              <div style={s.numLabel}>{String(i+1).padStart(2,"0")}.</div>
              <input
                ref={el=>inputRefs.current[i]=el}
                style={s.inputField(w)}

    <LwActivity key={activity.id+Date.now()} activity={activity}
      onFinish={r=>{setResult(r);setScreen("result");}} onBack={()=>setScreen("home")}/>
  );
  if (screen==="result") return (
    <LwResult result={result} onReplay={()=>setScreen("activity")} onHome={()=>setScreen("home")}/>
  );
  return <LwHome onStart={a=>{setActivity(a);setScreen("activity");}}/>;
}

// ── ATIVIDADE TEXTO LIVRE ─────────────────────────────────
function ClText({ activity, onFinish, onBack }) {
  const [answers, setAnswers] = useState(activity.words.map(()=>""));
  const [checked, setChecked] = useState(false);
  const [results, setResults] = useState([]);
  const [elapsed, setElapsed] = useState(0);
  const startRef = useRef(Date.now());
  const timerRef = useRef(null);
  const inputRefs = useRef([]);

  useEffect(()=>{
    timerRef.current=setInterval(()=>setElapsed(Date.now()-startRef.current),500);
    return()=>clearInterval(timerRef.current);
  },[]);

  const answered = answers.filter(a=>a.trim().length>0).length;

  function handleChange(i,val) {
    const n=[...answers]; n[i]=val.toUpperCase().slice(0,1); setAnswers(n);
    if (val.length===1 && i<activity.words.length-1) inputRefs.current[i+1]?.focus();
  }

  function verify() {
    clearInterval(timerRef.current);
    const res=activity.words.map((w,i)=>({ correct: answers[i]===activity.letters[i], given:answers[i], expected:activity.letters[i] }));
    setResults(res);
    setChecked(true);
  }

  function handleFinish() {
    const correct=results.filter(r=>r.correct).length;
    onFinish({ activity, correct, total:activity.words.length, time:Date.now()-startRef.current });
  }

  const progress=(answered/activity.words.length)*100;

  const s = {
    wrap:{ fontFamily:"'DM Sans',sans-serif", background:C.bg, minHeight:"100vh", maxWidth:480, margin:"0 auto", display:"flex", flexDirection:"column" },

    backBtn:{ background:"rgba(255,255,255,0.1)", border:"none", borderRadius:10, padding:"5px 10px", color:"#fff", fontSize:12, fontWeight:600, cursor:"pointer" },

    titleText:{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:16, color:C.text },
    statsRow:{ display:"flex", gap:8, marginBottom:12 },
    chip:(color)=>({ flex:1, background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:"7px 6px", textAlign:"center", borderTop:`3px solid ${color}` }),
    chipVal:{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:15, color:C.text },

    wordList:{ display:"flex", flexDirection:"column", gap:8, marginBottom:14 },

      const correct=checked&&results[i]?.correct;
      const wrong=checked&&!results[i]?.correct;
      return { width:38, height:42, textAlign:"center", fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:18, textTransform:"uppercase", background:correct?C.green+"18":wrong?C.red+"12":C.surface, border:`2px solid ${correct?C.green:wrong?C.red:activity.color}`, borderRadius:8, color:correct?C.green:wrong?C.red:activity.color, outline:"none" };
    },
    wordDisplay:(i)=>({ fontSize:15, fontWeight:600, color:C.text }),
    correctionTag:(i)=>checked&&!results[i]?.correct?{ fontSize:11, color:C.red, fontWeight:600 }:null,
    btn:{ background:checked?C.orange:activity.color, color:"#fff", border:"none", borderRadius:13, padding:15, fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:15, cursor:"pointer", width:"100%", boxShadow:`0 4px 16px ${activity.color}40` },

          <div style={s.chip(activity.color)}>
            <div style={{...s.chipVal,color:activity.color}}>{answered}/{activity.words.length}</div>
            <div style={s.chipLbl}>Respondidas</div>
          </div>
          {checked&&<div style={s.chip(C.green)}>
            <div style={{...s.chipVal,color:C.green}}>{results.filter(r=>r.correct).length}</div>
            <div style={s.chipLbl}>Acertos</div>

          <div style={s.chip(C.orange)}>

            <div style={s.chipLbl}>Tempo</div>

          {activity.words.map((w,i)=>(
            <div key={i} style={s.wordRow}>
              <div style={s.numLbl}>{String(i+1).padStart(2,"0")}.</div>
              <input ref={el=>inputRefs.current[i]=el} style={s.letterInput(i)}

        </div>

        <button style={s.btn} onClick={checked?handleFinish:verify}>
          {checked?"Ver Resultado →":"Verificar ✓"}
        </button>
      </div>
    </div>
  );
}

  );
}

// ── APP ───────────────────────────────────────────────────
function ModuleCompletar({onBack}) {
  const [screen, setScreen] = useState("home");
  const [activity, setActivity] = useState(null);
  const [result, setResult] = useState(null);

  function handleStart(a) { setActivity(a); setScreen("activity"); }
  function handleFinish(r) { setResult(r); setScreen("result"); }

  if (screen==="activity" && activity) {
    return activity.isChoice
      ? <ClChoice key={activity.id+Date.now()} activity={activity} onFinish={handleFinish} onBack={()=>setScreen("home")}/>
      : <ClText   key={activity.id+Date.now()} activity={activity} onFinish={handleFinish} onBack={()=>setScreen("home")}/>;
  }
  if (screen==="result") return (
    <ClResult result={result} onReplay={()=>setScreen("activity")} onHome={()=>setScreen("home")}/>
  );
  return <ClHome onStart={handleStart}/>;
}

const BALLOON_MODES = [
  { id:"numeros",  label:"Numeros",   desc:"Estoure na ordem: 1, 2, 3...",              color:"#6366f1" },
  { id:"letras",   label:"Letras",    desc:"Estoure na ordem: A, B, C...",              color:"#10B981" },
  { id:"palavras", label:"Palavras",  desc:"Estoure so os da categoria certa!",         color:"#F59E0B" },
  { id:"contas",   label:"Contas",    desc:"Estoure o balao com a resposta certa!",     color:"#EC4899" },
  { id:"reflexo",  label:"Reflexo",   desc:"Estoure o maximo antes de chegar ao topo!", color:"#FF5603" },
];

const WORD_CATS = {
  frutas:    { label:"Frutas",     words:["MANGA","UVAS","PERA","KIWI","FIGO","CAJU","COCO","MACA","JACA","LIMAO","ABACAXI","MELANCIA"] },
  animais:   { label:"Animais",    words:["GATO","LOBO","URSO","PATO","RATO","BODE","VACA","ORCA","LULA","ANTA","PEIXE","LEAO"] },
  cores:     { label:"Cores",      words:["AZUL","ROSA","CINZA","VERDE","PRETO","BRANCO","ROXO","BEGE","CREME","LIMA","DOURADO","PRATA"] },
  profissoes:{ label:"Profissoes", words:["CHEF","ATOR","JUIZ","GUIA","PADRE","PILOTO","MEDICO","FISCAL","GERENTE","POLICIAL","BOMBEIRO","PROFESSOR"] },
};
const DISTRACT_WORDS = ["MESA","PORTA","RUA","CHUVA","PEDRA","ARVORE","LIVRO","CARRO","SAPATO","NUVEM","CALOR","VENTO","CHAVE","PAPEL","LAMPADA"];

function genBalloons(mode, level, answer) {
  const count = Math.min(3 + level, 6);
  const colors = ["#6366f1","#10B981","#F59E0B","#EC4899","#FF5603","#0EA5E9","#8B5CF6"];

  // Colunas fixas sem sobreposicao
  const colW = 80 / count;
  const xPositions = Array.from({length:count}, (_,i) => 10 + colW*i + colW/2);
  const shuffledX = [...xPositions].sort(()=>Math.random()-0.5);
  const startY = (i) => -(10 + i * 25);
  const balloons = [];

  if(mode==="numeros") {
    const correct = answer;
    const wrongs = new Set();
    while(wrongs.size < count-1) { const w=correct+Math.floor(Math.random()*8)-4; if(w!==correct&&w>0) wrongs.add(w); }
    const all = [correct,...wrongs].sort(()=>Math.random()-0.5);
    all.forEach((n,i) => balloons.push({ id:i, label:String(n), value:n, correct:n===correct, x:shuffledX[i], startY:startY(i), speed:0.10+level*0.025+Math.random()*0.04, color:n===correct?"#10B981":colors[i%colors.length], size:56 }));
    return {balloons, meta:{instruction:"Estoure na ordem: "+correct+", "+(correct+1)+", "+(correct+2)+"..."}};

  } else if(mode==="letras") {
    const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const correct = answer;
    const wrongLetters = new Set();
    while(wrongLetters.size < count-1) { const w=alpha[Math.floor(Math.random()*26)]; if(w!==correct) wrongLetters.add(w); }
    const all = [correct,...[...wrongLetters]].sort(()=>Math.random()-0.5);
    all.forEach((c,i) => balloons.push({ id:i, label:c, value:c, correct:c===correct, x:shuffledX[i], startY:startY(i), speed:0.10+level*0.025+Math.random()*0.04, color:c===correct?"#10B981":colors[i%colors.length], size:56 }));
    return {balloons, meta:{instruction:"Estoure as letras em ordem: "+correct+", "+alpha[(alpha.indexOf(correct)+1)%26]+", "+alpha[(alpha.indexOf(correct)+2)%26]+"..."}};

  } else if(mode==="palavras") {
    const catKeys = Object.keys(WORD_CATS);
    const catKey = catKeys[level % catKeys.length];
    const cat = WORD_CATS[catKey];
    const correctWord = cat.words[Math.floor(Math.random()*cat.words.length)];
    const distractors = [...DISTRACT_WORDS].sort(()=>Math.random()-0.5).slice(0,count-1);
    const all = [correctWord,...distractors].sort(()=>Math.random()-0.5);
    all.forEach((w,i) => balloons.push({ id:i, label:w, value:w, correct:w===correctWord, x:shuffledX[i], startY:startY(i), speed:0.09+level*0.02+Math.random()*0.04, color:colors[i%colors.length], size:62 }));
    return {balloons, meta:{cat:cat.label, instruction:"Estoure apenas: "+cat.label}};

  } else if(mode==="contas") {
    const ops = ["+","-","x"];
    const op = ops[(level-1)%ops.length];
    let a,b,res;
    if(op==="+"){a=Math.floor(Math.random()*9)+1;b=Math.floor(Math.random()*9)+1;res=a+b;}
    else if(op==="-"){a=Math.floor(Math.random()*9)+5;b=Math.floor(Math.random()*5)+1;res=a-b;}
    else{a=Math.floor(Math.random()*5)+2;b=Math.floor(Math.random()*4)+2;res=a*b;}
    const wrongs = new Set();
    while(wrongs.size<count-1){const w=res+Math.floor(Math.random()*8)-4;if(w!==res&&w>0)wrongs.add(w);}
    const all = [res,...[...wrongs]].sort(()=>Math.random()-0.5);
    all.forEach((n,i) => balloons.push({ id:i, label:String(n), value:n, correct:n===res, x:shuffledX[i], startY:startY(i), speed:0.10+level*0.025+Math.random()*0.04, color:n===res?"#10B981":colors[i%colors.length], size:56 }));
    return {balloons, meta:{question:a+" "+op+" "+b+" = ?", answer:res, instruction:"Estoure o balao com a resposta certa!"}};

  } else {
    for(let i=0;i<count;i++) balloons.push({ id:i, label:"*", value:i, correct:true, x:shuffledX[i], startY:startY(i), speed:0.12+level*0.035+Math.random()*0.05, color:colors[i%colors.length], size:58 });
    return {balloons, meta:{instruction:"Estoure todos os baloes antes que escapem!"}};
  }
}

function BalloonGame({mode, onBack}) {
  const [balloons, setBalloons] = useState([]);
  const [meta, setMeta] = useState({});
  const [level, setLevel] = useState(1);
  const [score, setScore] = useState(0);
  const [errors, setErrors] = useState(0);
  const [missed, setMissed] = useState(0);
  const [gameOver, setGameOver] = useState(false);
  const [nextAnswer, setNextAnswer] = useState(null);
  const posRef = useRef({});
  const balloonsRef = useRef([]);
  const poppedRef = useRef(new Set());
  const lastTimeRef = useRef(null);
  const animRef = useRef(null);
  const levelRef = useRef(1);
  const scoreRef = useRef(0);
  const errorsRef = useRef(0);
  const missedRef = useRef(0);
  const nextAnswerRef = useRef(null);
  const gameOverRef = useRef(false);
  const [tick2, setTick2] = useState(0);
  const modeInfo = BALLOON_MODES.find(m=>m.id===mode);

  function buildLevel(lv) {
    let answer = null;
    if(mode==="numeros") answer = lv;
    else if(mode==="letras") answer = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[(lv-1)%26];
    const {balloons:bs, meta:mt} = genBalloons(mode, lv, answer);
    const pos = {};
    bs.forEach((b,i) => { pos[b.id] = b.startY; });
    posRef.current = pos;
    balloonsRef.current = bs;
    poppedRef.current = new Set();
    nextAnswerRef.current = answer;
    setMeta(mt);
    setNextAnswer(answer);
    setBalloons([...bs]);
  }

  useEffect(()=>{
    buildLevel(1);
    animRef.current = requestAnimationFrame(tick);
    return ()=>{ cancelAnimationFrame(animRef.current); };
  },[]);

  function tick(ts) {
    if(gameOverRef.current) return;
    if(!lastTimeRef.current) lastTimeRef.current = ts;
    const dt = Math.min((ts - lastTimeRef.current)/16, 2);
    lastTimeRef.current = ts;
    const pos = posRef.current;
    const bals = balloonsRef.current;
    const popped = poppedRef.current;
    let newMissed = 0;
    bals.forEach(b => {
      if(popped.has(b.id)) return;
      pos[b.id] = (pos[b.id]||0) + b.speed * dt;
      if(pos[b.id] > 102) { popped.add(b.id); newMissed++; }
    });
    if(newMissed > 0) {
      missedRef.current += newMissed;
      if(missedRef.current >= 3) { gameOverRef.current = true; setMissed(missedRef.current); setGameOver(true); return; }
      setMissed(missedRef.current);
    }
    const remaining = bals.filter(b=>!popped.has(b.id));
    if(remaining.length===0 && bals.length>0 && mode==="reflexo") {
      const nl = levelRef.current+1; levelRef.current = nl;
      lastTimeRef.current = null; buildLevel(nl); setLevel(nl);
    }
    setTick2(n=>n+1);
    animRef.current = requestAnimationFrame(tick);
  }

  function pop(balloon) {
    if(poppedRef.current.has(balloon.id)||gameOverRef.current) return;
    let correct = false;
    if(mode==="reflexo") correct=true;
    else if(mode==="numeros"||mode==="letras") correct = balloon.value===nextAnswerRef.current;
    else correct = balloon.correct;

    if(correct) {
      poppedRef.current.add(balloon.id);
      scoreRef.current += 10 + levelRef.current*2;
      setScore(scoreRef.current);
      if(mode==="numeros") {
        nextAnswerRef.current += 1; setNextAnswer(nextAnswerRef.current);
        setTimeout(()=>{ const {balloons:bs,meta:mt}=genBalloons("numeros",levelRef.current,nextAnswerRef.current); const pos={}; bs.forEach((b,i)=>{pos[b.id]=b.startY;}); posRef.current=pos; balloonsRef.current=bs; poppedRef.current=new Set(); setMeta(mt); setBalloons([...bs]); },400);
      } else if(mode==="letras") {
        const alpha="ABCDEFGHIJKLMNOPQRSTUVWXYZ"; const ni=alpha.indexOf(nextAnswerRef.current)+1; nextAnswerRef.current=alpha[ni%26]; setNextAnswer(nextAnswerRef.current);
        setTimeout(()=>{ const {balloons:bs,meta:mt}=genBalloons("letras",levelRef.current,nextAnswerRef.current); const pos={}; bs.forEach((b,i)=>{pos[b.id]=b.startY;}); posRef.current=pos; balloonsRef.current=bs; poppedRef.current=new Set(); setMeta(mt); setBalloons([...bs]); },400);
      } else if(mode==="contas") {
        setTimeout(()=>{ const {balloons:bs,meta:mt}=genBalloons("contas",levelRef.current,null); const pos={}; bs.forEach((b,i)=>{pos[b.id]=b.startY;}); posRef.current=pos; balloonsRef.current=bs; poppedRef.current=new Set(); setMeta(mt); setBalloons([...bs]); },400);
      } else if(mode==="palavras") {
        const nl=levelRef.current+1; levelRef.current=nl; setLevel(nl); lastTimeRef.current=null;
        setTimeout(()=>{ const {balloons:bs,meta:mt}=genBalloons("palavras",nl,null); const pos={}; bs.forEach((b,i)=>{pos[b.id]=b.startY;}); posRef.current=pos; balloonsRef.current=bs; poppedRef.current=new Set(); setMeta(mt); setBalloons([...bs]); scoreRef.current+=5; setScore(scoreRef.current); },400);
      }
    } else {
      errorsRef.current += 1; setErrors(errorsRef.current);
      if(errorsRef.current >= 3) { gameOverRef.current=true; setGameOver(true); }
    }
  }

  if(gameOver) {
    const totalScore = scoreRef.current;
    return (
      <div style={{fontFamily:"'DM Sans',sans-serif",background:C.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
        <IcoTrophy size={52} color={totalScore>=100?"#d97706":totalScore>=50?"#FF5603":"#94a3b8"}/>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:24,color:C.text,marginTop:12,marginBottom:4}}>{totalScore>=100?"Excelente!":totalScore>=50?"Muito bem!":"Continue treinando!"}</div>
        <div style={{fontSize:14,color:C.muted,marginBottom:24}}>Fase {levelRef.current} · {totalScore} pontos</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,width:"100%",marginBottom:24}}>
          {[["Pontos",totalScore,modeInfo.color],["Fase",levelRef.current,"#6366f1"],["Erros",errorsRef.current,"#dc2626"],["Escaparam",missedRef.current,"#d97706"]].map(([l,v,c])=>(
            <div key={l} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:14,padding:"14px",textAlign:"center"}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:24,color:c}}>{v}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
        <button onClick={()=>{ cancelAnimationFrame(animRef.current); scoreRef.current=0;errorsRef.current=0;missedRef.current=0;levelRef.current=1;gameOverRef.current=false;lastTimeRef.current=null; setScore(0);setErrors(0);setMissed(0);setLevel(1);setGameOver(false); buildLevel(1); animRef.current=requestAnimationFrame(tick); }}
          style={{width:"100%",background:modeInfo.color,color:"#fff",border:"none",borderRadius:14,padding:15,fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:15,cursor:"pointer",marginBottom:10}}>
          Jogar Novamente
        </button>
        <button onClick={()=>{cancelAnimationFrame(animRef.current);onBack();}}
          style={{width:"100%",background:C.surface,color:C.muted,border:"1px solid "+C.border,borderRadius:14,padding:13,fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,cursor:"pointer"}}>
          <IcoBack/> Menu
        </button>
      </div>
    );
  }

  const activeBalloons = balloonsRef.current.filter(b=>!poppedRef.current.has(b.id));

  return (
    <div style={{fontFamily:"'DM Sans',sans-serif",background:"#0f172a",minHeight:"100vh",maxWidth:480,margin:"0 auto",position:"relative",overflow:"hidden",userSelect:"none",touchAction:"none"}}>
      <div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(15,23,42,0.95)",padding:"10px 16px",display:"flex",alignItems:"center",gap:10,zIndex:20}}>
        <button onClick={()=>{cancelAnimationFrame(animRef.current);onBack();}} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:8,padding:"5px 10px",color:"#fff",fontSize:12,cursor:"pointer"}}><IcoBack/></button>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14,color:"#fff"}}>{modeInfo.label}</div>
          {meta.question&&<div style={{fontSize:14,color:"#fbbf24",fontWeight:800}}>{meta.question}</div>}
          {meta.instruction&&!meta.question&&<div style={{fontSize:11,color:"#94a3b8"}}>{meta.instruction}</div>}
          {meta.cat&&<div style={{fontSize:12,color:"#94a3b8"}}>Categoria: <b style={{color:"#fff"}}>{meta.cat}</b></div>}
          {(mode==="numeros"||mode==="letras")&&nextAnswer&&<div style={{fontSize:12,color:"#94a3b8"}}>Agora: <b style={{color:"#4ade80",fontSize:18}}>{nextAnswer}</b></div>}
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:20,color:modeInfo.color}}>{score}</div>
          <div style={{fontSize:11,color:"#64748b"}}>F{level} · {"v ".repeat(Math.max(0,3-missed))}{"x ".repeat(Math.min(3,missed))}</div>
        </div>
      </div>
      <div style={{position:"relative",width:"100%",height:"100vh"}}>
        {activeBalloons.map(b=>{
          const yPct = posRef.current[b.id]??0;
          if(yPct < -8 || yPct > 102) return null;
          return (
            <div key={b.id} onClick={()=>pop(b)}
              style={{position:"absolute",left:b.x+"%",bottom:yPct+"%",transform:"translateX(-50%)",cursor:"pointer",zIndex:10}}>
              <div style={{width:b.size,height:b.size*1.2,borderRadius:"50% 50% 50% 50% / 60% 60% 40% 40%",background:"radial-gradient(circle at 35% 35%, "+b.color+"ee, "+b.color+"77)",border:"2.5px solid "+b.color,boxShadow:"0 0 16px "+b.color+"55",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:13,color:"#fff",textShadow:"0 1px 3px rgba(0,0,0,0.6)",textAlign:"center",padding:"0 6px",lineHeight:1.2,wordBreak:"break-word",maxWidth:b.size-8}}>{b.label}</div>
              </div>
              <div style={{width:2,height:16,background:b.color+"88",margin:"0 auto"}}/>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ModuleBalloon({onBack}) {
  const [screen, setScreen] = useState("home");
  const [mode, setMode] = useState(null);
  if(screen==="game") return <BalloonGame mode={mode} onBack={()=>setScreen("home")}/>;
  return <BalloonHome onStart={m=>{setMode(m);setScreen("game");}} onBack={onBack}/>;
}



const NAV_ITEMS=[
  {id:"inicio",label:"Início",icon:"home",url:"longevus-app.html"},
  {id:"alunos",label:"Alunos",icon:"users",url:"longevus-app.html"},
  {id:"avaliacoes",label:"Avaliações",icon:"clip",url:"longevus-app.html"},
  {id:"programa",label:"Programa",icon:"zap",url:"longevus-programa.html"},
];
const MENU_ITEMS=[
  {id:"hub",label:"Hub Cognitivo",icon:"zap",url:"longevus-hub.html"},
  {id:"monitoramento",label:"Monitoramento",icon:"act",url:"longevus-app.html"},
  {id:"relatorios",label:"Relatórios",icon:"bar",url:"longevus-app.html"},
  {id:"documentos",label:"Documentos",icon:"clip",url:"longevus-app.html"},
  {id:"biblioteca",label:"Biblioteca",icon:"clip",url:"longevus-biblioteca.html"},
  {id:"gerador",label:"Gerador de Programa",icon:"zap",url:"longevus-programa.html"},
];
const INav=({n,s=21,c="currentColor"})=>{const paths={home:["M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z","M9 22V12h6v10"],users:["M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2","M23 21v-2a4 4 0 0 0-3-3.87","M16 3.13a4 4 0 0 1 0 7.75"],clip:["M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2","M9 3h6v4H9z","M9 12h6","M9 16h4"],act:["M22 12h-4l-3 9L9 3l-3 9H2"],bar:["M18 20V10","M12 20V4","M6 20v-6"],zap:["M13 2L3 14h9l-1 8 10-12h-9z"],menu:["M3 12h18","M3 6h18","M3 18h18"]};return(<svg width={s} height={s} fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24">{(paths[n]||[]).map((d,i)=><path key={i} d={d}/>)}</svg>);};
function NavBar({active}){
  const [menuOpen,setMenuOpen]=React.useState(false);
  const go=url=>window.open(url,"_self");
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1.5px solid #e2e8f0",display:"flex",zIndex:200,paddingBottom:"env(safe-area-inset-bottom)"}}>
      {NAV_ITEMS.map(n=>(
        <button key={n.id} onClick={()=>go(n.url)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,padding:"9px 4px 8px",border:"none",background:"transparent",cursor:"pointer",color:active===n.id?"#FF5603":"#94a3b8"}}>
          <INav n={n.icon} s={21} c={active===n.id?"#FF5603":"#94a3b8"}/>
          <span style={{fontSize:10,fontWeight:active===n.id?700:500}}>{n.label}</span>
        </button>
      ))}
      <button onClick={()=>setMenuOpen(o=>!o)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,padding:"9px 4px 8px",border:"none",background:"transparent",cursor:"pointer",color:menuOpen?"#FF5603":"#94a3b8",position:"relative"}}>
        <INav n="menu" s={21} c={menuOpen?"#FF5603":"#94a3b8"}/>
        <span style={{fontSize:10,fontWeight:menuOpen?700:500}}>Mais</span>
        {menuOpen&&<div style={{position:"absolute",bottom:"100%",right:0,background:"#fff",borderRadius:"14px 14px 0 14px",boxShadow:"0 -4px 24px #0000001a",border:"1.5px solid #f1f5f9",minWidth:200,zIndex:999,overflow:"hidden"}} onClick={e=>e.stopPropagation()}>
          {MENU_ITEMS.map(m=>(
            <button key={m.id} onClick={()=>go(m.url)} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"14px 18px",border:"none",background:"#fff",cursor:"pointer",borderBottom:"1px solid #f8fafc"}}>
              <INav n={m.icon} s={18} c="#64748b"/>
              <span style={{fontSize:14,fontWeight:500,color:"#0f172a"}}>{m.label}</span>
            </button>
          ))}
        </div>}
      </button>
    </div>
  );
}
function AppInner(){
  const [mod,setMod]=useState(null);
  const back=()=>setMod(null);
  const content = (()=>{
    if(!mod) return <HubHome onOpen={setMod}/>;
    if(mod==="cartas")     return <ModuleCartas     onBack={back}/>;
    if(mod==="sequencia")  return <ModuleSequencia  onBack={back}/>;
    if(mod==="genio")      return <ModuleGenio      onBack={back}/>;
    if(mod==="pares")      return <ModulePares      onBack={back}/>;
    if(mod==="padroes")    return <ModulePadroes    onBack={back}/>;
    if(mod==="caca")       return <ModuleCaca       onBack={back}/>;
    if(mod==="listar")     return <ModuleListar     onBack={back}/>;
    if(mod==="completar")  return <ModuleCompletar  onBack={back}/>;
    if(mod==="baloes")     return <ModuleBalloon    onBack={back}/>;
    return <HubHome onOpen={setMod}/>;
  })();
  return <><div style={{paddingBottom:80}}>{content}</div><NavBar active="hub"/></>;
}



function App(){
const [session,setSession]=useState(null);
const [authLoading,setAuthLoading]=useState(true);
useEffect(()=>{
supa.auth.getSession().then(({data})=>{ setSession(data?.session||null); setAuthLoading(false); });
const { data: listener } = supa.auth.onAuthStateChange((_event, sess)=>{ setSession(sess); });
return ()=>{ listener?.subscription?.unsubscribe(); };
},[]);
if (authLoading) {
return <div style={{ minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8",fontSize:14 }}>Carregando...</div>;
}
if (!session) {
return <Login onLogin={()=>{}}/>;
}
return <AppInner/>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
