<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>Scanner de Sarcopenia — Longevus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --bg:#F7F3ED;
    --ink:#2B2621;
    --ink-soft:#5C554D;
    --accent:#8B4A3B;
    --accent-dim:#C79A8C;
    --accent-soft:#F2E3DB;
    --alert:#B8552E;
    --safe:#4A6B4D;
    --card:#FFFFFF;
    --line:#E4DCD0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;overflow-x:hidden;height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    height:100%;
  }
  #root{height:100%;display:flex;flex-direction:column;}
  .display{font-family:'Fraunces',serif;}
  .screen{
    flex:1;
    height:100dvh;
    max-height:100dvh;
    display:flex;
    flex-direction:column;
    max-width:520px;
    width:100%;
    margin:0 auto;
    padding:18px 22px 16px;
    overflow:hidden;
  }
  .screen-content{
    flex:1 1 auto;
    min-height:0;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }
  .screen-footer{
    flex-shrink:0;
    padding-top:10px;
  }
  .progress-track{
    display:flex;
    gap:4px;
    margin-bottom:8px;
  }
  .progress-seg{
    flex:1;
    height:3px;
    background:var(--line);
    border-radius:2px;
    overflow:hidden;
  }
  .progress-seg .fill{
    height:100%;
    width:0%;
    background:var(--accent);
    transition:width .4s ease;
  }
  .step-count{
    font-size:11px;
    color:var(--ink-soft);
    margin:0 0 12px;
    font-weight:600;
    letter-spacing:.03em;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
    font-weight:600;
    margin:0 0 6px;
  }
  h1.display{
    font-size:24px;
    font-weight:600;
    line-height:1.16;
    margin:0 0 8px;
    letter-spacing:-.01em;
  }
  h2.display{
    font-size:20px;
    font-weight:600;
    line-height:1.22;
    margin:0 0 14px;
    letter-spacing:-.01em;
  }
  p.body-text{
    font-size:14px;
    line-height:1.48;
    color:var(--ink-soft);
    margin:0 0 12px;
  }
  .brand-logo{
    display:block;
    align-self:flex-start;
    width:104px;
    height:auto;
    margin-bottom:12px;
  }
  .credential-box{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 16px 12px;
    margin:4px 0 0;
    box-shadow:0 1px 2px rgba(43,38,33,0.04), 0 10px 20px -12px rgba(43,38,33,0.16);
  }
  .credential-top{
    display:flex;
    align-items:center;
    gap:11px;
    margin-bottom:10px;
  }
  .credential-box .wb-logo{
    width:34px;
    height:auto;
    flex-shrink:0;
  }
  .credential-box .cred-text{flex:1;}
  .credential-box .name{font-weight:700;color:var(--ink);font-size:13.5px;letter-spacing:-.005em;}
  .credential-box .role{font-weight:500;color:var(--accent);font-size:11.5px;margin-top:2px;line-height:1.35;}
  .credential-divider{height:1px;background:var(--line);margin:0 0 9px;}
  .credential-box .disclaimer{font-size:10.5px;color:var(--ink-soft);line-height:1.45;}
  button.primary{
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:14px;
    padding:15px 22px;
    font-size:15px;
    font-weight:600;
    font-family:'Inter',sans-serif;
    cursor:pointer;
    width:100%;
    transition:opacity .2s ease, transform .15s ease;
  }
  button.primary:active{transform:scale(.98);}
  button.primary:disabled{opacity:.5;cursor:not-allowed;}
  button.ghost{
    background:transparent;
    color:var(--ink-soft);
    border:none;
    font-family:'Inter',sans-serif;
    font-size:13px;
    padding:10px;
    cursor:pointer;
    text-align:center;
    width:100%;
  }
  .q-icon-badge{
    width:42px;
    height:42px;
    border-radius:13px;
    background:var(--accent-soft);
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:12px;
  }
  .q-wrap{
    animation:slideIn .32s ease;
  }
  @keyframes slideIn{
    from{opacity:0; transform:translateX(18px);}
    to{opacity:1; transform:translateX(0);}
  }
  .option{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    text-align:left;
    background:var(--card);
    border:1.5px solid var(--line);
    border-radius:13px;
    padding:13px 16px;
    margin-bottom:8px;
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    font-weight:500;
    color:var(--ink);
    cursor:pointer;
    box-shadow:0 1px 2px rgba(43,38,33,0.03);
    transition:border-color .15s ease, background .15s ease, transform .15s ease;
  }
  .option:active{transform:scale(.98);}
  .option:hover{border-color:var(--accent-dim);}
  .option.selected{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .option .check{
    width:19px;
    height:19px;
    border-radius:50%;
    border:1.5px solid var(--line);
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    transition:all .15s ease;
  }
  .option.selected .check{
    background:#fff;
    border-color:#fff;
  }
  input.field{
    width:100%;
    background:var(--card);
    border:1.5px solid var(--line);
    border-radius:13px;
    padding:14px 16px;
    font-family:'Inter',sans-serif;
    font-size:15px;
    color:var(--ink);
    margin-bottom:10px;
  }
  input.field:focus{outline:none;border-color:var(--accent);}
  input.field:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  button.primary:focus-visible, .option:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .thermo-wrap{margin:6px 0 14px;}
  .thermo-labels{
    display:flex;
    justify-content:space-between;
    font-size:10.5px;
    color:var(--ink-soft);
    margin-top:6px;
  }
  .score-row{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-bottom:6px;
  }
  .score-big{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:40px;
    line-height:1;
    letter-spacing:-.02em;
  }
  .score-unit{font-size:14px;color:var(--ink-soft);font-weight:400;}
  .badge{
    display:inline-block;
    padding:5px 12px;
    border-radius:999px;
    font-size:11.5px;
    font-weight:600;
    margin-bottom:12px;
    opacity:0;
    animation:fadeUp .4s ease .5s forwards;
  }
  @keyframes fadeUp{
    from{opacity:0; transform:translateY(6px);}
    to{opacity:1; transform:translateY(0);}
  }
  .badge.safe{background:#E7EFE7;color:var(--safe);}
  .badge.alert{background:#F6E4DA;color:var(--alert);}
  .alert-list{
    background:#FBF0EA;
    border:1px solid #EDD3C5;
    border-radius:13px;
    padding:12px 14px;
    margin:10px 0 4px;
  }
  .alert-list .title{font-size:11px;font-weight:700;color:var(--alert);margin-bottom:7px;text-transform:uppercase;letter-spacing:.04em;}
  .alert-list ul{margin:0;padding-left:16px;}
  .alert-list li{font-size:12.5px;color:var(--ink);line-height:1.45;margin-bottom:3px;}
  .error-text{color:var(--alert);font-size:12px;margin:-4px 0 10px;}
  .center-icon{font-size:32px;margin-bottom:10px;}
  .thanks-logo{
    display:block;
    align-self:center;
    width:88px;
    height:auto;
    margin:0 0 12px;
    opacity:0.85;
  }
  .compare-wrap{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 16px 12px;
    margin:2px 0 12px;
    box-shadow:0 1px 2px rgba(43,38,33,0.04), 0 10px 20px -12px rgba(43,38,33,0.14);
  }
  .compare-title{
    font-size:11px;
    font-weight:700;
    color:var(--ink);
    text-transform:uppercase;
    letter-spacing:.04em;
    margin:0 0 10px;
  }
  .compare-row{margin-bottom:8px;}
  .compare-label{
    display:flex;
    justify-content:space-between;
    font-size:11.5px;
    color:var(--ink-soft);
    font-weight:600;
    margin-bottom:4px;
  }
  .compare-value{color:var(--ink);font-weight:700;}
  .compare-track{
    height:7px;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:5px;
    overflow:hidden;
  }
  .compare-fill{
    height:100%;
    border-radius:5px;
    transition:width .8s cubic-bezier(.2,.8,.2,1);
  }
  .compare-note{
    font-size:10px;
    color:var(--ink-soft);
    line-height:1.4;
    margin:6px 0 0;
  }
  @media (prefers-reduced-motion: reduce){
    .progress-seg .fill, button.primary, .option, .q-wrap, .badge, .thermo-marker, .compare-fill{transition:none; animation:none;}
  }
  @media (max-height: 700px){
    .brand-logo{width:84px; margin-bottom:8px;}
    h1.display{font-size:21px;}
    p.body-text{font-size:13px; margin-bottom:8px;}
    .credential-box{padding:11px 14px 10px;}
  }
</style>
</head>

function classify(score) {
  if (score >= 4) {
    return {
      key: "alto",
      label: "Triagem positiva",
      badgeClass: "alert",
      impact: "Seus resultados indicam sinais de alerta compatíveis com perda de massa e função muscular (sarcopenia). Pode aparecer como mais cansaço em tarefas simples, insegurança ao caminhar ou maior risco de quedas. É um quadro comum após os 50 anos — e tratável.",
      alerts: [
        "Redução de força para tarefas do dia a dia",
        "Maior risco de quedas e perda de equilíbrio",
        "Possível impacto na independência para AVDs"
      ]
    };
  }
  return {
    key: "baixo",
    label: "Risco baixo",
    badgeClass: "safe",
    impact: "Seus resultados sugerem que força, mobilidade e equilíbrio estão dentro do esperado para sua idade. Isso significa mais autonomia no dia a dia. Manter esse padrão exige prática regular e orientada de exercícios de força.",
    alerts: null
  };
}

function getBenchmark(age) {
  if (age < 60) return { average: 0.8, bandLabel: "até 59 anos" };
  if (age < 70) return { average: 1.6, bandLabel: "60–69 anos" };
  if (age < 80) return { average: 2.6, bandLabel: "70–79 anos" };
  return { average: 4.0, bandLabel: "80+ anos" };
}

function buildResultPdfBlob(score, result, age) {
  const bench = getBenchmark(age);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "mm", format: "a4" });
  const marginX = 18;
  const pageWidth = 210;
  const contentWidth = pageWidth - marginX * 2;

  const inkColor = [43, 38, 33];
  const softColor = [92, 85, 77];
  const accentColor = [139, 74, 59];
  const accentSoft = [242, 227, 219];
  const alertColor = [184, 85, 46];
  const alertSoft = [251, 240, 234];
  const safeColor = [74, 107, 77];
  const safeSoft = [231, 239, 231];
  const lineColor = [228, 220, 208];
  const bgColor = [247, 243, 237];
  const badgeColor = result.key === "alto" ? alertColor : safeColor;
  const badgeSoft = result.key === "alto" ? alertSoft : safeSoft;

  // ---- Header band ----
  doc.setFillColor(bgColor[0], bgColor[1], bgColor[2]);
  doc.rect(0, 0, pageWidth, 34, "F");
  const logoW = 32;
  const logoH = logoW * (307 / 440);
  doc.addImage(LOGO_LONGEVUS, "PNG", marginX, 8, logoW, logoH);
  doc.setFont("helvetica", "normal");
  doc.setFontSize(10.5);
  doc.setTextColor(softColor[0], softColor[1], softColor[2]);
  doc.text("Scanner de Sarcopenia", pageWidth - marginX, 15, { align: "right" });
  doc.setFontSize(9);
  doc.text("Resultado da Triagem (SARC-F)", pageWidth - marginX, 20.5, { align: "right" });
  doc.setFillColor(accentColor[0], accentColor[1], accentColor[2]);
  doc.rect(0, 34, pageWidth, 2, "F");

  let y = 48;

  function heading(text) {
    doc.setFont("helvetica", "bold");
    doc.setFontSize(11);
    doc.setTextColor(accentColor[0], accentColor[1], accentColor[2]);
    doc.text(text.toUpperCase(), marginX, y);
    y += 3;
    doc.setDrawColor(lineColor[0], lineColor[1], lineColor[2]);
    doc.line(marginX, y, pageWidth - marginX, y);
    y += 7;
  }

  function paragraph(text, size, color) {
    doc.setFont("helvetica", "normal");
    doc.setFontSize(size || 10.5);
    const c = color || inkColor;
    doc.setTextColor(c[0], c[1], c[2]);
    const lines = doc.splitTextToSize(text, contentWidth);
    doc.text(lines, marginX, y);
    y += lines.length * (size ? size * 0.42 : 4.6) + 3;
  }

  // ---- Score card ----
  heading("Seu Resultado");
  const cardH = 30;
  doc.setFillColor(accentSoft[0], accentSoft[1], accentSoft[2]);
  doc.roundedRect(marginX, y, contentWidth, cardH, 3, 3, "F");
  doc.setFont("helvetica", "bold");
  doc.setFontSize(28);
  doc.setTextColor(inkColor[0], inkColor[1], inkColor[2]);
  doc.text(String(score) + " / 10", marginX + 8, y + 19);

  doc.setFont("helvetica", "bold");
  doc.setFontSize(11);
  const pillLabel = result.label;
  const pillTextW = doc.getTextWidth(pillLabel);
  const pillPadX = 5;
  const pillW = pillTextW + pillPadX * 2;
  const pillH = 9;
  const pillX = marginX + contentWidth - pillW - 8;
  const pillY = y + (cardH - pillH) / 2;
  doc.setFillColor(badgeColor[0], badgeColor[1], badgeColor[2]);
  doc.roundedRect(pillX, pillY, pillW, pillH, pillH / 2, pillH / 2, "F");
  doc.setTextColor(255, 255, 255);
  doc.text(pillLabel, pillX + pillW / 2, pillY + pillH / 2 + 1.3, { align: "center" });
  y += cardH + 10;

  // ---- Comparison bars ----
  heading("Como Você Se Compara");
  const barMax = 10;
  const barTrackW = contentWidth;
  const barH = 4.5;
  function comparisonBar(label, value, color) {
    doc.setFont("helvetica", "bold");
    doc.setFontSize(9.5);
    doc.setTextColor(softColor[0], softColor[1], softColor[2]);
    doc.text(label, marginX, y);
    doc.setTextColor(inkColor[0], inkColor[1], inkColor[2]);
    doc.text(String(value) + "/10", marginX + barTrackW, y, { align: "right" });
    y += 2.5;
    doc.setFillColor(bgColor[0], bgColor[1], bgColor[2]);
    doc.roundedRect(marginX, y, barTrackW, barH, 2, 2, "F");
    const fillW = Math.max((value / barMax) * barTrackW, 3);
    doc.setFillColor(color[0], color[1], color[2]);
    doc.roundedRect(marginX, y, fillW, barH, 2, 2, "F");
    y += barH + 6;
  }
  comparisonBar("Você", score, accentColor);
  comparisonBar("Média estimada (" + bench.bandLabel + ")", bench.average, [201, 162, 74]);
  comparisonBar("Ideal", 1, safeColor);
  paragraph("Valores de referência estimados a partir de padrões populacionais gerais.", 8.5, softColor);
  y += 1;

  // ---- Meaning ----
  heading("O Que Isso Significa");
  paragraph(result.impact, 10.5);

  if (result.alerts) {
    const boxStartY = y;
    const lineH = 5.1;
    const alertLines = result.alerts.map(function (a) {
      return doc.splitTextToSize("•  " + a, contentWidth - 8);
    });
    const totalLines = alertLines.reduce(function (s, l) { return s + l.length; }, 0);
    const boxH = totalLines * lineH + 12;
    doc.setFillColor(badgeSoft[0], badgeSoft[1], badgeSoft[2]);
    doc.roundedRect(marginX, boxStartY, contentWidth, boxH, 3, 3, "F");
    y += 7;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(9.5);
    doc.setTextColor(badgeColor[0], badgeColor[1], badgeColor[2]);
    doc.text("PONTOS DE ATENÇÃO", marginX + 6, y);
    y += 6;
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.setTextColor(inkColor[0], inkColor[1], inkColor[2]);
    alertLines.forEach(function (lines) {
      doc.text(lines, marginX + 6, y);
      y += lines.length * lineH;
    });
    y = boxStartY + boxH + 8;
  }

  heading("Próximos Passos");
  paragraph("Esta é uma ferramenta de triagem e não substitui avaliação profissional presencial. Fale com Wellington Brito para uma avaliação funcional completa e um plano de ação personalizado.", 10.5);

  // ---- Footer credential ----
  const footerY = 271;
  doc.setDrawColor(lineColor[0], lineColor[1], lineColor[2]);
  doc.line(marginX, footerY - 6, pageWidth - marginX, footerY - 6);
  const wbLogoW = 16;
  const wbLogoH = wbLogoW * (264 / 300);
  doc.addImage(LOGO_WB, "PNG", marginX, footerY, wbLogoW, wbLogoH);
  doc.setFont("helvetica", "bold");
  doc.setFontSize(11);
  doc.setTextColor(inkColor[0], inkColor[1], inkColor[2]);
  doc.text("Wellington Brito", marginX + wbLogoW + 6, footerY + 6);
  doc.setFont("helvetica", "normal");
  doc.setFontSize(9);
  doc.setTextColor(accentColor[0], accentColor[1], accentColor[2]);
  doc.text("Personal Trainer · CREF 089836-G/SP · Especialista em Gerontologia", marginX + wbLogoW + 6, footerY + 11.5);

  return doc.output("blob");
}

function ProgressBar({ step, total }) {
  const segs = [];
  for (let i = 0; i < total; i++) {
    const filled = i <= step;
    const fillStyle = { width: filled ? "100%" : "0%" };
    segs.push(
      <div className="progress-seg" key={i}>
        <div className="fill" style={fillStyle}></div>
      </div>
    );
  }
  return <div className="progress-track">{segs}</div>;
}

function Thermometer({ score }) {
  const [ready, setReady] = React.useState(false);
  React.useEffect(function () {
    const t = setTimeout(function () { setReady(true); }, 120);
    return function () { clearTimeout(t); };
  }, []);
  const pct = ready ? (score / 10) * 100 : 0;
  const markerStyle = { left: "calc(" + pct + "% - 8px)", transition: "left .7s cubic-bezier(.2,.8,.2,1)" };
  return (
    <div className="thermo-wrap">
      <svg width="100%" height="10" viewBox="0 0 300 10" preserveAspectRatio="none" style={{display:"block", borderRadius:"6px", overflow:"hidden"}}>
        <defs>
          <linearGradient id="thermoGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stopColor="#4A6B4D" />
            <stop offset="55%" stopColor="#C9A24A" />
            <stop offset="100%" stopColor="#B8552E" />
          </linearGradient>
        </defs>
        <rect x="0" y="0" width="300" height="10" fill="#EAE2D6" />
        <rect x="0" y="0" width="300" height="10" fill="url(#thermoGrad)" opacity="0.35" />
      </svg>
      <div style={{position:"relative", height:"0"}}>
        <div className="thermo-marker" style={Object.assign({position:"absolute", top:"-17px"}, markerStyle)}>
          <div style={{width:"16px", height:"16px", borderRadius:"50%", background:"#fff", border:"3px solid var(--ink)", boxSizing:"border-box"}}></div>
        </div>
      </div>
      <div className="thermo-labels">
        <span>0 — sem sinais</span>
        <span>10 — alto risco</span>
      </div>
    </div>
  );
}

function CountUp({ target, duration }) {
  const [val, setVal] = React.useState(0);
  React.useEffect(function () {
    let start = null;
    let raf;
    function step(ts) {
      if (start === null) start = ts;
      const progress = Math.min((ts - start) / duration, 1);
      setVal(Math.round(progress * target));
      if (progress < 1) raf = requestAnimationFrame(step);
    }
    raf = requestAnimationFrame(step);
    return function () { cancelAnimationFrame(raf); };
  }, [target, duration]);
  return <span>{val}</span>;
}

function CompareBar({ label, value, max, color, delay, valueSuffix }) {
  const [ready, setReady] = React.useState(false);
  React.useEffect(function () {
    const t = setTimeout(function () { setReady(true); }, delay);
    return function () { clearTimeout(t); };
  }, [delay]);
  const pct = ready ? Math.min((value / max) * 100, 100) : 0;
  const fillStyle = { width: pct + "%", background: color };
  return (
    <div className="compare-row">
      <div className="compare-label">
        <span>{label}</span>
        <span className="compare-value">{value}{valueSuffix || ""}</span>
      </div>
      <div className="compare-track">
        <div className="compare-fill" style={fillStyle}></div>
      </div>
    </div>
  );
}

function ComparisonChart({ score, age }) {
  const bench = getBenchmark(age);
  return (
    <div className="compare-wrap">
      <p className="compare-title">Como você se compara</p>
      <CompareBar label="Você" value={score} max={10} color="var(--accent)" delay={150} valueSuffix="/10" />
      <CompareBar label={"Média estimada (" + bench.bandLabel + ")"} value={bench.average} max={10} color="#C9A24A" delay={280} valueSuffix="/10" />
      <CompareBar label="Ideal" value={1} max={10} color="var(--safe)" delay={410} valueSuffix="/10" />
      <p className="compare-note">Valores de referência estimados a partir de padrões populacionais gerais.</p>
    </div>
  );
}

function App() {

  const [answers, setAnswers] = React.useState({});
  const [qIndex, setQIndex] = React.useState(0);
  const [selectedValue, setSelectedValue] = React.useState(null);
  const [whatsapp, setWhatsapp] = React.useState("");
  const [name, setName] = React.useState("");
  const [saving, setSaving] = React.useState(false);
  const [error, setError] = React.useState("");

  const totalSteps = QUESTIONS.length;

  function startQuiz() {
    setScreen("age");
  }

  function confirmAge() {
    const n = parseInt(age, 10);
    if (!n || n < 18 || n > 110) {
      setAgeError("Informe uma idade válida.");
      return;
    }
    setAgeError("");
    setScreen("question");
    setQIndex(0);
    setSelectedValue(null);
  }

  function pickOption(value) {
    if (selectedValue !== null) return;
    setSelectedValue(value);
    const key = QUESTIONS[qIndex].key;
    const next = Object.assign({}, answers);
    next[key] = value;
    setAnswers(next);
    setTimeout(function () {
      if (qIndex < QUESTIONS.length - 1) {
        setQIndex(qIndex + 1);
        setSelectedValue(null);
      } else {
        setScreen("result");
      }
    }, 420);
  }

  function goBack() {
    if (selectedValue !== null) return;
    if (qIndex > 0) {
      setQIndex(qIndex - 1);
    } else {
      setScreen("age");
    }
  }

  const score = Object.keys(answers).reduce(function (sum, k) {

    const url = URL.createObjectURL(blob);

    a.download = "resultado-scanner-longevus.pdf";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 3000);

          <button className="primary" onClick={function () { setScreen("lead"); }}>Ver o que fazer a seguir</button>
        </div>
      </div>
    );
  }

  if (screen === "lead") {
    return (
      <div className="screen">
        <div className="screen-content">
          <p className="eyebrow">Último passo</p>
          <h2 className="display">Receba a leitura completa do seu resultado</h2>
          <p className="body-text">Deixe seu nome e WhatsApp. Wellington vai analisar sua triagem e te chamar com as próximas etapas — sem compromisso.</p>
          <input
            className="field"
            type="text"
            placeholder="Seu nome"
            value={name}
            onChange={function (e) { setName(e.target.value); }}
          />
          <input
            className="field"
            type="tel"
            placeholder="WhatsApp (com DDD)"
            value={whatsapp}
            onChange={function (e) { setWhatsapp(e.target.value); }}
          />
          {error && <div className="error-text">{error}</div>}
        </div>
        <div className="screen-footer">
          <button className="primary" onClick={submitLead} disabled={saving}>
            {saving ? "Enviando..." : "Enviar e ver resultado completo"}
          </button>
        </div>
      </div>
    );
  }

  if (screen === "thanks") {
    return (
      <div className="screen">
        <div className="screen-content">
          <img className="thanks-logo" src={LOGO_LONGEVUS} alt="Longevus" />
          <div className="center-icon">✅</div>
          <h2 className="display">Recebemos seus dados</h2>
          <p className="body-text">Wellington vai analisar sua triagem (score {score}/10) e entrar em contato pelo WhatsApp em breve com os próximos passos.</p>
          <p className="body-text">Seu resultado completo também está pronto em PDF — baixe ou compartilhe direto com quem quiser.</p>
        </div>
        <div className="screen-footer">
          <button className="primary" onClick={shareResult}>Compartilhar resultado</button>
          <button className="ghost" onClick={downloadPdf}>Baixar PDF</button>
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
