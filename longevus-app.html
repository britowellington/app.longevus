const SUPA_URL = "https://jpduxfbigcdxmtcozqpp.supabase.co";
const SUPA_KEY = "sb_publishable_VZSgcxu5ps3eR9UAjuRr4Q_B65WTx_h";
const supa = window.supabase.createClient(SUPA_URL, SUPA_KEY);
const SUPPORT_WHATSAPP = "5511977431011";
const DB = {
async authHeaders() {
const { data } = await supa.auth.getSession();
const token = data?.session?.access_token || SUPA_KEY;
return { "apikey": SUPA_KEY, "Authorization": "Bearer "+token, "Content-Type": "application/json", "Prefer": "resolution=merge-duplicates" };
},
async load(table) {
try {
const headers = await this.authHeaders();
const r = await fetch(SUPA_URL+"/rest/v1/"+table+"?select=*&order=created_at.asc", { headers });
if (!r.ok) return null;
const rows = await r.json();
return rows.map(row => row.data);
} catch(e) { return null; }
},
async save(table, id, data, studentId) {
try {
const headers = await this.authHeaders();
const { data: sess } = await supa.auth.getSession();
const ownerId = sess?.session?.user?.id;
const body = { id, data, owner_id: ownerId, updated_at: new Date().toISOString(), ...(studentId ? { student_id: studentId } : {}) };
await fetch(SUPA_URL+"/rest/v1/"+table, { method: "POST", headers, body: JSON.stringify(body) });
} catch(e) {}
},
async remove(table, id) {
try {
const headers = await this.authHeaders();
const r = await fetch(SUPA_URL+"/rest/v1/"+table+"?id=eq."+id, { method: "DELETE", headers });
if (!r.ok) console.error("DB.remove failed", table, id, r.status);
return r.ok;
} catch(e) { console.error("DB.remove error", table, id, e); return false; }
}
};

const classifyRCQ = (waist, hip, sex) => {
const w = parseFloat(waist), h = parseFloat(hip);
if (!w || !h) return null;
const rcq = (w/h).toFixed(2);
const isMale = sex === "M";
let label, desc, color, bg;
if (isMale) {
if (w/h < 0.90) { label="Baixo Risco"; desc="RCQ "+rcq+" — distribuição de gordura sem risco cardiovascular aumentado."; color="#16a34a"; bg="#dcfce7"; }
else if (w/h < 1.00) { label="Risco Moderado"; desc="RCQ "+rcq+" — risco cardiovascular moderado. Exercício aeróbico e controle alimentar indicados (AHA)."; color="#d97706"; bg="#fef9c3"; }
else { label="Risco Alto"; desc="RCQ "+rcq+" — distribuição androide de gordura com risco cardiovascular elevado. Intervenção prioritária (AHA)."; color="#dc2626"; bg="#fee2e2"; }
} else {
if (w/h < 0.80) { label="Baixo Risco"; desc="RCQ "+rcq+" — distribuição de gordura sem risco cardiovascular aumentado."; color="#16a34a"; bg="#dcfce7"; }
else if (w/h < 0.85) { label="Risco Moderado"; desc="RCQ "+rcq+" — risco cardiovascular moderado. Exercício aeróbico e controle alimentar indicados (AHA)."; color="#d97706"; bg="#fef9c3"; }
else { label="Risco Alto"; desc="RCQ "+rcq+" — distribuição androide de gordura com risco cardiovascular elevado. Intervenção prioritária (AHA)."; color="#dc2626"; bg="#fee2e2"; }
}
return { label, desc, color, bg, rcq };
};
const classifyCalf = (v, sex) => {

const getRecommendations = (pre, during, post) => {
const recs = [];
const pas = parseFloat(pre?.pas), pad = parseFloat(pre?.pad);
const fc = parseFloat(pre?.fc), spo2 = parseFloat(pre?.spo2);
const gly = parseFloat(pre?.glycemia);
const dp = during?.pas && during?.fc ? Math.round(parseFloat(during.pas) * parseFloat(during.fc)) : null;
const pasDuring = parseFloat(during?.pas), padDuring = parseFloat(during?.pad);
const pasPost = parseFloat(post?.pas), padPost = parseFloat(post?.pad);
// ── PRESSÃO ARTERIAL (Zonas Longevus) ──────────────────────────────────────
if (pas >= 180 || pad >= 110)
return [{ level:"stop", icon:"🚫", title:"HAS Grau 3 / Crise Hipertensiva", text:"PAS ≥ 180 ou PAD ≥ 110 mmHg. Suspender exercício imediatamente e encaminhar para avaliação médica urgente.", ref:"Zonas Longevus — PA Grau 3", color:"#dc2626", bg:"#fee2e2", border:"#fca5a5" }];
if (pas >= 160 || pad >= 100)
recs.push({ level:"stop", icon:"⛔", title:"HAS Grau 2 — Suspender; Avaliar com Médico", text:"PAS 160–179 ou PAD 100–109 mmHg. Suspender atividade. Agendar avaliação médica antes de retomar exercícios.", ref:"Zonas Longevus — PA Grau 5", color:"#dc2626", bg:"#fee2e2", border:"#fca5a5" });
else if (pas >= 140 || pad >= 90)
recs.push({ level:"caution", icon:"⚠️", title:"HAS Grau 1 — Exercício Leve; Acompanhar", text:"PAS 140–159 ou PAD 90–99 mmHg. Exercício de baixa intensidade (40–50% FCmáx). Caminhada leve, resistência com carga mínima. Monitorar PA a cada sessão.", ref:"Zonas Longevus — PA Grau 4", color:"#d97706", bg:"#fef9c3", border:"#fde68a" });
else if (pas >= 130 || pad >= 85)
recs.push({ level:"info", icon:"ℹ️", title:"Pré-hipertensão — Monitorar a Cada Sessão", text:"PAS 130–139 ou PAD 85–89 mmHg. Exercício recomendado com monitoramento. Aeróbico 60–70% FCmáx. Resistência 50–70% 1RM. Exercício regular pode reduzir PA.", ref:"Zonas Longevus — PA Grau 3", color:"#6366f1", bg:"#eef2ff", border:"#c7d2fe" });
else if (pas >= 120 || (pad >= 80 && pad < 85))
recs.push({ level:"ok", icon:"✅", title:"PA Normal — Continuar Normalmente", text:"PAS 120–129 mmHg. Sem restrição hemodinâmica. Intensidade conforme protocolo Longevus.", ref:"Zonas Longevus — PA Grau 2", color:"#16a34a", bg:"#dcfce7", border:"#86efac" });
else if (pas > 0 && pas < 120 && pad > 0 && pad < 80)
recs.push({ level:"ok", icon:"✅", title:"PA Ótima — Continuar Normalmente", text:"PA < 120/80 mmHg. Pressão arterial ideal. Sem restrições hemodinâmicas.", ref:"Zonas Longevus — PA Grau 1", color:"#16a34a", bg:"#dcfce7", border:"#86efac" });
// ── FREQUÊNCIA CARDÍACA (Zonas Longevus) ───────────────────────────────────
if (fc > 150)
recs.push({ level:"stop", icon:"🚫", title:"FC Crítica — Encaminhar Imediatamente", text:"FC repouso > 150 bpm. Zona crítica. Não iniciar exercício. Verificar sintomas e acionar suporte médico.", ref:"Zonas Longevus — FC Grau 5", color:"#dc2626", bg:"#fee2e2", border:"#fca5a5" });
else if (fc > 110)
recs.push({ level:"stop", icon:"⛔", title:"Taquicardia — Interromper Exercício", text:"FC repouso > 110 bpm. Taquicardia em repouso. Não iniciar exercício. Investigar causa (desidratação, estresse, medicamento, arritmia).", ref:"Zonas Longevus — FC Grau 4", color:"#dc2626", bg:"#fee2e2", border:"#fca5a5" });
else if (fc >= 100 && fc <= 110)
recs.push({ level:"caution", icon:"⚠️", title:"Limite Superior FC — Monitorar com Atenção", text:"FC repouso 100–110 bpm. Iniciar com baixa intensidade (< 50% FCmáx). Monitorar FC durante toda a sessão. Verificar hidratação e medicamentos.", ref:"Zonas Longevus — FC Grau 3", color:"#d97706", bg:"#fef9c3", border:"#fde68a" });
else if (fc >= 60 && fc <= 100)
recs.push({ level:"ok", icon:"✅", title:"FC Normal — Zona Aeróbica Ideal", text:"FC repouso 60–100 bpm. Frequência cardíaca normal. Intensidade 50–85% FCmáx conforme protocolo.", ref:"Zonas Longevus — FC Grau 2", color:"#16a34a", bg:"#dcfce7", border:"#86efac" });
else if (fc > 0 && fc < 60)
recs.push({ level:"caution", icon:"⚠️", title:"Bradicardia — Investigar se Sintomático", text:"FC repouso < 60 bpm. Verificar se aluno usa beta-bloqueador (esperado). Se sintomático (tontura, cansaço): investigar antes de exercitar.", ref:"Zonas Longevus — FC Grau 1", color:"#6366f1", bg:"#eef2ff", border:"#c7d2fe" });
// ── GLICEMIA (Zonas Longevus) ───────────────────────────────────────────────
if (gly > 0 && gly >= 300)
return [{ level:"stop", icon:"🚫", title:"Hiperglicemia Grave — Suspender; Encaminhar", text:"Glicemia ≥ 300 mg/dL. Risco de cetoacidose diabética. Não iniciar exercício. Encaminhar para avaliação médica.", ref:"Zonas Longevus — Glicemia Grau 6", color:"#dc2626", bg:"#fee2e2", border:"#fca5a5" }];
if (gly > 0 && gly < 70)
return [{ level:"stop", icon:"🚫", title:"Hipoglicemia — Suspender; Oferecer Carboidrato", text:"Glicemia < 70 mg/dL. Hipoglicemia. Não iniciar exercício. Oferecer 15g de carboidrato de rápida absorção (suco, gel, glicose). Reavaliar em 15 min.", ref:"Zonas Longevus — Glicemia Grau 1", color:"#dc2626", bg:"#fee2e2", border:"#fca5a5" }];
if (gly >= 200 && gly < 300)
recs.push({ level:"caution", icon:"⚠️", title:"Hiperglicemia — Adiar ou Reduzir Exercício", text:"Glicemia 200–299 mg/dL. Adiar exercício ou realizar apenas atividade muito leve (caminhada < 20 min). Monitorar glicemia a cada 30 min.", ref:"Zonas Longevus — Glicemia Grau 5", color:"#d97706", bg:"#fef9c3", border:"#fde68a" });
else if (gly >= 140 && gly < 200)
recs.push({ level:"caution", icon:"⚠️", title:"Pré-diabetes / Hiperglicemia Leve — Orientar", text:"Glicemia 140–199 mg/dL. Exercício de intensidade moderada com monitoramento. Orientar redução da intensidade. Reavaliar glicemia pós-exercício.", ref:"Zonas Longevus — Glicemia Grau 4", color:"#d97706", bg:"#fef9c3", border:"#fde68a" });
else if (gly >= 100 && gly < 140)
recs.push({ level:"ok", icon:"✅", title:"Glicemia Normal — Continuar Normalmente", text:"Glicemia 100–139 mg/dL. Dentro da faixa normal para exercício. Monitorar conforme protocolo Longevus.", ref:"Zonas Longevus — Glicemia Grau 3", color:"#16a34a", bg:"#dcfce7", border:"#86efac" });
else if (gly >= 70 && gly < 100)
recs.push({ level:"info", icon:"ℹ️", title:"Glicemia Limite Baixo — Monitorar; Lanche Pré-Sessão", text:"Glicemia 70–99 mg/dL. Oferecer pequeno lanche pré-exercício (15–20g carboidrato). Monitorar sinais de hipoglicemia durante a sessão.", ref:"Zonas Longevus — Glicemia Grau 2", color:"#6366f1", bg:"#eef2ff", border:"#c7d2fe" });
// ── SpO₂ ────────────────────────────────────────────────────────────────────
if (spo2 > 0 && spo2 < 90)
return [{ level:"stop", icon:"🚫", title:"SpO₂ Crítica — Interromper Imediatamente", text:"Saturação < 90%. Interromper exercício. Posicionar aluno sentado ou em decúbito elevado. Acionar suporte médico.", ref:"ACSM — Critério de parada SpO₂", color:"#dc2626", bg:"#fee2e2", border:"#fca5a5" }];
if (spo2 >= 90 && spo2 < 94)
recs.push({ level:"caution", icon:"⚠️", title:"SpO₂ Reduzida — Reduzir Intensidade", text:"Saturação 90–93%. Reduzir intensidade imediatamente. Exercícios de baixo consumo de O₂. Monitorar continuamente. Interromper se cair abaixo de 90%.", ref:"ACSM — SpO₂ zona de atenção", color:"#d97706", bg:"#fef9c3", border:"#fde68a" });

const classifyMMSE = (score) => {
const n = parseInt(score);
if (isNaN(n)) return null;
if (n >= 27) return { label:"Normal", desc:"Sem indicativo de comprometimento cognitivo.", impact:"Cognição preservada para as exigências do dia a dia: gerenciar compromissos, medicamentos, finanças e seguir conversas e instruções sem dificuldade.", color:"#16a34a", bg:"#dcfce7" };
if (n >= 24) return { label:"Comprometimento Leve", desc:"Possível comprometimento cognitivo leve. Recomendar avaliação neurológica.", impact:"Pode começar a apresentar pequenos esquecimentos do dia a dia, como esquecer onde guardou objetos, repetir perguntas ou ter mais dificuldade para aprender coisas novas. Ainda mantém independência, mas exige atenção a sinais de progressão.", color:"#d97706", bg:"#fef9c3" };
if (n >= 18) return { label:"Comprometimento Moderado", desc:"Comprometimento cognitivo moderado. Encaminhamento médico recomendado. Priorizar treino neurofuncional supervisionado.", impact:"Pode afetar a capacidade de seguir sequências de exercícios, memorizar orientações e manter atenção. No cotidiano, pode dificultar o controle de medicamentos, lembrar compromissos, seguir receitas ou instruções com várias etapas, e aumenta o risco de se perder em ambientes pouco familiares. Exige comandos simples, supervisão constante e comunicação com médico.", color:"#ea580c", bg:"#ffedd5" };
return { label:"Comprometimento Grave", desc:"Comprometimento cognitivo grave. Avaliação médica urgente. Exercício supervisionado com baixíssima complexidade.", impact:"Indica perda significativa de autonomia: dificuldade para reconhecer pessoas e lugares familiares, lembrar informações recentes, tomar decisões simples e realizar atividades básicas sem auxílio. Necessita supervisão próxima e contínua em praticamente todas as atividades.", color:"#dc2626", bg:"#fee2e2" };
};
const classifyDualTask = (single, dual) => {
const s = parseFloat(single), d = parseFloat(dual);
if (!s || !d) return null;
const cost = Math.round(((s - d) / s) * 100);
if (cost < 0) return { cost: Math.abs(cost), label:"Sem custo (melhora)", desc:"Desempenho igual ou superior com dupla tarefa. Excelente controle cognitivo-motor.", impact:"Consegue realizar tarefas simultâneas no dia a dia (como caminhar e conversar, ou andar carregando objetos) sem perda de equilíbrio ou atenção. Baixo risco de quedas em ambientes com distrações.", color:"#16a34a", bg:"#dcfce7" };
if (cost < 10) return { cost, label:"Baixo Custo (<10%)", desc:"Boa capacidade de divisão atencional. Pode progredir para dual tasks moderadas.", impact:"Boa capacidade de fazer mais de uma coisa ao mesmo tempo, como andar e conversar, ou atravessar a rua observando o trânsito. Baixo risco de quedas em situações do cotidiano que exigem atenção dividida.", color:"#16a34a", bg:"#dcfce7" };
if (cost < 20) return { cost, label:"Custo Moderado (10–20%)", desc:"Atenção dividida comprometida. Incluir dual task progressiva na prescrição.", impact:"Pode ter dificuldade em situações que exigem atenção dividida, como caminhar enquanto conversa, carrega objetos ou observa o ambiente. Aumenta um pouco o risco de tropeços em ambientes movimentados ou com obstáculos.", color:"#d97706", bg:"#fef9c3" };
if (cost < 35) return { cost, label:"Custo Elevado (20–35%)", desc:"Dificuldade significativa de divisão atencional. Risco de queda em ambientes complexos. Treino neurofuncional prioritário.", impact:"Dificuldade significativa em realizar duas tarefas ao mesmo tempo — por exemplo, andar e conversar, ou caminhar enquanto procura algo na bolsa. Aumenta o risco de quedas em ambientes movimentados, como supermercados, ruas com trânsito ou ao atender o celular enquanto caminha.", color:"#ea580c", bg:"#ffedd5" };
return { cost, label:"Custo Muito Elevado (>35%)", desc:"Comprometimento grave da atenção dividida. Alto risco de queda. Iniciar dual task apenas no nível básico com supervisão constante.", impact:"Comprometimento importante: tarefas simultâneas como caminhar e conversar, ou andar enquanto carrega algo, tornam-se perigosas. Alto risco de quedas em qualquer ambiente com distrações, mesmo dentro de casa (ex: andar e atender alguém, desviar de um móvel enquanto fala).", color:"#dc2626", bg:"#fee2e2" };
};
const classifyVerbalFluency = (score) => {
const n = parseInt(score);
if (isNaN(n)) return null;
if (n >= 18) return { label:"Excelente", desc:"Fluência verbal e memória semântica muito preservadas.", impact:"Facilidade para se comunicar, encontrar as palavras certas em conversas e participar ativamente de discussões e atividades sociais.", color:"#16a34a", bg:"#dcfce7" };

if (n >= 9)  return { label:"Limítrofe", desc:"Fluência verbal abaixo do esperado. Atenção a possível declínio de memória semântica.", impact:"Pode começar a sentir mais dificuldade para encontrar palavras durante conversas, o que às vezes leva a pausas, repetições ou frases incompletas. No cotidiano, pode gerar certa frustração em conversas mais longas ou em grupo.", color:"#d97706", bg:"#fef9c3" };

};
const classifyDigitSpan = (direct, inverse) => {

else { label="Reduzida"; desc="Memória de trabalho comprometida. Treino cognitivo e neurofuncional prioritário."; impact="Dificuldade significativa para reter e manipular informações temporariamente. Afeta a capacidade de memorizar sequências de exercícios, lembrar instruções recentes, gerenciar a tomada correta de medicamentos e realizar tarefas com múltiplos passos, como seguir uma receita ou usar transporte público."; color="#dc2626"; bg="#fee2e2"; }
return { label, desc, impact, color, bg };

const calcCognitiveScore = (mmse, dtSingle, dtDual, verbal, digitD, digitI) => {
let total = 0, count = 0;
const mmseN = parseInt(mmse);
if (!isNaN(mmseN)) { total += (mmseN / 30) * 100; count++; }
const dtCl = classifyDualTask(dtSingle, dtDual);
if (dtCl) {
const dtScore = dtCl.cost < 0 ? 100 : Math.max(0, 100 - dtCl.cost * 2);
total += dtScore; count++;
}
const vN = parseInt(verbal);
if (!isNaN(vN)) { total += Math.min(100, (vN / 18) * 100); count++; }
const dN = parseInt(digitD);
if (!isNaN(dN)) { total += Math.min(100, (dN / 9) * 100); count++; }
return count > 0 ? Math.round(total / count) : 0;
};

const calcKarvonen = (fcMax, fcRest, pct) => Math.round(((fcMax - fcRest) * pct) + fcRest);

const calcDP = (fc, pas) => fc && pas ? Math.round(parseFloat(fc) * parseFloat(pas)) : null;
const metClass = (v) => {
const n = parseFloat(v);
if (!n) return null;
if (n < 5)  return { label:"Baixa (<5 METs)", color:"#dc2626", bg:"#fee2e2" };
if (n < 7)  return { label:"Moderada (5–7 METs)", color:"#d97706", bg:"#fef9c3" };
if (n < 10) return { label:"Boa (7–10 METs)", color:"#65a30d", bg:"#ecfccb" };
return { label:"Muito boa (>10 METs)", color:"#16a34a", bg:"#dcfce7" };

const riskStratify = (fields) => {
const { cardioDisease, symptoms, hypertension, diabetes, obesity, sedentary } = fields;
if (cardioDisease || symptoms) return {
level:"high", label:"Alto Risco", color:"#dc2626", bg:"#fee2e2",
fcr:"40–60% FCR", borg:"2–3", alert:"Considerar avaliação médica e/ou teste ergométrico antes de progredir."
};
if (hypertension || diabetes || obesity || sedentary) return {
level:"moderate", label:"Risco Moderado", color:"#d97706", bg:"#fef9c3",
fcr:"50–70% FCR", borg:"3–5", alert:""
};
return {
level:"low", label:"Baixo Risco", color:"#16a34a", bg:"#dcfce7",
fcr:"60–80% FCR", borg:"5–6", alert:""
};
};

const buildProgram = (assessment, student, freq, env, phase) => {

const priorities = getRankedPriorities(assessment, student);
const f = parseInt(freq) || 3;
const p = parseInt(phase) || 1;

const days = [];
if (f === 1) {
days.push({ day: "Dia Único — Full Body", sessions: sessions.slice(0,4), warmup, cooldown });
} else if (f === 2) {
const half = Math.ceil(sessions.length / 2);
days.push({ day: "Dia A", sessions: sessions.slice(0, half), warmup, cooldown });
days.push({ day: "Dia B", sessions: sessions.slice(half), warmup, cooldown });
} else if (f === 3) {
days.push({ day: "Dia A — Força + Core", sessions: sessions.filter(s=>s.priority.includes("Força")||s.priority.includes("Core")), warmup, cooldown });
days.push({ day: "Dia B — Cardio + Equilíbrio", sessions: sessions.filter(s=>s.priority.includes("Cardio")||s.priority.includes("Equilíbrio")||s.priority.includes("Quedas")), warmup, cooldown });
days.push({ day: "Dia C — Funcional + Neuro", sessions: sessions.filter(s=>s.priority.includes("Neuro")||s.priority.includes("Func")||s.priority.includes("AVD")), warmup: warmup, cooldown });
days.forEach((d,i) => { if(d.sessions.length===0) d.sessions = sessions.slice(i%sessions.length, (i%sessions.length)+2); });
} else {
const chunk = Math.ceil(sessions.length / Math.min(f, 4));
for(let i=0; i<Math.min(f,4); i++) {
days.push({ day: "Dia " + String.fromCharCode(65+i), sessions: sessions.slice(i*chunk, (i+1)*chunk), warmup, cooldown });
}
}

const suggestProgression = (exercise, history) => {
if (!history || history.length < 2) return null;
const recent = history.slice(-3);
const avgPSE = recent.reduce((s,h) => s + (h.pse||5), 0) / recent.length;
const allCompleted = recent.every(h => h.completed);
const ex = recent[recent.length-1];
if (!ex) return null;
if (allCompleted && avgPSE <= 5) {
const repsNum = parseInt(ex.reps);
if (!isNaN(repsNum) && repsNum < 15) return { type:"reps", from:ex.reps, to:String(repsNum+2), reason:"PSE baixo e execução consistente. Aumentar repetições." };
const setsNum = parseInt(ex.sets);
if (!isNaN(setsNum) && setsNum < 4) return { type:"sets", from:String(ex.sets), to:String(setsNum+1), reason:"Boa tolerância. Adicionar mais uma série." };
if (ex.load) { const l=parseFloat(ex.load); return { type:"load", from:String(ex.load), to:(l*1.05).toFixed(1), reason:"Execução consistente. Progressão de 5% na carga." }; }
}
if (!allCompleted || avgPSE >= 8) return { type:"regress", from:"", to:"", reason:"PSE elevado ou sessões incompletas. Manter ou regredir exercício." };
return null;
};

return(

<Inp label="Carga (kg)" type="number" value={ex.load||""} onChange={v=>updateEx(ei,"load",v)} placeholder="—"/>

<div style={{ display:"flex",alignItems:"center",gap:8 }}>

<Inp label="Obs do exercício" value={ex.obs||""} onChange={v=>updateEx(ei,"obs",v)} placeholder="Adaptação usada, queixa, foco..."/>
</div>}
</div>
);
})}
</Card>}
<Btn full onClick={save} disabled={saved}>{saved?"✅ Salvo!":"💾 Salvar Sessão"}</Btn>
</>}
</>}
{/* HISTÓRICO */}
{view==="history" && <>
<Card style={{ marginBottom:14 }}>
<Inp label="Aluno" value={selSt} onChange={setSelSt} opts={[{v:"",l:"Selecione..."},...students.map(s=>({v:s.id,l:s.name}))]}/>
</Card>
{selSt && <>
{/* Resumo */}
<Card style={{ marginBottom:14 }}>
<div style={{ fontWeight:700,fontSize:14,marginBottom:12 }}>📊 Resumo de Adesão</div>
<div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10 }}>
{[
{label:"Total",value:stSessions.length,color:"#6366f1"},

{label:"Adesão",value:attendance+"%",color:attendance>=80?"#16a34a":attendance>=60?"#d97706":"#dc2626"},
].map(item=>(

{/* Barra de adesão */}
<div style={{ marginTop:12,background:"#f1f5f9",borderRadius:99,height:8,overflow:"hidden" }}>

</div>
</Card>
{/* Lista de sessões */}
{stSessions.length===0
? <Card style={{ textAlign:"center",padding:32,color:"#94a3b8" }}>Nenhuma sessão registrada ainda.</Card>
: stSessions.map(s=>{

return(
<Card key={s.id} style={{ marginBottom:10,border:"1.5px solid "+(s.present?"#f1f5f9":"#fca5a5") }}>

// RELATÓRIO DE MONITORAMENTO
// ═══════════════════════════════════════════════════════════════════════════════
const ReportMonitoring = ({ student: st, logs, period }) => {
if (!st || !logs || logs.length === 0) return null;
const periodLabels = { 1:"Mensal", 2:"Bimestral", 3:"Trimestral", 6:"Semestral", 12:"Anual" };
const now = new Date();
const cutoff = new Date(now.getFullYear(), now.getMonth() - period + 1, 1);
const filtered = logs.filter(l => l.studentId === st.id && new Date(l.date) >= cutoff)
.sort((a,b) => a.date?.localeCompare(b.date));
const present = filtered.filter(l => l.pre?.sbp || l.pre?.fc || l.post?.sbp || l.pre?.pas || l.pre?.glycemia);
const total = filtered.length;
const attendance = total > 0 ? Math.round((present.length/total)*100) : 0;
const avg = (arr, fn) => { const v = arr.map(fn).filter(x=>x&&!isNaN(parseFloat(x))); return v.length ? (v.reduce((a,b)=>a+parseFloat(b),0)/v.length).toFixed(1) : "—"; };
// Sinais vitais
const avgPreSbp  = avg(present, l=>l.pre?.sbp||l.pre?.pas);
const avgPrePad  = avg(present, l=>l.pre?.pad);
const avgPreFc   = avg(present, l=>l.pre?.fc);
const avgPostSbp = avg(present, l=>l.post?.sbp||l.post?.pas);
const avgPostPad = avg(present, l=>l.post?.pad);
const avgPostFc  = avg(present, l=>l.post?.fc);
const avgSpo2    = avg(present, l=>l.pre?.spo2);
const avgGly     = avg(present, l=>l.pre?.glycemia);
// PSE
const hasPSE = filtered.some(l => l.pre?.pse!==""&&l.pre?.pse!==undefined || l.during?.pse!==""&&l.during?.pse!==undefined || l.post?.pse!==""&&l.post?.pse!==undefined);
const avgPsePre    = avg(filtered, l=>l.pre?.pse);
const avgPseDuring = avg(filtered, l=>l.during?.pse);
const avgPsePost   = avg(filtered, l=>l.post?.pse);
// Disposição e hidratação
const avgDisp = avg(filtered, l=>l.disposition);
const avgHyd  = avg(filtered, l=>l.hydration);
const avgDispNum = parseFloat(avgDisp);
const avgHydNum  = parseFloat(avgHyd);
const dispLabels = ["","Exausto","Cansado","Neutro","Disposto","Animado"];
const dispEmoji  = ["","😣","😴","😐","🙂","😁"];
// Alertas
const alertCount = present.filter(l => {
const s = parseFloat(l.pre?.sbp||l.pre?.pas);
const d = parseFloat(l.pre?.pad);
const fc = parseFloat(l.pre?.fc);
const spo2 = parseFloat(l.pre?.spo2);
const gly = parseFloat(l.pre?.glycemia);
return (s>=160)||(d>=100)||(fc>110)||(spo2>0&&spo2<94)||(gly>0&&(gly<70||gly>=200));
}).length;
// PSE médio durante — classificação
const pseDuringNum = parseFloat(avgPseDuring);
const pseDuringCl = !isNaN(pseDuringNum) ? classifyPSE(Math.round(pseDuringNum)) : null;
return (
<div className="print-page" style={{ padding:20, maxWidth:800, margin:"0 auto" }}>
<ProfHeader/>
<div style={{ marginBottom:16 }}>
<div style={{ fontWeight:800, fontSize:18, color:"#0f172a" }}>Relatório de Monitoramento</div>
<div style={{ fontSize:13, color:"#64748b" }}>
{st.name} · {calcAge(st.dob)} anos · {st.sex==="M"?"Masculino":"Feminino"} · {periodLabels[period]} · Gerado em {new Date().toLocaleDateString("pt-BR")}
</div>
<div style={{ fontSize:12, color:"#94a3b8", marginTop:2 }}>
Período: {cutoff.toLocaleDateString("pt-BR")} a {now.toLocaleDateString("pt-BR")}
</div>
</div>
{total === 0 ? (
<div style={{ textAlign:"center", color:"#94a3b8", padding:40 }}>Nenhum registro no período selecionado.</div>
) : <>
{/* Resumo */}
<div className="report-section" style={{ marginBottom:18 }}>
<div style={{ fontWeight:700, fontSize:13, color:"#FF5603", textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:10 }}>Resumo do Período</div>
<div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8 }}>
{[
{ label:"Registros", value:total, color:"#6366f1", bg:"#eef2ff" },
{ label:"Adesão", value:attendance+"%", color:attendance>=80?"#16a34a":attendance>=60?"#d97706":"#dc2626", bg:attendance>=80?"#dcfce7":attendance>=60?"#fef9c3":"#fee2e2" },
{ label:"Alertas", value:alertCount, color:alertCount>0?"#dc2626":"#16a34a", bg:alertCount>0?"#fee2e2":"#dcfce7" },
{ label:"PSE Médio", value:!isNaN(pseDuringNum)?pseDuringNum.toFixed(1):"—", color:pseDuringCl?.color||"#FF5603", bg:pseDuringCl?.bg||"#fff4ee" },
].map(item=>(
<div key={item.label} style={{ background:item.bg, border:"1px solid "+item.color+"33", borderRadius:10, padding:"10px 8px", textAlign:"center" }}>
<div style={{ fontSize:22, fontWeight:900, color:item.color }}>{item.value}</div>
<div style={{ fontSize:11, color:"#64748b", marginTop:2 }}>{item.label}</div>
</div>
))}
</div>
</div>
{/* Sinais Vitais */}
<div className="report-section" style={{ marginBottom:18 }}>
<div style={{ fontWeight:700, fontSize:13, color:"#FF5603", textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:10 }}>Sinais Vitais — Médias do Período</div>
<div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:10 }}>
{[
{ label:"PA Pré (mmHg)", value:avgPreSbp+"/"+avgPrePad, color:"#6366f1" },
{ label:"FC Pré (bpm)", value:avgPreFc, color:"#FF5603" },
{ label:"SpO₂ (%)", value:avgSpo2, color:"#0891b2" },
{ label:"PA Pós (mmHg)", value:avgPostSbp+"/"+avgPostPad, color:"#6366f1" },
{ label:"FC Pós (bpm)", value:avgPostFc, color:"#FF5603" },
{ label:"Glicemia (mg/dL)", value:avgGly, color:"#d97706" },
].map(item=>(
<div key={item.label} style={{ background:"#f8fafc", border:"1px solid "+item.color+"22", borderRadius:9, padding:"9px 10px" }}>
<div style={{ fontSize:10, color:"#94a3b8", fontWeight:700, textTransform:"uppercase" }}>{item.label}</div>
<div style={{ fontSize:18, fontWeight:900, color:item.color, marginTop:2 }}>{item.value}</div>
</div>
))}
</div>
{alertCount > 0 && <div style={{ background:"#fee2e2", border:"1px solid #fca5a5", borderRadius:9, padding:"9px 12px", fontSize:12, color:"#dc2626", fontWeight:600 }}>
⚠️ {alertCount} sessão(ões) com alertas de sinais vitais fora das Zonas Longevus no período.
</div>}
</div>
{/* PSE */}
{hasPSE && <div className="report-section" style={{ marginBottom:18 }}>
<div style={{ fontWeight:700, fontSize:13, color:"#FF5603", textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:10 }}>Percepção Subjetiva de Esforço (PSE 0–10)</div>
<div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:pseDuringCl?10:0 }}>
{[
{ label:"PSE Pré", value:avgPsePre, cl:!isNaN(parseFloat(avgPsePre))?classifyPSE(Math.round(parseFloat(avgPsePre))):null },
{ label:"PSE Durante", value:avgPseDuring, cl:pseDuringCl },
{ label:"PSE Pós", value:avgPsePost, cl:!isNaN(parseFloat(avgPsePost))?classifyPSE(Math.round(parseFloat(avgPsePost))):null },
].map(item=>(
<div key={item.label} style={{ background:item.cl?.bg||"#f8fafc", border:"1px solid "+(item.cl?.color||"#e2e8f0")+"44", borderRadius:9, padding:"9px 10px", textAlign:"center" }}>
<div style={{ fontSize:10, color:"#94a3b8", fontWeight:700, textTransform:"uppercase" }}>{item.label}</div>
<div style={{ fontSize:22, fontWeight:900, color:item.cl?.color||"#64748b", marginTop:2 }}>{item.value}</div>
{item.cl&&<div style={{ fontSize:10, color:item.cl.color, fontWeight:700, marginTop:2 }}>{item.cl.label}</div>}
</div>
))}
</div>
{pseDuringCl&&<div style={{ background:pseDuringCl.bg, border:"1px solid "+pseDuringCl.color+"44", borderRadius:9, padding:"9px 12px", fontSize:12, color:pseDuringCl.color, fontWeight:600 }}>
PSE médio durante o exercício: {avgPseDuring}/10 — {pseDuringCl.label}. {pseDuringCl.rec}
</div>}
</div>}
{/* Disposição e Hidratação */}
{(filtered.some(l=>l.disposition)||filtered.some(l=>l.hydration)) && <div className="report-section" style={{ marginBottom:18 }}>
<div style={{ fontWeight:700, fontSize:13, color:"#FF5603", textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:10 }}>Bem-estar e Hidratação</div>
<div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
{filtered.some(l=>l.disposition) && <div style={{ background:"#eef2ff", border:"1px solid #c7d2fe", borderRadius:10, padding:"12px 14px" }}>
<div style={{ fontSize:11, color:"#94a3b8", fontWeight:700, textTransform:"uppercase", marginBottom:4 }}>Disposição Média Pré-Treino</div>
<div style={{ fontSize:28 }}>{!isNaN(avgDispNum)?dispEmoji[Math.round(avgDispNum)]:"—"}</div>
<div style={{ fontWeight:700, color:"#6366f1", fontSize:13 }}>{!isNaN(avgDispNum)?dispLabels[Math.round(avgDispNum)]:"—"}</div>
<div style={{ fontSize:11, color:"#64748b", marginTop:2 }}>Média: {avgDisp}/5 · {filtered.filter(l=>l.disposition<=2).length} sessão(ões) com disposição baixa</div>
</div>}
{filtered.some(l=>l.hydration) && <div style={{ background:"#ecfeff", border:"1px solid #a5f3fc", borderRadius:10, padding:"12px 14px" }}>
<div style={{ fontSize:11, color:"#94a3b8", fontWeight:700, textTransform:"uppercase", marginBottom:4 }}>Hidratação Média</div>
<div style={{ fontSize:22 }}>{"💧".repeat(Math.max(1,Math.round(avgHydNum)||1))}</div>
<div style={{ fontWeight:700, color:"#0891b2", fontSize:13 }}>{!isNaN(avgHydNum)?["","Muito baixa","Baixa","Regular","Boa","Ótima"][Math.round(avgHydNum)]:"—"}</div>
<div style={{ fontSize:11, color:"#64748b", marginTop:2 }}>Média: {avgHyd}/5 · {filtered.filter(l=>l.hydration<=2).length} sessão(ões) com hidratação baixa</div>
</div>}
</div>
</div>}
{/* Tabela de sessões */}
<div className="report-section" style={{ marginBottom:18 }}>
<div style={{ fontWeight:700, fontSize:13, color:"#FF5603", textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:10 }}>Histórico de Sessões</div>
<div style={{ overflowX:"auto" }}>
<table style={{ width:"100%", borderCollapse:"collapse", fontSize:11 }}>
<thead><tr style={{ background:"#f8fafc" }}>
{["Data","PA Pré","FC Pré","SpO₂","Glicemia","PSE Pré","PSE Dur.","PSE Pós","PA Pós","FC Pós","Disp.","Hidrat.","Obs"].map(h=>(
<th key={h} style={{ padding:"7px 8px", textAlign:"left", fontWeight:700, color:"#475569", borderBottom:"1.5px solid #e2e8f0", whiteSpace:"nowrap" }}>{h}</th>
))}
</tr></thead>
<tbody>
{filtered.slice().reverse().map((l,i)=>{
const sbp = parseFloat(l.pre?.sbp||l.pre?.pas);
const gly = parseFloat(l.pre?.glycemia);
const fc  = parseFloat(l.pre?.fc);
const spo2= parseFloat(l.pre?.spo2);
const alert = (sbp>=160)||(parseFloat(l.pre?.pad)>=100)||(fc>110)||(spo2>0&&spo2<94)||(gly>0&&(gly<70||gly>=200));
const pseDurCl = l.during?.pse!==""&&l.during?.pse!==undefined ? classifyPSE(l.during.pse) : null;
return(
<tr key={l.id||i} style={{ borderBottom:"1px solid #f1f5f9", background:alert?"#fff5f5":i%2===0?"#fff":"#fafafa" }}>
<td style={{ padding:"7px 8px", fontWeight:600, whiteSpace:"nowrap" }}>{fmt(l.date)}</td>
<td style={{ padding:"7px 8px", color:sbp>=160?"#dc2626":sbp>=140?"#d97706":"inherit", fontWeight:sbp>=140?700:400 }}>{(l.pre?.sbp||l.pre?.pas)&&l.pre?.pad?(l.pre.sbp||l.pre.pas)+"/"+l.pre.pad:"—"}</td>
<td style={{ padding:"7px 8px", color:fc>110?"#dc2626":fc>=100?"#d97706":"inherit" }}>{l.pre?.fc||"—"}</td>
<td style={{ padding:"7px 8px", color:spo2>0&&spo2<94?"#dc2626":"inherit" }}>{l.pre?.spo2?l.pre.spo2+"%":"—"}</td>
<td style={{ padding:"7px 8px", color:gly>0&&(gly<70||gly>=200)?"#dc2626":"inherit" }}>{l.pre?.glycemia||"—"}</td>
<td style={{ padding:"7px 8px" }}>{l.pre?.pse!==""&&l.pre?.pse!==undefined?l.pre.pse:"—"}</td>
<td style={{ padding:"7px 8px", fontWeight:700, color:pseDurCl?.color||"inherit", background:pseDurCl?.bg||"transparent" }}>{l.during?.pse!==""&&l.during?.pse!==undefined?l.during.pse:"—"}</td>
<td style={{ padding:"7px 8px" }}>{l.post?.pse!==""&&l.post?.pse!==undefined?l.post.pse:"—"}</td>
<td style={{ padding:"7px 8px" }}>{(l.post?.sbp||l.post?.pas)&&l.post?.pad?(l.post.sbp||l.post.pas)+"/"+l.post.pad:"—"}</td>
<td style={{ padding:"7px 8px" }}>{l.post?.fc||"—"}</td>
<td style={{ padding:"7px 8px" }}>{l.disposition?dispEmoji[l.disposition]:"—"}</td>
<td style={{ padding:"7px 8px" }}>{l.hydration?"💧".repeat(l.hydration):"—"}</td>
<td style={{ padding:"7px 8px", color:"#64748b", fontSize:10 }}>{l.notes||"—"}</td>
</tr>
);

supa.auth.getSession().then(({data})=>{ setSession(data?.session||null); setAuthLoading(false); });

setSession(sess);

return ()=>{ listener?.subscription?.unsubscribe(); };

fetch(SUPA_URL+"/rest/v1/professionals?id=eq."+session.user.id, {
method:"PATCH", headers: { ...headers, "Prefer":"return=minimal" },

setDbReady(true);
