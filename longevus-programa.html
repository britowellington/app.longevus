const { useState, useCallback, useEffect } = React;

const SUPA_URL = "https://jpduxfbigcdxmtcozqpp.supabase.co";
const SUPA_KEY = "sb_publishable_VZSgcxu5ps3eR9UAjuRr4Q_B65WTx_h";
const supa = window.supabase.createClient(SUPA_URL, SUPA_KEY);
const SUPPORT_WHATSAPP = "5511977431011";
async function authHeadersFn(){ const { data } = await supa.auth.getSession(); const token = data?.session?.access_token || SUPA_KEY; return { "apikey": SUPA_KEY, "Authorization": "Bearer "+token, "Content-Type": "application/json" }; }

const Login = ({ onLogin }) => {
const [nome,setNome]=useState("");
const [whatsapp,setWhatsapp]=useState("");
const [email,setEmail]=useState("");
const [password,setPassword]=useState("");
const [mode,setMode]=useState("signin"); // signin | signup | forgot
const [error,setError]=useState("");
const [info,setInfo]=useState("");
const [loading,setLoading]=useState(false);
const submit = async (e) => {
e.preventDefault();
setError(""); setInfo(""); setLoading(true);
try {
if (mode==="signin") {
const { error } = await supa.auth.signInWithPassword({ email, password });
if (error) throw error;
} else if (mode==="forgot") {
const { error } = await supa.auth.resetPasswordForEmail(email, { redirectTo: window.location.href.split("?")[0].split("#")[0] });
if (error) throw error;
setInfo("Enviamos um link de redefinição para "+email+". Verifique sua caixa de entrada.");
setLoading(false);
return;
} else {
const { error } = await supa.auth.signUp({ email, password, options: { data: { nome, whatsapp } } });
if (error) throw error;
setInfo("Conta criada! Faça login.");
setMode("signin");
setLoading(false);
return;
}
onLogin();
} catch(err) {
setError(err.message || "Erro ao autenticar.");
} finally {
setLoading(false);
}
};
return (
<div style={{ minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f8fafc",padding:20 }}>
<form onSubmit={submit} style={{ background:"#fff",borderRadius:16,padding:28,width:"100%",maxWidth:380,boxShadow:"0 4px 24px rgba(0,0,0,0.06)" }}>
<div style={{ textAlign:"center",marginBottom:18 }}>
<img src={__LOGO__} alt="Longevus" style={{ width:56,height:56,margin:"0 auto 8px",display:"block" }}/>
<div style={{ fontWeight:900,fontSize:20 }}>Longevus</div>
<div style={{ fontSize:12,color:"#94a3b8" }}>Treinamento Neurofuncional</div>
</div>
{mode==="signup" && (
<div style={{ marginBottom:12 }}>
<label style={{ fontSize:12,fontWeight:600,color:"#475569",display:"block",marginBottom:4 }}>Nome</label>
<input type="text" required value={nome} onChange={e=>setNome(e.target.value)} style={{ width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:14,boxSizing:"border-box" }}/>
</div>
)}
{mode==="signup" && (
<div style={{ marginBottom:12 }}>
<label style={{ fontSize:12,fontWeight:600,color:"#475569",display:"block",marginBottom:4 }}>WhatsApp</label>
<input type="tel" required placeholder="(11) 91234-5678" value={whatsapp} onChange={e=>setWhatsapp(e.target.value)} style={{ width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:14,boxSizing:"border-box" }}/>
</div>
)}
<div style={{ marginBottom:12 }}>
<label style={{ fontSize:12,fontWeight:600,color:"#475569",display:"block",marginBottom:4 }}>E-mail</label>
<input type="email" required value={email} onChange={e=>setEmail(e.target.value)} style={{ width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:14,boxSizing:"border-box" }}/>
</div>
{mode!=="forgot" && (
<div style={{ marginBottom:16 }}>
<label style={{ fontSize:12,fontWeight:600,color:"#475569",display:"block",marginBottom:4 }}>Senha</label>
<input type="password" required value={password} onChange={e=>setPassword(e.target.value)} style={{ width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:14,boxSizing:"border-box" }}/>
</div>
)}
{mode==="signin" && (
<div style={{ textAlign:"right",marginTop:-8,marginBottom:16 }}>
<a href="#" onClick={e=>{e.preventDefault();setMode("forgot");setError("");setInfo("");}} style={{ fontSize:12,color:"#94a3b8" }}>Esqueci minha senha</a>
</div>
)}
{error && <div style={{ fontSize:12,color:"#dc2626",marginBottom:12,textAlign:"center" }}>{error}</div>}
{info && <div style={{ fontSize:12,color:"#16a34a",marginBottom:12,textAlign:"center" }}>{info}</div>}
<button type="submit" disabled={loading} style={{ width:"100%",padding:"11px",borderRadius:8,border:"none",background:"#FF5603",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",opacity:loading?0.7:1 }}>
{loading ? "Aguarde..." : (mode==="signin" ? "Entrar" : mode==="forgot" ? "Enviar link de redefinição" : "Criar conta")}
</button>
<div style={{ textAlign:"center",marginTop:14,fontSize:13 }}>
{mode==="signin" ? (
<span>Não tem conta? <a href="#" onClick={e=>{e.preventDefault();setMode("signup");setError("");setInfo("");}} style={{ color:"#FF5603",fontWeight:600 }}>Criar conta</a></span>
) : (
<span>{mode==="forgot"?"Lembrou a senha?":"Já tem conta?"} <a href="#" onClick={e=>{e.preventDefault();setMode("signin");setError("");setInfo("");}} style={{ color:"#FF5603",fontWeight:600 }}>Entrar</a></span>
)}
</div>
</form>
</div>
);
};

const getPresc=(exId,bKey,bibCustom=[])=>{
  const ex=EXERCISES.find(e=>e.id===exId)||bibCustom.find(e=>e.id===exId);

    const grip=parseFloat(a.phys?.grip||0);
    const chair=parseFloat(a.phys?.sppbChair||0);

    if(sppb<=2||a.funcRisk?.falls||a.funcRisk?.balance)priorities.push("quedas","equilíbrio");

      b2: [PROGRESSAO.MMII_poster[1],PROGRESSAO.MMSS_pull[1],  PROGRESSAO.Eq_dinamico[1], PROGRESSAO.Core_rot[1]],
      b3: [PROGRESSAO.MMII_squat[2], PROGRESSAO.MMSS_push2[2], PROGRESSAO.Eq_dinamico[2], PROGRESSAO.Core_estab[2]],
      b4: [PROGRESSAO.MMII_quad[3],  PROGRESSAO.MMSS_pull[3],  PROGRESSAO.Eq_dinamico[3], PROGRESSAO.Core_rot[3]],
    },
  };

  const prescricao={};
  BLOCOS.forEach(bloco=>{
    prescricao[bloco.key]={};
    treinosUnicos.forEach(treinoKey=>{
      const tDef=TREINO_DEFS[treinoKey];
      if(!tDef)return;
      const bIdx=bloco.key; // b1, b2, b3, b4

      // ── PARTE INICIAL: cognitivo + mobilidade específica do treino ──
      const cogId=suggestCognitivo(bloco.key,assessment);
      const cogEx=COGNITIVOS.find(c=>c.id===cogId);
      const mobilIds=MOBIL_TREINO[treinoKey]||MOBIL_TREINO.A;
      const inicial=[
        { exId:"cognitivo", cogId, series:"1", reps:cogEx?.duracao||"5 min", descanso:"—", obs:"Exercício cognitivo — abre o Hub para executar", isCognitivo:true },
        ...mobilIds.map(id=>{
          const ex=EXERCISES.find(e=>e.id===id);
          if(!ex)return null;
          const p=getPresc(id,bIdx);
          return{exId:id,series:p.s,reps:p.r,descanso:p.d,obs:""};
        }).filter(Boolean),
      ];

      // ── PARTE PRINCIPAL: exercícios com progressão real por bloco ──
      const exIds=(TREINO_EXERCICIOS[treinoKey]||TREINO_EXERCICIOS.A)[bIdx]||[];
      // Deduplica IDs (um mesmo exercício pode aparecer na progressão)
      const seenIds=new Set();
      const principal=exIds
        .filter(id=>{if(seenIds.has(id))return false;seenIds.add(id);return true;})
        .map(id=>{
          const ex=EXERCISES.find(e=>e.id===id);
          if(!ex)return null;
          const p=getPresc(id,bIdx);
          return{exId:id,series:p.s,reps:p.r,descanso:p.d,obs:""};
        }).filter(Boolean);

      // ── PARTE FINAL: alongamentos focados no treino ──
      const alongIds=ALONG_TREINO[treinoKey]||ALONG_TREINO.A;
      const respPresc=getPresc("ex28",bIdx);
      const final=[
        ...alongIds.map(id=>{
          const ex=EXERCISES.find(e=>e.id===id);
          if(!ex)return null;
          const p=getPresc(id,bIdx);
          return{exId:id,series:p.s,reps:p.r,descanso:p.d,obs:""};
        }).filter(Boolean),
        {exId:"ex28",series:respPresc.s,reps:respPresc.r,descanso:respPresc.d,obs:"Encerrar a sessão com respiração consciente"},
      ];

      prescricao[bloco.key][treinoKey]={inicial,principal,final};
    });
  });
  return prescricao;
};

// ─── PERFIL DE PRESCRIÇÃO ─────────────────────────────────────────────────────
const PerfilPrescricao=({assessment})=>{
  if(!assessment)return null;
  const a=assessment;const alerts=[];
  const sppb=parseInt(a.phys?.sppbSide||0)?(parseInt(a.phys?.sppbSemi||0)+parseInt(a.phys?.sppbTandem||0)):0;
  const tug=parseFloat(a.phys?.tug||0);const calf=parseFloat(a.aha?.calf||0);const grip=parseFloat(a.phys?.grip||0);
  const path=(a.anamnese?.pathologies||"").toLowerCase();
  if(sppb<=2||a.funcRisk?.falls||a.funcRisk?.balance)alerts.push({icon:"⚠️",color:"#dc2626",bg:"#fee2e2",text:"Equilíbrio comprometido / quedas — protocolo anti-quedas priorizado"});
  if(tug>12)alerts.push({icon:"🚶",color:"#d97706",bg:"#fef9c3",text:`TUG ${tug}s — risco na marcha. MMII e equilíbrio dinâmico priorizados`});
  if(calf>0&&calf<33)alerts.push({icon:"🦵",color:"#d97706",bg:"#fef9c3",text:`Panturrilha ${calf}cm — risco de sarcopenia`});
  if(grip>0&&grip<20)alerts.push({icon:"✊",color:"#d97706",bg:"#fef9c3",text:`Força de preensão ${grip}kg — sarcopenia provável`});
  if(a.aha?.hypertension||path.includes("hipertens"))alerts.push({icon:"❤️",color:"#6366f1",bg:"#eef2ff",text:"Hipertensão — cardio de baixa intensidade incluído"});
  if(a.aha?.diabetes||path.includes("diabet"))alerts.push({icon:"💊",color:"#6366f1",bg:"#eef2ff",text:"Diabetes — controlar glicemia pré e pós-sessão"});
  if(path.includes("artrit")||path.includes("artrose"))alerts.push({icon:"🦴",color:"#475569",bg:"#f1f5f9",text:"Artrite/Artrose — mobilidade priorizada"});
  if(alerts.length===0)alerts.push({icon:"✅",color:"#16a34a",bg:"#dcfce7",text:"Sem alertas críticos. Programa de evolução funcional."});
  return(
    <Card style={{marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>📊 Perfil — avaliação de {fmt(assessment.date)}</div>
      {alerts.map((al,i)=>(<div key={i} style={{background:al.bg,borderRadius:7,padding:"7px 10px",marginBottom:5,display:"flex",gap:7}}><span>{al.icon}</span><span style={{fontSize:12,color:al.color,fontWeight:600,lineHeight:1.4}}>{al.text}</span></div>))}
    </Card>
  );
};

// ─── STEP: FREQUÊNCIA E DIVISÃO ───────────────────────────────────────────────

  const opcoes=DIVISAO_OPTIONS[parseInt(freq)||3]||[];
  const sugestao=assessment?suggestDivisao(parseInt(freq)||3,assessment):null;
  useEffect(()=>{const op=opcoes.find(o=>o.modelo===sugestao?.modelo)||opcoes[opcoes.length>1?1:0];if(op&&!divisao)setDivisao(op);},[freq]);
  const dias=["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"].slice(0,parseInt(freq)||3);
  return(
    <Card>
      <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>Frequência e Divisão</div>
      <Inp label="Frequência semanal" value={String(freq)} onChange={v=>{setFreq(parseInt(v)||3);setDivisao(null);}} opts={[{v:2,l:"2× por semana"},{v:3,l:"3× por semana"},{v:4,l:"4× por semana"},{v:5,l:"5× por semana"}]}/>
      {sugestao&&<div style={{background:"#fff4ee",border:"1.5px solid #fed7aa",borderRadius:9,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#92400e"}}>💡 Sugestão: <strong>{opcoes.find(o=>o.modelo===sugestao.modelo)?.label||sugestao.modelo}</strong></div>}
      <div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:8,textTransform:"uppercase"}}>Modelo de divisão</div>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
        {opcoes.map(op=>(
          <div key={op.modelo} onClick={()=>setDivisao(op)} style={{border:`2px solid ${divisao?.modelo===op.modelo?"#FF5603":"#e2e8f0"}`,borderRadius:11,padding:"12px 14px",cursor:"pointer",background:divisao?.modelo===op.modelo?"#fff4ee":"#fff"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div><div style={{fontWeight:700,fontSize:14,color:divisao?.modelo===op.modelo?"#FF5603":"#0f172a"}}>{op.label}</div><div style={{fontSize:12,color:"#64748b",marginTop:1}}>{op.desc}</div></div>
              <div style={{width:20,height:20,borderRadius:99,border:`2px solid ${divisao?.modelo===op.modelo?"#FF5603":"#cbd5e1"}`,background:divisao?.modelo===op.modelo?"#FF5603":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{divisao?.modelo===op.modelo&&<div style={{width:8,height:8,borderRadius:99,background:"#fff"}}/>}</div>
            </div>
            <div style={{display:"flex",gap:5,marginTop:10,flexWrap:"wrap"}}>
              {op.sequencia.map((t,i)=>{const td=TREINO_DEFS[t];return(<div key={i} style={{textAlign:"center",minWidth:40}}><div style={{fontSize:10,color:"#94a3b8",marginBottom:2}}>{dias[i]||"D"+(i+1)}</div><div style={{background:td?.bg||"#f1f5f9",border:`1.5px solid ${td?.border||"#e2e8f0"}`,borderRadius:7,padding:"4px 5px",fontWeight:800,fontSize:11,color:td?.cor||"#64748b"}}>{t}</div></div>);})}
            </div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:10}}><Btn variant="secondary" full onClick={onBack}>‹ Voltar</Btn><Btn full disabled={!divisao} onClick={onNext}>Ver Exercícios →</Btn></div>

  );
};

// ─── STEP: EXERCÍCIOS POR MOMENTO ─────────────────────────────────────────────
const StepExercicios=({prescricao,setPrescricao,divisao,bibCustom,onNext,onBack})=>{
  const [blocoIdx,setBlocoIdx]=useState(0);
  const [treinoIdx,setTreinoIdx]=useState(0);

        {BLOCOS.map((b,i)=>(<button key={b.key} onClick={()=>{setBlocoIdx(i);setTreinoIdx(0);}} style={{flex:1,border:"none",borderRadius:8,padding:"6px 3px",fontSize:10,fontWeight:700,cursor:"pointer",background:blocoIdx===i?b.cor.bg:"transparent",color:blocoIdx===i?b.cor.texto:"#94a3b8",lineHeight:1.3}}><div>B{i+1}</div><div style={{fontSize:9,marginTop:1}}>{b.semanas}</div></button>))}

      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        {treinosUnicos.map((t,i)=>{const td=TREINO_DEFS[t];return(<button key={t} onClick={()=>setTreinoIdx(i)} style={{flex:1,minWidth:60,border:`1.5px solid ${treinoIdx===i?td.cor:td.border}`,borderRadius:9,padding:"7px 6px",fontSize:11,fontWeight:700,cursor:"pointer",background:treinoIdx===i?td.bg:"#fff",color:treinoIdx===i?td.cor:"#64748b",textAlign:"center"}}>{td.label}</button>);})}

// ─── WIZARD NOVO PROGRAMA ─────────────────────────────────────────────────────

          {(prog.divisao?.sequencia||[]).map((t,i)=>{const td=TREINO_DEFS[t];return(<div key={i} style={{textAlign:"center",minWidth:40}}><div style={{fontSize:10,color:"#94a3b8",marginBottom:2}}>D{i+1}</div><div style={{background:td?.bg,border:`1.5px solid ${td?.border}`,borderRadius:7,padding:"4px 5px",fontWeight:800,fontSize:11,color:td?.cor}}>{t}</div></div>);})}
        </div>
      </Card>

      <div style={{display:"flex",gap:0,marginBottom:8,background:"#f1f5f9",borderRadius:10,padding:3}}>
        {BLOCOS.map((b,i)=>(<button key={b.key} onClick={()=>{setBlocoIdx(i);setTreinoIdx(0);}} style={{flex:1,border:"none",borderRadius:8,padding:"6px 3px",fontSize:10,fontWeight:700,cursor:"pointer",background:blocoIdx===i?b.cor.bg:"transparent",color:blocoIdx===i?b.cor.texto:"#94a3b8",lineHeight:1.3}}><div>B{i+1}</div><div style={{fontSize:8,marginTop:1}}>{b.semanas}</div></button>))}
      </div>
      <div style={{background:blocoAtivo.cor.bg,border:`1.5px solid ${blocoAtivo.cor.border}`,borderRadius:9,padding:"7px 12px",marginBottom:8}}>
        <div style={{fontWeight:700,fontSize:12,color:blocoAtivo.cor.texto}}>{blocoAtivo.label} · sem. {blocoAtivo.semanas} · {blocoAtivo.desc}</div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        {treinosUnicos.map((t,i)=>{const td=TREINO_DEFS[t];return(<button key={t} onClick={()=>setTreinoIdx(i)} style={{flex:1,minWidth:60,border:`1.5px solid ${treinoIdx===i?td.cor:td.border}`,borderRadius:9,padding:"7px 6px",fontSize:11,fontWeight:700,cursor:"pointer",background:treinoIdx===i?td.bg:"#fff",color:treinoIdx===i?td.cor:"#64748b",textAlign:"center"}}>{td.label}</button>);})}
      </div>
      <TreinoMomentos
        key={blocoAtivo.key+"-"+treinoAtivo+"-"+editMode}
        treinoKey={treinoAtivo}
        blocoKey={blocoAtivo.key}
        sessao={(prescricao[blocoAtivo.key]||{})[treinoAtivo]||{inicial:[],principal:[],final:[]}}
        onChange={s=>updateSessao(blocoAtivo.key,treinoAtivo,s)}

        editMode={editMode}
      />
      <div style={{marginTop:16,paddingTop:14,borderTop:"1px solid #f1f5f9"}}>
        <Btn variant="danger" full onClick={deletePrograma}>🗑 Remover programa</Btn>
      </div>
    </div>
  );
};

// ─── LISTA ────────────────────────────────────────────────────────────────────
const Lista=({programs,students,nav})=>{
  const [search,setSearch]=useState("");
  const filtered=programs.filter(p=>{const st=students.find(s=>s.id===p.studentId);return(st?.name||"").toLowerCase().includes(search.toLowerCase())||(p.titulo||"").toLowerCase().includes(search.toLowerCase());});
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
        <div style={{fontWeight:800,fontSize:20}}>📋 Programas</div>
        <div style={{display:"flex",gap:8}}>
          <Btn sm variant="ghost" onClick={()=>{window.open("longevus-biblioteca.html","_blank");}}>📚 Biblioteca</Btn>
          <Btn sm onClick={()=>nav("novo")}>+ Novo</Btn>
        </div>
      </div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por aluno ou título..." style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",fontSize:14,fontFamily:"inherit",marginBottom:14}}/>
      {filtered.length===0?(
        <Card style={{textAlign:"center",padding:40}}>
          <div style={{fontSize:36,marginBottom:10}}>📋</div>
          <div style={{color:"#94a3b8",marginBottom:14}}>Nenhum programa criado ainda.</div>
          <Btn onClick={()=>nav("novo")}>Criar primeiro programa</Btn>
        </Card>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {filtered.map(p=>{
            const st=students.find(s=>s.id===p.studentId);
            const total=Object.values(p.prescricao||{}).reduce((a,b)=>a+Object.values(b||{}).reduce((c,s)=>c+Object.values(s||{}).reduce((d,arr)=>d+(arr?.length||0),0),0),0);
            return(<Card key={p.id} onClick={()=>nav("ver",{id:p.id})} style={{padding:"14px 16px"}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:44,height:44,borderRadius:12,background:"#fff4ee",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:800,color:"#FF5603",flexShrink:0}}>{st?.name?.[0]?.toUpperCase()||"?"}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:15}}>{st?.name||"Aluno"}</div>
                  <div style={{fontSize:12,color:"#94a3b8",marginTop:1}}>{p.titulo||"Programa"} · 24 sem · {p.divisao?.label||"—"}</div>
                  <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{total} exerc. · {fmt(p.criadoEm)}</div>
                </div>
                <div style={{fontSize:20,color:"#cbd5e1"}}>›</div>
              </div>
            </Card>);
          })}
        </div>
      )}
    </div>
  );
};

const ResetPassword = ({ onDone }) => {
const [password,setPassword]=useState("");
const [confirm,setConfirm]=useState("");
const [error,setError]=useState("");
const [loading,setLoading]=useState(false);
const submit = async (e) => {
e.preventDefault();
setError("");
if (password.length<6) { setError("A senha deve ter pelo menos 6 caracteres."); return; }
if (password!==confirm) { setError("As senhas não coincidem."); return; }
setLoading(true);
try {
const { error } = await supa.auth.updateUser({ password });
if (error) throw error;
onDone();
} catch(err) {
setError(err.message || "Erro ao redefinir senha.");
} finally {
setLoading(false);
}
};
return (
<div style={{ minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f8fafc",padding:20 }}>
<form onSubmit={submit} style={{ background:"#fff",borderRadius:16,padding:28,width:"100%",maxWidth:380,boxShadow:"0 4px 24px rgba(0,0,0,0.06)" }}>
<div style={{ textAlign:"center",marginBottom:18 }}>
<div style={{ fontWeight:900,fontSize:20 }}>Definir nova senha</div>
</div>
<div style={{ marginBottom:12 }}>
<label style={{ fontSize:12,fontWeight:600,color:"#475569",display:"block",marginBottom:4 }}>Nova senha</label>
<input type="password" required value={password} onChange={e=>setPassword(e.target.value)} style={{ width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:14,boxSizing:"border-box" }}/>
</div>
<div style={{ marginBottom:16 }}>
<label style={{ fontSize:12,fontWeight:600,color:"#475569",display:"block",marginBottom:4 }}>Confirmar senha</label>
<input type="password" required value={confirm} onChange={e=>setConfirm(e.target.value)} style={{ width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:14,boxSizing:"border-box" }}/>
</div>
{error && <div style={{ fontSize:12,color:"#dc2626",marginBottom:12,textAlign:"center" }}>{error}</div>}
<button type="submit" disabled={loading} style={{ width:"100%",padding:"11px",borderRadius:8,border:"none",background:"#FF5603",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",opacity:loading?0.7:1 }}>
{loading ? "Salvando..." : "Salvar nova senha"}
</button>
</form>
</div>
);
};
function AppInner(){
  const [students]=useState(()=>LS.get("longevus_students",[]));
  const [assessments]=useState(()=>LS.get("longevus_assessments",[]));
  const [programs,setPrograms]=useState(()=>LS.get("longevus_programs",[]));
  const [bibCustom,setBibCustom]=useState(()=>{
    const db=typeof window!=="undefined"&&window.EXERCICIOS_DB?window.EXERCICIOS_DB:[];
    const salvo=LS.get("longevus_biblioteca",[]);
    if(!salvo||salvo.length===0) return db;
    const savedIds=new Set(salvo.map(e=>e.id));
    const novos=db.filter(e=>!savedIds.has(e.id));
    return novos.length>0?[...salvo,...novos]:salvo;
  });
  useEffect(()=>{
    (async()=>{
      try{
        const {data:sess}=await supa.auth.getSession();
        const token=sess?.session?.access_token||SUPA_KEY;
        const h={"apikey":SUPA_KEY,"Authorization":"Bearer "+token,"Content-Type":"application/json"};
        const r=await fetch(SUPA_URL+"/rest/v1/exercises?select=*&order=nome.asc",{headers:h});
        if(r.ok){
          const rows=await r.json();
          if(rows&&rows.length>0){
            setBibCustom(rows.map(e=>({
              id:e.id,nome:e.nome,grupo:e.grupo,nivel:e.nivel,momento:e.momento,
              foco:e.foco,descricao:e.descricao,execucao:e.execucao,beneficios:e.beneficios,
              cuidados:e.cuidados,material:e.material,obs:e.obs,foto:e.foto||"",video:e.video||"",
              defaultSeries:e.default_series,defaultReps:e.default_reps,defaultDescanso:e.default_descanso,tags:e.tags
            })));
          }
        }
      }catch(e){console.warn("Supabase offline, usando cache local");}
    })();
  },[]);

  const [page,setPage]=useState("lista");
  const [pageProps,setPageProps]=useState({});
  const nav=useCallback((p,props={})=>{setPage(p);setPageProps(props);window.scrollTo(0,0);},[]);
  useEffect(()=>{LS.set("longevus_programs",programs);},[programs]);
  return(
    <>
      <style>{`*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#0f172a;}input,select,textarea{font-family:inherit;}input:focus,select:focus,textarea:focus{outline:none;border-color:#FF5603!important;box-shadow:0 0 0 3px #FF560318;}`}</style>
      <div style={{minHeight:"100vh"}}>
        <div style={{background:"#fff",borderBottom:"1.5px solid #e2e8f0",padding:"12px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <a href="longevus-app.html" style={{display:"flex",alignItems:"center",justifyContent:"center",width:32,height:32,borderRadius:8,background:"#f8fafc",border:"1px solid #e2e8f0",textDecoration:"none",color:"#0f172a",fontSize:18,fontWeight:700,flexShrink:0}}>&#8592;</a>
            <img src={__LOGO__} alt="Longevus" style={{height:36,width:"auto",objectFit:"contain"}}/>
            <div><div style={{fontWeight:800,fontSize:15}}>Longevus</div><div style={{fontSize:11,color:"#94a3b8"}}>Módulo Programas · 24 semanas</div></div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <a href="longevus-biblioteca.html" style={{fontSize:11,color:"#64748b",textDecoration:"none",background:"#f1f5f9",borderRadius:8,padding:"5px 10px",fontWeight:600}}>📚 Biblioteca</a>
            <div style={{fontSize:12,color:"#94a3b8"}}>{programs.length} prog.</div>
          </div>
        </div>
        <div style={{padding:"20px 16px",maxWidth:640,margin:"0 auto",paddingBottom:90}}>
          {page==="lista"&&<Lista programs={programs} students={students} nav={nav}/>}
          {page==="novo"&&<NovoProgramaWizard students={students} assessments={assessments} programs={programs} setPrograms={setPrograms} bibCustom={bibCustom} nav={nav}/>}
          {page==="ver"&&<VerPrograma programId={pageProps.id} programs={programs} setPrograms={setPrograms} students={students} bibCustom={bibCustom} nav={nav}/>}
        </div>
      </div>
      {/* Barra de navegação global */}
      <NavBar active="programa"/>
    </>
  );
}

<div style={{ minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f8fafc",padding:20 }}>

</div>
<a href={"https://wa.me/"+SUPPORT_WHATSAPP+"?text="+waMsg} target="_blank" style={{ display:"block",padding:"12px",borderRadius:8,background:"#16a34a",color:"#fff",fontWeight:700,fontSize:14,textDecoration:"none",marginBottom:10 }}>
Falar no WhatsApp
</a>
<button onClick={()=>supa.auth.signOut()} style={{ border:"none",background:"transparent",color:"#94a3b8",fontSize:13,cursor:"pointer",textDecoration:"underline" }}>Sair</button>
</div>
</div>
);
};
function App(){
const [session,setSession]=useState(null);
const [authLoading,setAuthLoading]=useState(true);
const [recoveryMode,setRecoveryMode]=useState(false);
const [billing,setBilling]=useState(null);
useEffect(()=>{
supa.auth.getSession().then(({data})=>{ setSession(data?.session||null); setAuthLoading(false); });
const { data: listener } = supa.auth.onAuthStateChange((event, sess)=>{
setSession(sess);
if (event==="PASSWORD_RECOVERY") setRecoveryMode(true);
});
return ()=>{ listener?.subscription?.unsubscribe(); };
},[]);
useEffect(()=>{
if (!session) { setBilling(null); return; }
(async()=>{
try {
const headers = await authHeadersFn();
const r = await fetch(SUPA_URL+"/rest/v1/professionals?select=plano,status_assinatura,trial_ends_at&id=eq."+session.user.id, { headers });
const rows = await r.json();
const p = rows?.[0]||{};
setBilling({ plano:p.plano||"trial", status_assinatura:p.status_assinatura||"ativo", trial_ends_at:p.trial_ends_at });
} catch(e) { setBilling({ plano:"trial", status_assinatura:"ativo", trial_ends_at:null }); }
})();
},[session]);
if (authLoading) {
return <div style={{ minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8",fontSize:14 }}>Carregando...</div>;
}
if (recoveryMode) {
return <ResetPassword onDone={()=>{setRecoveryMode(false);}}/>;
}
if (!session) {
return <Login onLogin={()=>{}}/>;
}
if (!billing) {
return <div style={{ minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8",fontSize:14 }}>Carregando...</div>;
}
const trialEnd = billing.trial_ends_at ? new Date(billing.trial_ends_at) : null;
const trialExpired = billing.plano==="trial" && trialEnd && trialEnd.getTime() < Date.now();
const accountBlocked = billing.status_assinatura==="cancelado" || trialExpired;
if (accountBlocked) {
return <TrialExpired/>;
}
return <AppInner/>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
