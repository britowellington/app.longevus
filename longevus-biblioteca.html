{"id":"pr59","nome":"Farmer Hold","grupo":"Core","nivel":"Básico","momento":"Parte Principal","foco":"Core, Preensão e Postura","descricao":"Segurar halteres em posição estática. Treina o core sob carga e a preensão.","execucao":"1. Halteres em cada mão ao lado do corpo.\n2. Postura ereta, ombros para trás.\n3. Core contraído, respiração normal.\n4. Mantenha 30–45s.","beneficios":"Fortalece core sob carga. Melhora preensão e postura.","cuidados":"Não deixar os ombros caírem.","material":"Halteres.","obs":"Nível 1–2 — Farmer Hold.","defaultSeries":"3","defaultReps":"30–45s","defaultDescanso":"60s","tags":"core,farmer hold,preensão,postura,nível2","foto":""},
{"id":"pr60","nome":"Suitcase Hold","grupo":"Core","nivel":"Básico","momento":"Parte Principal","foco":"Core Anti-Lateral e Lombar","descricao":"Segurar carga em apenas um lado, resistindo à inclinação lateral.","execucao":"1. Halter em apenas uma mão.\n2. Postura completamente ereta — não inclinar.\n3. Ombros nivelados.\n4. 30–45s, troque de lado.","beneficios":"Treina o core anti-lateral. Fortalece quadrado lombar.","cuidados":"Resistir à inclinação lateral.","material":"Halter.","obs":"Nível 1–2 — Suitcase Hold.","defaultSeries":"3","defaultReps":"30–45s cada","defaultDescanso":"45s","tags":"core,suitcase hold,anti-lateral,lombar,nível1","foto":""},
{"id":"pr61","nome":"Hollow Hold Adaptado","grupo":"Core","nivel":"Básico","momento":"Parte Principal","foco":"Core Profundo e Tensão Abdominal","descricao":"Posição de prancha deitada com lombar no chão. Versão acessível do hollow hold.","execucao":"1. Deitado, joelhos dobrados, pés no chão.\n2. Pressione a lombar contra o chão contraindo o abdome.\n3. Braços estendidos ao lado levantados 5–10cm.\n4. Mantenha 20–30s.","beneficios":"Ativa core profundo com lombar protegida.","cuidados":"Lombar no chão. Respire normalmente.","material":"Tapete.","obs":"Nível 1 — Hollow Hold.","defaultSeries":"3","defaultReps":"20–30s","defaultDescanso":"30s","tags":"core,hollow hold,abdome,nível1","foto":""},
{"id":"pr62","nome":"Rotação de Tronco com Elástico","grupo":"Core","nivel":"Básico","momento":"Parte Principal","foco":"Oblíquos e Mobilidade Rotacional","descricao":"Rotação de tronco contra resistência do elástico.","execucao":"1. Sentado, elástico lateral na altura dos ombros.\n2. Gire o tronco para o lado oposto ao elástico.\n3. Retorne controladamente.","beneficios":"Fortalece oblíquos. Melhora mobilidade rotacional.","cuidados":"Rotação vem do tronco, não do pescoço.","material":"Faixa elástica.","obs":"Nível 3 — Rotação de Tronco.","defaultSeries":"3","defaultReps":"10–12 cada","defaultDescanso":"30s","tags":"core,oblíquos,rotação,mobilidade,nível3","foto":""},
{"id":"pr63","nome":"Semi-Tandem","grupo":"Equilíbrio","nivel":"Básico","momento":"Parte Principal","foco":"Equilíbrio Estático — SPPB Nível 2","descricao":"Pés em posição semi-tandem. Nível 2 do teste SPPB.","execucao":"1. Calcanhar de um pé ao lado do hálux do outro.\n2. Apoio disponível.\n3. Mantenha 10–30s.\n4. Progredir para o tandem completo.","beneficios":"Progressão do equilíbrio bipodal. Avaliação e treino SPPB nível 2.","cuidados":"Apoio disponível. Progressão gradual.","material":"Cadeira ou parede.","obs":"Nível 2 — Equilíbrio. Componente do SPPB.","defaultSeries":"3","defaultReps":"10–30s","defaultDescanso":"20s","tags":"equilíbrio,semi-tandem,sppb,nível2","foto":""},
{"id":"pr64","nome":"Caminhada Tandem com Obstáculos","grupo":"Equilíbrio","nivel":"Avançado","momento":"Parte Principal","foco":"Equilíbrio Dinâmico com Obstáculos","descricao":"Caminhada tandem com pequenos obstáculos. Máximo desafio de equilíbrio dinâmico.","execucao":"1. Percurso com 3–5 obstáculos pequenos.\n2. Realize a caminhada tandem desviando ou passando sobre eles.\n3. Apoio lateral disponível.","beneficios":"Simula desafios reais com obstáculos.","cuidados":"Obstáculos pequenos e estáveis. Supervisão.","material":"Cones ou faixas. Apoio lateral.","obs":"Nível 5 — Caminhada Tandem.","defaultSeries":"3","defaultReps":"percurso completo","defaultDescanso":"30s","tags":"equilíbrio,tandem,obstáculos,avançado,nível5","foto":""},
{"id":"pr65","nome":"Marcha Resistida","grupo":"Equilíbrio","nivel":"Avançado","momento":"Parte Principal","foco":"Flexores do Quadril, Marcha e Resistência","descricao":"Marcha contra resistência de elástico. Treina força de marcha e equilíbrio sob carga.","execucao":"1. Elástico ao redor da cintura preso atrás.\n2. Marche para frente contra a resistência.\n3. Elevação exagerada dos joelhos.","beneficios":"Treina a marcha com resistência. Fortalece flexores do quadril.","cuidados":"Elástico seguro. Resistência leve para iniciar.","material":"Faixa elástica. Ponto de fixação firme.","obs":"Nível 5 — Marcha.","defaultSeries":"3","defaultReps":"10 passos","defaultDescanso":"60s","tags":"equilíbrio,marcha,resistida,avançado,nível5","foto":""},
{"id":"pr66","nome":"Farmer Walk","grupo":"Equilíbrio","nivel":"Intermediário","momento":"Parte Principal","foco":"Core, Equilíbrio Dinâmico e Preensão","descricao":"Caminhar carregando halteres. Treina core, equilíbrio dinâmico e preensão de forma integrada.","execucao":"1. Halteres em cada mão.\n2. Caminhe 10–20m com postura ereta.\n3. Ombros para trás, core contraído.","beneficios":"Treina core, equilíbrio e preensão de forma integrada.","cuidados":"Postura ereta. Iniciar com peso leve.","material":"Halteres. Espaço para caminhar.","obs":"Nível 1–3 — Farmer Walk.","defaultSeries":"3","defaultReps":"15–20m","defaultDescanso":"60s","tags":"equilíbrio,farmer walk,core,preensão,nível2","foto":""},
{"id":"pr67","nome":"Suitcase Carry","grupo":"Equilíbrio","nivel":"Intermediário","momento":"Parte Principal","foco":"Core Anti-Lateral e Equilíbrio Dinâmico","descricao":"Caminhar carregando carga em apenas um lado. Treina o core anti-lateral em movimento.","execucao":"1. Halter em apenas uma mão.\n2. Caminhe 10–15m mantendo postura ereta.\n3. Não inclinar para o lado do peso. Troque de lado.","beneficios":"Treina o core anti-lateral em movimento real.","cuidados":"Ombros nivelados. Não compensar inclinando o tronco.","material":"Halter. Espaço para caminhar.","obs":"Nível 1–3 — Suitcase Carry.","defaultSeries":"3","defaultReps":"10–15m cada","defaultDescanso":"60s","tags":"equilíbrio,suitcase carry,core,anti-lateral,nível2","foto":""},
{"id":"pr68","nome":"Transferência de Peso Lateral","grupo":"Equilíbrio","nivel":"Básico","momento":"Parte Principal","foco":"Equilíbrio Dinâmico e Controle Postural","descricao":"Transferência do peso de um pé ao outro. Base para todos os exercícios de equilíbrio dinâmico.","execucao":"1. Em pé com apoio.\n2. Transfira o peso para o pé direito, levante levemente o pé esquerdo.\n3. Retorne e transfira para o esquerdo.","beneficios":"Desenvolve controle do centro de massa.","cuidados":"Movimento lento. Apoio disponível.","material":"Cadeira ou parede.","obs":"Nível 1 — Transferência de Peso.","defaultSeries":"3","defaultReps":"15","defaultDescanso":"30s","tags":"equilíbrio,transferência,dinâmico,nível1","foto":""},
{"id":"pr69","nome":"Transferência de Peso Diagonal","grupo":"Equilíbrio","nivel":"Intermediário","momento":"Parte Principal","foco":"Equilíbrio Multidirecional","descricao":"Transferência do peso em padrão diagonal. Mais funcional que lateral ou frontal isolados.","execucao":"1. Em pé com apoio.\n2. Transfira o peso para o pé direito movendo o membro superior esquerdo para a diagonal oposta.\n3. Retorne e repita para o outro lado.","beneficios":"Treina o equilíbrio em padrão diagonal.","cuidados":"Apoio disponível. Movimento controlado.","material":"Cadeira ou parede.","obs":"Nível 3 — Transferência de Peso.","defaultSeries":"3","defaultReps":"10 cada","defaultDescanso":"30s","tags":"equilíbrio,transferência,diagonal,nível3","foto":""},
{"id":"pr70","nome":"Caminhada Lateral","grupo":"Equilíbrio","nivel":"Básico","momento":"Parte Principal","foco":"Abdutores, Equilíbrio Lateral e Marcha","descricao":"Caminhar lateralmente. Treina abdutores e equilíbrio no plano frontal.","execucao":"1. Em pé com apoio leve.\n2. Passos laterais para a direita (3–5 passos) depois retorne.\n3. Pés sempre afastados. Não arrastar.","beneficios":"Fortalece abdutores. Melhora equilíbrio frontal.","cuidados":"Manter o tronco ereto. Não arrastar os pés.","material":"Espaço aberto.","obs":"Nível 1–2 — Caminhada Lateral.","defaultSeries":"3","defaultReps":"5 passos cada","defaultDescanso":"30s","tags":"equilíbrio,lateral,abdutores,marcha,nível2","foto":""},
{"id":"pr71","nome":"Caminhada Lateral com Elástico","grupo":"Equilíbrio","nivel":"Intermediário","momento":"Parte Principal","foco":"Abdutores, Glúteo Médio e Equilíbrio","descricao":"Caminhada lateral com elástico acima dos joelhos. Maior ativação de glúteo médio.","execucao":"1. Elástico acima dos joelhos.\n2. Posição de semi-agachamento leve.\n3. Passos laterais contra a resistência.\n4. 5–8 passos para cada lado.","beneficios":"Forte ativação de glúteo médio. Melhora estabilidade lateral do joelho.","cuidados":"Joelhos alinhados (empurrar contra o elástico). Não arrastar os pés.","material":"Faixa elástica.","obs":"Nível 4 — Caminhada Lateral.","defaultSeries":"3","defaultReps":"5–8 cada","defaultDescanso":"30s","tags":"equilíbrio,lateral,elástico,abdutores,glúteos,nível4","foto":""},
{"id":"pr72","nome":"Caminhada Cruzada","grupo":"Equilíbrio","nivel":"Intermediário","momento":"Parte Principal","foco":"Coordenação, Equilíbrio e Padrão Motor","descricao":"Caminhar cruzando os pés. Desenvolve coordenação e equilíbrio em padrões complexos.","execucao":"1. Em pé com apoio leve.\n2. Cruze o pé direito à frente do esquerdo. Abra com o pé esquerdo.\n3. Repita cruzando o esquerdo à frente.\n4. 10 passos cada direção.","beneficios":"Desenvolve coordenação em padrões complexos.","cuidados":"Apoio disponível. Superfície antiderrapante. Iniciar lento.","material":"Espaço aberto com apoio.","obs":"Nível 2–3 — Caminhada Cruzada.","defaultSeries":"3","defaultReps":"10 passos cada","defaultDescanso":"30s","tags":"equilíbrio,coordenação,cruzado,nível3","foto":""},
{"id":"pr73","nome":"Step Balance com Apoio","grupo":"Equilíbrio","nivel":"Básico","momento":"Parte Principal","foco":"Equilíbrio Unipodal em Superfície Elevada","descricao":"Equilíbrio em uma perna sobre um step com apoio. Maior desafio proprioceptivo.","execucao":"1. Suba em step baixo com apoio.\n2. Transfira o peso para uma perna.\n3. Levante a outra perna.\n4. Mantenha 20–30s. Alterne.","beneficios":"Maior desafio proprioceptivo. Aumenta confiança em degraus.","cuidados":"Apoio disponível. Step estável e antiderrapante.","material":"Step ou degrau. Apoio lateral.","obs":"Nível 1 — Step Balance.","defaultSeries":"3","defaultReps":"20–30s cada","defaultDescanso":"30s","tags":"equilíbrio,step,unipodal,propriocepção,nível2","foto":""},
{"id":"pr74","nome":"Relógio Unipodal Assistido","grupo":"Equilíbrio","nivel":"Intermediário","momento":"Parte Principal","foco":"Equilíbrio Dinâmico Unipodal e Alcance","descricao":"Em uma perna, alcançar com o pé livre em diferentes direções do relógio.","execucao":"1. Em pé em uma perna, apoio disponível.\n2. Com o pé livre alcance: frente (12h), lado (3h), atrás (6h).\n3. Retorne entre cada alcance.","beneficios":"Treina equilíbrio dinâmico multidirecional. Alta transferência para prevenção de quedas.","cuidados":"Apoio disponível. Iniciar com poucas direções.","material":"Cadeira ou parede.","obs":"Nível 1 — Relógio Unipodal.","defaultSeries":"3","defaultReps":"cada direção","defaultDescanso":"30s","tags":"equilíbrio,unipodal,alcance,dinâmico,nível2","foto":""},
{"id":"pr75","nome":"Equilíbrio com Tarefa Dual","grupo":"Equilíbrio","nivel":"Avançado","momento":"Parte Principal","foco":"Atenção Dividida e Controle Postural","descricao":"Equilíbrio simultâneo com tarefa cognitiva. Simula demandas reais da marcha.","execucao":"1. Em pé ou caminhando, apoio disponível.\n2. Simultaneamente: contar de 3 em 3, nomear animais ou responder perguntas.\n3. Progredir em posição mais desafiadora.","beneficios":"Controle postural automático. Reduz quedas em situações de atenção dividida.","cuidados":"Supervisão. Apoio sempre disponível.","material":"Espaço seguro","obs":"Blocos 3 e 4 da periodização.","defaultSeries":"3","defaultReps":"60s","defaultDescanso":"30s","tags":"quedas,equilíbrio,tarefa dual,cognitivo","foto":""},

{"id":"mo01","nome":"Mobilidade de Tornozelo na Parede","grupo":"Mobilidade","nivel":"Básico","momento":"Parte Inicial","foco":"Tornozelo e Tíbia Anterior","descricao":"Melhora a dorsiflexão do tornozelo, fundamental para agachar com qualidade e prevenir tropeços.","execucao":"1. Em pé de frente para a parede, pé a 5–10cm dela.\n2. Dobre o joelho em direção à parede sem tirar o calcanhar do chão.\n3. Toque a parede com o joelho. Retorne.\n4. Afaste o pé gradualmente conforme melhora.\n5. 3 séries de 10 repetições cada pé.","beneficios":"Melhora dorsiflexão. Essencial para agachar e subir escadas. Previne dor no tornozelo.","cuidados":"Manter o calcanhar no chão. Não forçar além do conforto.","material":"Parede.","obs":"Afastar o pé da parede progressivamente como teste e progressão.","defaultSeries":"3","defaultReps":"10 cada","defaultDescanso":"15s","tags":"mobilidade,tornozelo,agachar,funcional","foto":""},
{"id":"mo02","nome":"Mobilidade de Tornozelo Dinâmica","grupo":"Mobilidade","nivel":"Básico","momento":"Parte Inicial","foco":"Tornozelo e Cadeia Posterior","descricao":"Mobilização ativa do tornozelo em movimento. Prepara para exercícios de marcha e equilíbrio.","execucao":"1. Em pé com apoio.\n2. Eleve levemente o pé e faça círculos completos com o tornozelo.\n3. 10 círculos em cada sentido.\n4. Alterne com flexão-extensão do pé (ponta e calcanhar).\n5. Repita com o outro pé.","beneficios":"Aquece e mobiliza o tornozelo. Melhora circulação nos pés. Prepara para marcha.","cuidados":"Movimento suave. Apoio disponível.","material":"Cadeira ou parede.","obs":"Excelente para alunos com edema nos pés ou artrite.","defaultSeries":"2","defaultReps":"10 cada sentido","defaultDescanso":"10s","tags":"mobilidade,tornozelo,circulação,aquecimento","foto":""},
{"id":"mo03","nome":"Mobilidade de Quadril Sentado","grupo":"Mobilidade","nivel":"Básico","momento":"Parte Inicial","foco":"Quadril e Rotadores Externos","descricao":"Mobilização do quadril em posição sentada. Seguro e eficaz para melhorar a amplitude rotacional.","execucao":"1. Sentado na ponta da cadeira.\n2. Eleve o joelho direito e faça círculos com o quadril: 10 para dentro, 10 para fora.\n3. Repita com o joelho esquerdo.\n4. Depois abra e feche o joelho como uma borboleta (abdução e adução).","beneficios":"Melhora mobilidade rotacional do quadril. Reduz rigidez matinal. Seguro para todos os níveis.","cuidados":"Movimento dentro da amplitude de conforto. Para se sentir dor aguda no quadril.","material":"Cadeira firme.","obs":"Ideal para alunos com artrose de quadril — movimentos suaves, sem carga.","defaultSeries":"2","defaultReps":"10 cada sentido","defaultDescanso":"15s","tags":"mobilidade,quadril,rotação,aquecimento","foto":""},
{"id":"mo04","nome":"Mobilidade de Quadril em Pé","grupo":"Mobilidade","nivel":"Básico","momento":"Parte Inicial","foco":"Quadril, Flexores e Rotadores","descricao":"Mobilização ativa do quadril em posição ortostática. Prepara para exercícios funcionais em pé.","execucao":"1. Em pé com apoio.\n2. Eleve o joelho até a altura do quadril e faça pequenos círculos: 10 para fora, 10 para dentro.\n3. Depois abra e feche o joelho (como montar e desmontar um cavalo).\n4. Repita com o outro lado.","beneficios":"Mobiliza quadril de forma ativa. Ativa os flexores e rotadores do quadril.","cuidados":"Apoio disponível. Amplitude confortável.","material":"Cadeira ou parede.","obs":"","defaultSeries":"2","defaultReps":"10 cada sentido cada perna","defaultDescanso":"15s","tags":"mobilidade,quadril,rotação,funcional,aquecimento","foto":""},
{"id":"mo05","nome":"Mobilidade Torácica Sentada","grupo":"Mobilidade","nivel":"Básico","momento":"Parte Inicial","foco":"Coluna Torácica e Rotação","descricao":"Melhora a mobilidade rotacional da coluna torácica. Essencial para postura e para reduzir a cifose do envelhecimento.","execucao":"1. Sentado na ponta da cadeira, pés no chão.\n2. Cruze os braços sobre o peito ou coloque as mãos atrás da cabeça.\n3. Gire o tronco lentamente para a direita o máximo possível.\n4. Retorne ao centro e repita para a esquerda.\n5. 3 séries de 10 repetições para cada lado.","beneficios":"Melhora rotação torácica. Reduz cifose. Essencial para dirigir e realizar atividades rotacionais.","cuidados":"A rotação vem da coluna torácica, não do pescoço. Movimento lento.","material":"Cadeira firme.","obs":"Pode usar um bastão sobre os ombros para visualizar a amplitude.","defaultSeries":"3","defaultReps":"10 cada lado","defaultDescanso":"15s","tags":"mobilidade,torácica,rotação,postura,cifose","foto":""},
{"id":"mo06","nome":"Mobilidade Torácica Quadrúpede","grupo":"Mobilidade","nivel":"Básico","momento":"Parte Inicial","foco":"Coluna Torácica e Rotação","descricao":"Rotação torácica na posição de quatro apoios. Alta especificidade para mobilidade torácica.","execucao":"1. Posição de quatro apoios (mãos e joelhos).\n2. Coloque uma mão atrás da cabeça.\n3. Gire o cotovelo em direção ao teto, rotacionando a coluna torácica.\n4. Retorne. Repita do outro lado.\n5. 3 séries de 8–10 repetições cada lado.","beneficios":"Máxima especificidade para mobilidade torácica. Melhora rotação e postura.","cuidados":"O movimento é da coluna torácica, não do pescoço. Quadris fixos.","material":"Tapete.","obs":"Exercício chave para combater a rigidez torácica.","defaultSeries":"3","defaultReps":"8–10 cada","defaultDescanso":"15s","tags":"mobilidade,torácica,rotação,quadrúpede,postura","foto":""},
{"id":"mo07","nome":"Cat-Camel","grupo":"Mobilidade","nivel":"Básico","momento":"Parte Inicial","foco":"Coluna Vertebral Completa","descricao":"Mobilização rítmica de toda a coluna em posição de quatro apoios. Reduz rigidez e melhora a consciência corporal da coluna.","execucao":"1. Posição de quatro apoios, mãos sob os ombros, joelhos sob os quadris.\n2. CAT: expire e arqueie as costas para cima (como um gato assustado), omoplatas abertas.\n3. CAMEL: inspire e afunde as costas para baixo, peito para frente.\n4. Alterne suavemente entre os dois movimentos.\n5. 10–15 repetições lentas.","beneficios":"Mobiliza toda a coluna vertebral. Reduz dor lombar. Ativa os músculos paravertebrais.","cuidados":"Movimento suave e rítmico. Não forçar a amplitude máxima inicialmente.","material":"Tapete.","obs":"Excelente para início de sessão ou para alunos com dor lombar crônica.","defaultSeries":"2","defaultReps":"10–15","defaultDescanso":"15s","tags":"mobilidade,coluna,lombar,torácica,cat-camel","foto":""},
{"id":"mo08","nome":"Thread the Needle","grupo":"Mobilidade","nivel":"Básico","momento":"Parte Inicial","foco":"Coluna Torácica e Ombro","descricao":"Rotação torácica com alcance do braço sob o tronco. Excelente para ombros e torácica.","execucao":"1. Posição de quatro apoios.\n2. Deslize o braço direito pelo chão sob o corpo ('enfiar a agulha'), rotacionando o tronco.\n3. O ombro direito toca ou aproxima-se do chão.\n4. Retorne e repita. Troque de lado.\n5. 3 séries de 8 repetições cada lado.","beneficios":"Melhora mobilidade torácica e do ombro. Combate a rotação interna excessiva do ombro.","cuidados":"Cabeça acompanha o movimento. Quadris permanecem nivelados.","material":"Tapete.","obs":"Um dos melhores exercícios para saúde do ombro no 50+.","defaultSeries":"3","defaultReps":"8 cada","defaultDescanso":"15s","tags":"mobilidade,torácica,ombro,rotação,thread the needle","foto":""},
{"id":"mo09","nome":"Mobilidade de Ombro com Bastão","grupo":"Mobilidade","nivel":"Básico","momento":"Parte Inicial","foco":"Ombro — Amplitude de Movimento","descricao":"Mobilização ativa do ombro usando um bastão como alavanca. Melhora a amplitude sem forçar a articulação.","execucao":"1. Segure um bastão com as duas mãos, afastadas.\n2. Leve os braços de frente para cima e para trás (windmill), passando sobre a cabeça.\n3. Retorne. Amplitude conforme conforto.\n4. 3 séries de 10 repetições.","beneficios":"Melhora amplitude do ombro. Previne lesões por rigidez. Ajuda em tarefas de alcance.","cuidados":"Ampliar a pegada no bastão se necessário. Parar se sentir dor.","material":"Bastão, cabo de vassoura ou toalha comprida.","obs":"Iniciar com pegada larga e estreitar progressivamente conforme mobilidade melhora.","defaultSeries":"3","defaultReps":"10","defaultDescanso":"15s","tags":"mobilidade,ombro,amplitude,bastão","foto":""},
{"id":"mo10","nome":"Mobilidade de Ombro Ativa","grupo":"Mobilidade","nivel":"Básico","momento":"Parte Inicial","foco":"Ombro — Mobilidade Ativa e Manguito","descricao":"Movimentos ativos do ombro sem carga. Ativa o manguito rotador e prepara para exercícios de força.","execucao":"1. Em pé ou sentado.\n2. Círculos com os braços: 10 para frente, 10 para trás.\n3. Elevação frontal e lateral alternada.\n4. Rotação interna e externa com cotovelo a 90°.\n5. 2 séries de cada movimento.","beneficios":"Aquece o manguito rotador. Prepara o ombro para exercícios de força. Melhora propriocepção.","cuidados":"Amplitude dentro do conforto. Sem dor.","material":"Sem equipamento.","obs":"","defaultSeries":"2","defaultReps":"10 cada movimento","defaultDescanso":"15s","tags":"mobilidade,ombro,manguito,aquecimento,ativo","foto":""},
{"id":"mo11","nome":"Mobilidade Escapular","grupo":"Mobilidade","nivel":"Básico","momento":"Parte Inicial","foco":"Escápulas e Postura","descricao":"Mobilização ativa das escápulas. Essencial para saúde do ombro e melhora da postura.","execucao":"1. Sentado ou em pé.\n2. Protração (escápulas para frente): empurre os ombros para frente.\n3. Retração (escápulas para trás): junte as omoplatas.\n4. Elevação (ombros para cima): como um encolher de ombros.\n5. Depressão (ombros para baixo): afaste os ombros das orelhas.\n6. Círculos completos. 10 repetições de cada.","beneficios":"Melhora controle escapular. Fundamental para saúde do ombro e postura ereta.","cuidados":"Movimento suave. Sem compensações do pescoço.","material":"Cadeira ou espaço livre.","obs":"Incluir como aquecimento em todos os treinos de MMSS.","defaultSeries":"2","defaultReps":"10 cada","defaultDescanso":"10s","tags":"mobilidade,escapular,ombro,postura,aquecimento","foto":""},
{"id":"mo12","nome":"Mobilidade Cervical","grupo":"Mobilidade","nivel":"Básico","momento":"Parte Inicial","foco":"Coluna Cervical e Pescoço","descricao":"Mobilização ativa e passiva da coluna cervical. Alivia tensão e melhora amplitude de movimento do pescoço.","execucao":"1. Sentado, ombros relaxados.\n2. Flexão/Extensão: olhe para baixo e para cima (dentro do conforto).\n3. Rotação: gire a cabeça para cada lado lentamente.\n4. Inclinação lateral: leve a orelha ao ombro.\n5. 10 repetições de cada movimento.","beneficios":"Alivia tensão cervical. Melhora amplitude. Importante para dirigir e atividades do cotidiano.","cuidados":"Sem hiperextensão. Movimentos muito lentos. Parar se sentir tontura.","material":"Cadeira.","obs":"Contraindicado em instabilidade cervical sem avaliação médica.","defaultSeries":"2","defaultReps":"10 cada movimento","defaultDescanso":"10s","tags":"mobilidade,cervical,pescoço,rigidez,aquecimento","foto":""},
{"id":"mo13","nome":"World's Greatest Stretch","grupo":"Mobilidade","nivel":"Intermediário","momento":"Parte Inicial","foco":"Mobilidade Integrada — Quadril, Torácica e Posterior","descricao":"Exercício de mobilidade completo que integra quadril, coluna torácica e membros inferiores em um único movimento.","execucao":"1. Posição de afundo (perna direita à frente).\n2. Coloque a mão direita ao lado do pé direito.\n3. Gire o tronco abrindo o braço esquerdo para o teto.\n4. Retorne e estenda a perna da frente (alongamento de isquiotibial).\n5. Repita do outro lado. 5 repetições cada lado.","beneficios":"Mobiliza quadril, torácica, ombros e isquiotibiais em um único movimento. Alta transferência funcional.","cuidados":"Progredir gradualmente. Pode ser feito com apoio da mão no chão ou em banco.","material":"Tapete. Apoio opcional.","obs":"Um dos exercícios de mobilidade mais completos para adultos ativos.","defaultSeries":"2","defaultReps":"5 cada lado","defaultDescanso":"15s","tags":"mobilidade,integrada,quadril,torácica,funcional","foto":""},
{"id":"mo14","nome":"Rotação Torácica Ajoelhada","grupo":"Mobilidade","nivel":"Básico","momento":"Parte Inicial","foco":"Coluna Torácica — Rotação","descricao":"Rotação torácica na posição semiajoelhada, estabilizando a lombar enquanto mobiliza a torácica.","execucao":"1. Posição semiajoelhada (um joelho no chão).\n2. Mãos atrás da cabeça ou uma mão na nuca.\n3. Gire o cotovelo para cima em direção ao teto.\n4. Retorne. 10 repetições de cada lado.","beneficios":"Isola a mobilidade torácica protegendo a lombar. Alta especificidade.","cuidados":"Quadris fixos. Rotação vem da torácica.","material":"Tapete.","obs":"Variação do thread the needle, mais desafiadora.","defaultSeries":"3","defaultReps":"10 cada","defaultDescanso":"15s","tags":"mobilidade,torácica,rotação,ajoelhado","foto":""},
{"id":"mo15","nome":"Mobilidade Integrada Funcional","grupo":"Mobilidade","nivel":"Intermediário","momento":"Parte Inicial","foco":"Mobilidade Global e Padrões Funcionais","descricao":"Sequência de movimentos de mobilidade que percorre os principais padrões funcionais. Aquecimento dinâmico completo.","execucao":"1. Agachamento com braços acima (10 reps).\n2. Afundo com rotação torácica (5 cada lado).\n3. Deadlift com bastão (10 reps).\n4. Mobilidade de tornozelo na parede (10 cada).\n5. Círculos de quadril em pé (10 cada sentido).\n6. Realizar a sequência como circuito.","beneficios":"Prepara o corpo para a sessão de treino completo. Ativa todos os sistemas.","cuidados":"Progressão gradual. Adaptar conforme limitações do aluno.","material":"Bastão. Tapete. Apoio opcional.","obs":"Ideal como aquecimento geral antes da parte principal.","defaultSeries":"1","defaultReps":"circuito completo","defaultDescanso":"—","tags":"mobilidade,integrada,funcional,aquecimento,padrões","foto":""},

{"id":"al01","nome":"Alongamento de Quadríceps","grupo":"Alongamento","nivel":"Básico","momento":"Parte Final","foco":"Quadríceps e Flexores do Quadril","descricao":"Alonga o quadríceps e os flexores do quadril. Melhora a extensão do quadril e previne dor anterior do joelho.","execucao":"1. Em pé com apoio leve.\n2. Dobre o joelho trazendo o calcanhar em direção aos glúteos.\n3. Segure o tornozelo (ou use toalha se necessário).\n4. Mantenha o joelho apontando para baixo, quadris nivelados.\n5. 20–30s cada lado.","beneficios":"Alonga quadríceps e flexores do quadril. Previne dor no joelho. Melhora extensão do quadril.","cuidados":"Apoio disponível. Não puxar o joelho para a frente. Manter o quadril neutro.","material":"Cadeira ou parede para apoio. Toalha opcional.","obs":"Progressão: sem apoio. Regressão: deitado de barriga para baixo.","defaultSeries":"2","defaultReps":"30s cada","defaultDescanso":"10s","tags":"alongamento,quadríceps,joelho,flexores do quadril","foto":""},
{"id":"al02","nome":"Alongamento de Piriforme","grupo":"Alongamento","nivel":"Básico","momento":"Parte Final","foco":"Piriforme e Rotadores Externos do Quadril","descricao":"Alonga o piriforme, músculo associado à síndrome do piriforme e dor ciática. Muito relevante para o 50+.","execucao":"1. Deitado de costas, joelhos dobrados.\n2. Cruze o tornozelo direito sobre o joelho esquerdo (posição de número 4).\n3. Traga ambas as pernas em direção ao peito.\n4. Sinta o alongamento profundo no glúteo e quadril.\n5. 30–45s cada lado.","beneficios":"Alonga piriforme. Alivia compressão do nervo ciático. Reduz dor glútea.","cuidados":"Não puxar pela cabeça da fíbula. Movimento suave.","material":"Tapete.","obs":"Versão sentada: cruz a perna na cadeira (já temos como 'Alongamento de Quadril e Glúteo'). Esta versão deitada permite maior relaxamento.","defaultSeries":"2","defaultReps":"30–45s cada","defaultDescanso":"10s","tags":"alongamento,piriforme,ciática,glúteos,lombar","foto":""},
{"id":"al03","nome":"Alongamento de Adutores","grupo":"Alongamento","nivel":"Básico","momento":"Parte Final","foco":"Adutores e Face Interna da Coxa","descricao":"Alonga a musculatura adutora da coxa. Melhora a abertura do quadril e a base de sustentação.","execucao":"1. Sentado na ponta da cadeira.\n2. Abra os joelhos e pés, como na posição de sumô.\n3. Coloque os cotovelos nas coxas e aplique pressão suave para baixo.\n4. Mantenha a coluna reta.\n5. 20–30s.","beneficios":"Alonga adutores. Melhora abertura do quadril. Facilita higiene íntima e mobilidade funcional.","cuidados":"Pressão suave. Não forçar a abertura além do conforto.","material":"Cadeira firme.","obs":"Versão deitada: deitar com os pés juntos e joelhos abertos (posição borboleta).","defaultSeries":"2","defaultReps":"30s","defaultDescanso":"10s","tags":"alongamento,adutores,quadril,mobilidade","foto":""},
{"id":"al04","nome":"Alongamento de Flexores do Quadril","grupo":"Alongamento","nivel":"Básico","momento":"Parte Final","foco":"Iliopsoas e Flexores do Quadril","descricao":"Alonga o iliopsoas e os flexores do quadril, encurtados pelo tempo excessivo sentado. Melhora a extensão do quadril e a postura.","execucao":"1. Posição semiajoelhada (joelho direito no chão, pé esquerdo à frente).\n2. Empurre o quadril levemente para frente e para baixo.\n3. Mantenha o tronco ereto.\n4. Sinta o alongamento na frente do quadril e da coxa da perna de trás.\n5. 30s cada lado.","beneficios":"Alonga iliopsoas. Corrige anteversão pélvica. Melhora postura e marcha.","cuidados":"Não arquear a lombar. Tapete sob o joelho.","material":"Tapete.","obs":"Crucial para quem passa muito tempo sentado. Incluir sempre na volta à calma.","defaultSeries":"2","defaultReps":"30s cada","defaultDescanso":"10s","tags":"alongamento,flexores do quadril,iliopsoas,postura,marcha","foto":""},
{"id":"al05","nome":"Alongamento Peitoral","grupo":"Alongamento","nivel":"Básico","momento":"Parte Final","foco":"Peitoral Maior e Deltoides Anterior","descricao":"Alonga o peitoral e o deltoides anterior. Combate o encurvamento dos ombros para frente típico do envelhecimento.","execucao":"1. Em pé de lado a uma porta ou canto de parede.\n2. Apoie o antebraço e a mão na parede (cotovelo a 90°).\n3. Gire o tronco para o lado oposto até sentir o alongamento no peito.\n4. Mantenha 20–30s. Repita do outro lado.\n5. Alternativa: interconectar os dedos atrás das costas e abrir o peito.","beneficios":"Alonga peitoral e deltoides anterior. Melhora postura. Abre o tórax.","cuidados":"Não forçar além do conforto. Sem rotação excessiva do ombro.","material":"Parede ou porta.","obs":"Excelente para complementar os exercícios de remada e face pull.","defaultSeries":"2","defaultReps":"30s cada","defaultDescanso":"10s","tags":"alongamento,peitoral,ombros,postura,cifose","foto":""},
{"id":"al06","nome":"Alongamento Dorsal","grupo":"Alongamento","nivel":"Básico","momento":"Parte Final","foco":"Coluna Torácica e Paravertebrais","descricao":"Alonga os músculos paravertebrais e a coluna torácica. Alivia tensão nas costas.","execucao":"1. Sentado, cruze os braços sobre o peito.\n2. Curve as costas arredondando a coluna torácica.\n3. Mantenha por 20–30s sentindo o alongamento entre as omoplatas.\n4. Alternativa: de joelhos, estenda os braços à frente no chão (posição de criança).","beneficios":"Alivia tensão nas costas. Alonga paravertebrais e romboides. Melhora mobilidade torácica.","cuidados":"Movimento suave. Sem dor aguda.","material":"Cadeira ou tapete.","obs":"","defaultSeries":"2","defaultReps":"30s","defaultDescanso":"10s","tags":"alongamento,dorsal,paravertebrais,torácica,coluna","foto":""},
{"id":"al07","nome":"Alongamento Cervical","grupo":"Alongamento","nivel":"Básico","momento":"Parte Final","foco":"Trapézio Superior, Escalenos e Cervical","descricao":"Alonga a musculatura cervical e o trapézio superior. Alivia tensão do pescoço e dores de cabeça tensionais.","execucao":"1. Sentado, incline a orelha direita ao ombro direito.\n2. Com a mão direita aplique pressão leve sobre a têmpora esquerda.\n3. Mantenha 20–30s sentindo o alongamento no lado esquerdo do pescoço.\n4. Repita do outro lado.\n5. Adicionalmente: olhe levemente para o lado contrário para alongar os escalenos.","beneficios":"Alivia tensão cervical. Reduz dores de cabeça tensionais. Melhora postura da cabeça.","cuidados":"Pressão leve — deixar o peso da cabeça agir. Sem rotação excessiva.","material":"Cadeira.","obs":"Incluir sempre que o aluno relatar tensão no pescoço.","defaultSeries":"2","defaultReps":"30s cada","defaultDescanso":"10s","tags":"alongamento,cervical,trapézio,pescoço,cabeça","foto":""},
{"id":"al08","nome":"Alongamento de Trapézio","grupo":"Alongamento","nivel":"Básico","momento":"Parte Final","foco":"Trapézio Superior e Médio","descricao":"Alonga o trapézio superior, frequentemente encurtado em pessoas com postura de cabeça anteriorizada.","execucao":"1. Sentado, coloque a mão direita atrás das costas ou segure o assento da cadeira.\n2. Incline a cabeça para a esquerda e levemente para frente.\n3. Com a mão esquerda, aplique pressão leve sobre a têmpora direita.\n4. 20–30s cada lado.","beneficios":"Alivia dor no trapézio e pescoço. Melhora postura da cabeça.","cuidados":"Pressão muito leve. Não puxar pelo queixo.","material":"Cadeira.","obs":"","defaultSeries":"2","defaultReps":"30s cada","defaultDescanso":"10s","tags":"alongamento,trapézio,pescoço,postura","foto":""},
{"id":"al09","nome":"Alongamento da Cadeia Posterior","grupo":"Alongamento","nivel":"Básico","momento":"Parte Final","foco":"Cadeia Posterior Completa — Isquiotibiais, Glúteos e Lombar","descricao":"Alonga toda a cadeia posterior em um único exercício. Muito eficiente para volta à calma.","execucao":"1. Sentado na ponta da cadeira, pés no chão.\n2. Incline o tronco para frente deixando as mãos penduradas em direção ao chão.\n3. Mantenha a cabeça relaxada.\n4. Respire profundamente e afunde um pouco mais a cada expiração.\n5. Mantenha 30–45s.","beneficios":"Alonga isquiotibiais, glúteos, paravertebrais e lombar em um único movimento. Excelente para desaquecimento.","cuidados":"Movimento muito lento. Deixar o peso do tronco agir. Não forçar.","material":"Cadeira firme.","obs":"Um dos melhores exercícios finais de sessão pelo efeito calmante.","defaultSeries":"2","defaultReps":"30–45s","defaultDescanso":"15s","tags":"alongamento,cadeia posterior,isquiotibiais,lombar,desaquecimento","foto":""},
{"id":"al10","nome":"Alongamento Global","grupo":"Alongamento","nivel":"Básico","momento":"Parte Final","foco":"Corpo Inteiro — Cadeia Anterior e Posterior","descricao":"Posição de alongamento global que integra a cadeia posterior e anterior. Finalização tranquila da sessão.","execucao":"1. Deitado de costas, braços acima da cabeça e pernas estendidas.\n2. Estique o corpo todo, como se tentasse se tornar mais alto.\n3. Mantenha por 30s relaxando progressivamente.\n4. Alternativa em pé: braços acima da cabeça, ponta dos pés, corpo todo estendido por 10s, depois relaxar.","beneficios":"Alonga todo o corpo de forma integrada. Relaxa o sistema nervoso. Finaliza a sessão.","cuidados":"Respiração profunda e relaxada. Sem tensão.","material":"Tapete ou espaço em pé.","obs":"Ideal como exercício final de cada sessão antes da respiração diafragmática.","defaultSeries":"2","defaultReps":"30s","defaultDescanso":"15s","tags":"alongamento,global,cadeia anterior,cadeia posterior,relaxamento","foto":""},

{"id":"ca01","nome":"Caminhada Rápida","grupo":"Cardio","nivel":"Básico","momento":"Parte Principal","foco":"Resistência Cardiovascular e Marcha Acelerada","descricao":"Caminhada em ritmo acelerado. Aumenta a frequência cardíaca de forma progressiva e segura.","execucao":"1. Iniciar com caminhada normal por 2–3 min (aquecimento).\n2. Aumentar progressivamente o ritmo.\n3. Manter a velocidade elevada por 5–10 min.\n4. Reduzir progressivamente para desaquecimento.","beneficios":"Melhora condicionamento cardiovascular. Aumenta metabolismo. Transferência direta para atividade diária.","cuidados":"Monitorar FC. PA monitorada antes e depois para hipertensos. Superfície segura.","material":"Corredor livre ou ao ar livre.","obs":"Meta: 3–5 sessões por semana de 20–30 min para condicionamento cardiovascular.","defaultSeries":"1","defaultReps":"10–20 min","defaultDescanso":"—","tags":"cardio,marcha,resistência,aeróbico","foto":""},
{"id":"ca02","nome":"Marcha Estacionária","grupo":"Cardio","nivel":"Básico","momento":"Parte Principal","foco":"Cardio e Padrão de Marcha","descricao":"Caminhada no lugar com variações de ritmo e elevação. Seguro para ambientes pequenos.","execucao":"1. Em pé com apoio leve disponível.\n2. Marche no lugar elevando os joelhos alternadamente.\n3. Variações: ritmo lento, moderado, rápido.\n4. Coordene o movimento dos braços.\n5. 3–5 minutos contínuos.","beneficios":"Cardio seguro em espaço reduzido. Ativa todos os grupos musculares da marcha.","cuidados":"Apoio disponível. Ritmo confortável.","material":"Cadeira ou parede para apoio.","obs":"","defaultSeries":"1","defaultReps":"3–5 min","defaultDescanso":"60s","tags":"cardio,marcha,aeróbico,espaço reduzido","foto":""},
{"id":"ca03","nome":"Step Contínuo","grupo":"Cardio","nivel":"Básico","momento":"Parte Principal","foco":"Cardio e MMII","descricao":"Subir e descer um step de forma contínua e rítmica. Combina cardio com fortalecimento de MMII.","execucao":"1. Step firme de 10–15cm com apoio lateral disponível.\n2. Suba com o pé direito, depois o esquerdo (no step).\n3. Desça com o pé direito, depois o esquerdo (no chão).\n4. Ritmo constante por 2–3 minutos.\n5. Trocar o pé líder a cada 20–30 repetições.","beneficios":"Combina cardio com fortalecimento de MMII. Simula subir escadas.","cuidados":"Apoio lateral sempre disponível. Controlar a descida. Superfície antiderrapante.","material":"Step ou degrau firme. Apoio lateral.","obs":"","defaultSeries":"3","defaultReps":"2–3 min","defaultDescanso":"60s","tags":"cardio,step,mmii,aeróbico","foto":""},
{"id":"ca04","nome":"Step Alternado","grupo":"Cardio","nivel":"Básico","momento":"Parte Principal","foco":"Cardio, Coordenação e MMII","descricao":"Step com alternância de pés e variações de padrão. Adiciona coordenação ao componente cardio.","execucao":"1. Step firme com apoio disponível.\n2. Suba e desça alternando o pé líder (direita, esquerda, direita...).\n3. Variação: toque o step com o pé em vez de subir completamente.\n4. 2–3 minutos.","beneficios":"Combina cardio, coordenação e fortalecimento. Maior demanda cognitiva que o step contínuo.","cuidados":"Apoio disponível. Padrão de movimento claro antes de aumentar o ritmo.","material":"Step ou degrau firme. Apoio lateral.","obs":"","defaultSeries":"3","defaultReps":"2–3 min","defaultDescanso":"60s","tags":"cardio,step,coordenação,mmii,aeróbico","foto":""},
{"id":"ca05","nome":"Bicicleta Ergométrica","grupo":"Cardio","nivel":"Básico","momento":"Parte Principal","foco":"Cardio Sem Impacto","descricao":"Exercício aeróbico sem impacto nas articulações. Ideal para alunos com dor no joelho, quadril ou tornozelo.","execucao":"1. Ajustar o banco (joelho levemente dobrado na extensão máxima).\n2. Iniciar em ritmo leve por 2–3 min (aquecimento).\n3. Manter ritmo moderado por 10–20 min.\n4. Reduzir progressivamente.","beneficios":"Cardio sem impacto. Ideal para artrose de joelho e quadril. Fácil controle de intensidade.","cuidados":"Ajuste adequado do banco para evitar hiperextensão do joelho. Monitorar FC.","material":"Bicicleta ergométrica.","obs":"Excelente para alunos com comprometimento articular nos MMII.","defaultSeries":"1","defaultReps":"10–20 min","defaultDescanso":"—","tags":"cardio,bicicleta,sem impacto,aeróbico,joelho","foto":""},
{"id":"ca06","nome":"Boxe Sem Impacto","grupo":"Cardio","nivel":"Básico","momento":"Parte Principal","foco":"Cardio, Coordenação e MMSS","descricao":"Movimentos de boxe no ar sem impacto. Combina cardio com coordenação e fortalecimento leve de membros superiores.","execucao":"1. Em pé com base estável (pés afastados).\n2. Socos para frente alternados (jab): 20 repetições.\n3. Socos laterais (cross): 20 repetições.\n4. Ganchos (hook): 20 repetições.\n5. Combinações ao ritmo. 2–3 rounds de 1 minuto.","beneficios":"Cardio divertido e motivador. Melhora coordenação e ritmo. Fortalece MMSS levemente.","cuidados":"Apoio disponível se necessário. Não travar os cotovelos. Amplitude de movimento confortável.","material":"Espaço livre.","obs":"Pode ser sentado para alunos com restrição de equilíbrio.","defaultSeries":"3","defaultReps":"1 min","defaultDescanso":"30s","tags":"cardio,boxe,coordenação,mmss,funcional","foto":""},
{"id":"ca07","nome":"Polichinelo Adaptado","grupo":"Cardio","nivel":"Básico","momento":"Parte Principal","foco":"Cardio e Coordenação","descricao":"Versão adaptada do polichinelo sem impacto ou com impacto reduzido. Combina cardio com coordenação braço-perna.","execucao":"1. Versão sem impacto: abrir e fechar as pernas alternadamente (uma de cada vez), braços coordenados acima.\n2. Versão sentado: abrir e fechar os joelhos coordenando com os braços.\n3. Versão em pé: passo lateral com os braços.\n4. 2–3 minutos.","beneficios":"Cardio acessível. Melhora coordenação braço-perna. Pode ser adaptado para todos os níveis.","cuidados":"Escolher a variação adequada ao nível. Apoio disponível.","material":"Cadeira (versão sentada) ou espaço livre.","obs":"","defaultSeries":"3","defaultReps":"1 min","defaultDescanso":"30s","tags":"cardio,polichinelo,coordenação,adaptado","foto":""},
{"id":"ca08","nome":"Circuito Cardiovascular Funcional","grupo":"Cardio","nivel":"Intermediário","momento":"Parte Principal","foco":"Cardio Integrado com Padrões Funcionais","descricao":"Circuito combinando exercícios funcionais em sequência para manter a FC elevada.","execucao":"1. Estação 1: Marcha estacionária (30s).\n2. Estação 2: Sentar e levantar rápido (30s).\n3. Estação 3: Step contínuo (30s).\n4. Estação 4: Boxe no ar (30s).\n5. Descanso 30s. Repetir 2–3 vezes.","beneficios":"Combina cardio com força funcional. Mantém a motivação elevada. Alta transferência para a vida diária.","cuidados":"Monitorar FC e PA. Pausas entre estações se necessário. Adaptar intensidade.","material":"Step, cadeira, espaço livre.","obs":"Adaptar as estações ao nível e condição de cada aluno.","defaultSeries":"3","defaultReps":"circuito 4 estações","defaultDescanso":"30s entre estações","tags":"cardio,circuito,funcional,intermediário","foto":""},

{"id":"co01","nome":"Escada de Agilidade","grupo":"Coordenação","nivel":"Intermediário","momento":"Parte Principal","foco":"Coordenação de Pés, Agilidade e Padrão Motor","descricao":"Padrões de passadas em escada de agilidade no chão. Melhora a coordenação de pés e a velocidade de movimento.","execucao":"1. Escada de agilidade no chão (ou faixas simulando).\n2. Padrão básico: dois pés em cada quadrado, avançando.\n3. Padrão lateral: entrar e sair lateralmente.\n4. Padrão cruzado: cruzar os pés alternadamente.\n5. Iniciar lento, progredir em velocidade.","beneficios":"Melhora coordenação de pés. Aumenta velocidade de reação. Treina padrões de marcha seguros.","cuidados":"Superfície antiderrapante. Iniciar lento. Apoio disponível. Não usar se instabilidade severa.","material":"Escada de agilidade ou faixas no chão.","obs":"Adaptar o padrão ao nível. Versão básica: apenas entrar e sair com um pé de cada vez.","defaultSeries":"3","defaultReps":"percurso completo","defaultDescanso":"45s","tags":"coordenação,agilidade,pés,marcha,padrão motor","foto":""},
{"id":"co02","nome":"Toque Alternado em Cones","grupo":"Coordenação","nivel":"Básico","momento":"Parte Principal","foco":"Coordenação, Reação e Deslocamento","descricao":"Tocar alternadamente cones posicionados em diferentes posições. Treina reação e deslocamento direcional.","execucao":"1. Posicione 3–5 cones a diferentes distâncias e direções.\n2. O professor aponta um cone, o aluno se desloca e toca.\n3. Retorna ao centro e aguarda o próximo comando.\n4. Progressão: aumentar distância, velocidade e número de cones.","beneficios":"Treina reação, deslocamento e coordenação direcional. Combina cognitivo e motor.","cuidados":"Superfície segura. Começar com distâncias curtas. Apoio disponível.","material":"Cones ou objetos no chão.","obs":"","defaultSeries":"3","defaultReps":"1–2 min","defaultDescanso":"30s","tags":"coordenação,reação,deslocamento,cones,cognitivo","foto":""},
{"id":"co03","nome":"Sequência de Cores","grupo":"Coordenação","nivel":"Básico","momento":"Parte Inicial","foco":"Coordenação Cognitivo-Motora e Associação","descricao":"Associar cores a movimentos específicos. Treina a velocidade de processamento e a coordenação cognitivo-motora.","execucao":"1. Definir 3–4 cores, cada uma com um movimento (ex: vermelho = bater palmas, azul = elevar joelho).\n2. O professor mostra a cor, o aluno executa o movimento.\n3. Progressão: aumentar o número de cores e a velocidade de apresentação.","beneficios":"Treina velocidade de processamento. Melhora associação cognitivo-motora. Excelente para cognição.","cuidados":"Começar com 2 cores apenas. Progressão gradual.","material":"Cartões coloridos ou objetos.","obs":"Ótimo para parte inicial da sessão — ativa o sistema cognitivo.","defaultSeries":"2","defaultReps":"2 min","defaultDescanso":"30s","tags":"coordenação,cognitivo,cores,associação,processamento","foto":""},
{"id":"co04","nome":"Coordenação Braço-Perna","grupo":"Coordenação","nivel":"Básico","momento":"Parte Principal","foco":"Coordenação Cruzada e Integração Hemisférica","descricao":"Movimentos de braços e pernas opostos e coordenados. Treina a integração hemisférica e a coordenação interlimbar.","execucao":"1. Em pé ou sentado.\n2. Eleve o joelho direito enquanto leva o braço esquerdo para cima (padrão cruzado).\n3. Alterne para joelho esquerdo e braço direito.\n4. Progressão: adicionar rotação de tronco.\n5. 3 séries de 10–15 repetições.","beneficios":"Treina coordenação cruzada. Melhora integração hemisférica. Pode ser feito sentado.","cuidados":"Iniciar lento para estabelecer o padrão antes de aumentar a velocidade.","material":"Cadeira ou espaço livre.","obs":"","defaultSeries":"3","defaultReps":"10–15 cada","defaultDescanso":"30s","tags":"coordenação,braço-perna,cruzado,integração hemisférica","foto":""},
{"id":"co05","nome":"Ritmo com Palmas","grupo":"Coordenação","nivel":"Básico","momento":"Parte Inicial","foco":"Ritmo, Coordenação e Atenção","descricao":"Reproduzir e criar sequências rítmicas com palmas. Treina atenção e coordenação auditivo-motora.","execucao":"1. O professor bate uma sequência rítmica (ex: 1-2, 1-2-3).\n2. O aluno repete.\n3. Progressão: sequências mais longas e complexas.\n4. Progressão 2: o aluno cria e o professor repete.\n5. 5–10 minutos.","beneficios":"Treina ritmo, atenção e memória de curto prazo. Divertido e motivador. Estimula coordenação auditivo-motora.","cuidados":"Progressão gradual. Adaptar a complexidade ao nível cognitivo.","material":"Sem equipamento.","obs":"Excelente para início de sessão ou como exercício cognitivo.","defaultSeries":"1","defaultReps":"5–10 min","defaultDescanso":"—","tags":"coordenação,ritmo,palmas,atenção,cognitivo","foto":""},
{"id":"co06","nome":"Transferência de Objetos","grupo":"Coordenação","nivel":"Básico","momento":"Parte Principal","foco":"Coordenação Fina, Preensão e Equilíbrio","descricao":"Transferir objetos de uma mão para outra, de um recipiente para outro, ou de forma coordenada durante o movimento.","execucao":"1. Versão básica: transferir bola de uma mão para outra em frente ao corpo.\n2. Versão em movimento: transferir durante a marcha.\n3. Versão desafio: transferir com os olhos fechados.\n4. Objetos de diferentes tamanhos e pesos.","beneficios":"Treina coordenação fina e preensão. Melhora atenção e concentração. Simula tarefas do cotidiano.","cuidados":"Objetos adequados — nem muito pequenos (risco de queda) nem muito pesados.","material":"Bolas, xícaras, recipientes de diferentes tamanhos.","obs":"","defaultSeries":"3","defaultReps":"1 min","defaultDescanso":"20s","tags":"coordenação,preensão,fina,cotidiano","foto":""},
{"id":"co07","nome":"Circuito Coordenativo","grupo":"Coordenação","nivel":"Intermediário","momento":"Parte Principal","foco":"Coordenação Integrada e Padrões Múltiplos","descricao":"Circuito com múltiplas estações de coordenação. Desafio motor e cognitivo integrado.","execucao":"1. Estação 1: Escada de agilidade (30s).\n2. Estação 2: Toque em cones (30s).\n3. Estação 3: Lançar e pegar bola (30s).\n4. Estação 4: Coordenação braço-perna (30s).\n5. Descanso 30s. 2–3 rounds.","beneficios":"Integra múltiplos padrões de coordenação. Alta transferência para atividade funcional.","cuidados":"Adaptar cada estação ao nível. Apoio disponível em todas as estações.","material":"Escada de agilidade, cones, bola.","obs":"","defaultSeries":"2","defaultReps":"4 estações × 30s","defaultDescanso":"30s entre estações","tags":"coordenação,circuito,integrado,cognitivo,motor","foto":""},

{"id":"cg01","nome":"Caminhar Contando Regressivamente","grupo":"Cognitivo","nivel":"Básico","momento":"Parte Inicial","foco":"Atenção Dividida e Marcha Segura","descricao":"Caminhar enquanto conta regressivamente a partir de um número. Tarefa dual clássica para prevenção de quedas.","execucao":"1. O aluno caminha normalmente.\n2. Simultaneamente conta regressivamente a partir de 20 (ou 50 para maior desafio).\n3. Progressão: contar de 3 em 3 regressivamente.\n4. Progressão 2: contar de 7 em 7.\n5. 3–5 minutos.","beneficios":"Treina atenção dividida. Melhora automação da marcha. Reduz risco de quedas em situações de atenção dividida.","cuidados":"Iniciar com contagem simples. Apoio disponível. Monitorar a qualidade da marcha.","material":"Corredor livre.","obs":"Correlaciona-se diretamente com risco de quedas — quanto mais difícil, maior o risco.","defaultSeries":"2","defaultReps":"3–5 min","defaultDescanso":"30s","tags":"cognitivo,tarefa dual,marcha,atenção,quedas","foto":""},
{"id":"cg02","nome":"Caminhar Nomeando Animais","grupo":"Cognitivo","nivel":"Básico","momento":"Parte Inicial","foco":"Fluência Verbal, Atenção e Marcha","descricao":"Caminhar enquanto nomeia animais (ou outros categorias). Treina fluência verbal e atenção dividida.","execucao":"1. O aluno caminha.\n2. Ao mesmo tempo, nomeia um animal diferente a cada passo ou a cada 2 passos.\n3. Variação: nomear frutas, países, palavras com determinada letra.\n4. 3–5 minutos.","beneficios":"Treina fluência verbal. Melhora atenção dividida. Estimula memória semântica.","cuidados":"Apoio disponível. Monitorar qualidade da marcha.","material":"Corredor livre.","obs":"","defaultSeries":"2","defaultReps":"3–5 min","defaultDescanso":"30s","tags":"cognitivo,tarefa dual,marcha,fluência verbal,memória","foto":""},
{"id":"cg03","nome":"Caminhar Nomeando Cidades","grupo":"Cognitivo","nivel":"Básico","momento":"Parte Inicial","foco":"Memória Semântica e Atenção Dividida","descricao":"Caminhar nomeando cidades ou outros itens de categorias diversas. Variação da tarefa dual de marcha.","execucao":"1. Caminhar normalmente.\n2. Nomear cidades em sequência alfabética (São Paulo, Salvador, Sorocaba...).\n3. Variação: nomear cidades começando com cada letra do alfabeto.\n4. 3–5 minutos.","beneficios":"Estimula memória semântica. Treina atenção dividida. Engajamento cognitivo durante a marcha.","cuidados":"Apoio disponível. Adaptar a categoria ao interesse do aluno.","material":"Corredor livre.","obs":"Personalizar as categorias pelo perfil do aluno aumenta o engajamento.","defaultSeries":"2","defaultReps":"3–5 min","defaultDescanso":"30s","tags":"cognitivo,tarefa dual,marcha,memória semântica","foto":""},
{"id":"cg04","nome":"Dupla Tarefa Motora","grupo":"Cognitivo","nivel":"Intermediário","momento":"Parte Principal","foco":"Coordenação Bimanual e Atenção Dividida","descricao":"Realizar duas tarefas motoras simultaneamente. Treina a atenção dividida e a automação de movimentos.","execucao":"1. Caminhar enquanto passa uma bola de uma mão para outra.\n2. Sentar e levantar enquanto conta em voz alta.\n3. Equilíbrio em uma perna enquanto realiza tarefa cognitiva.\n4. Progressão: aumentar complexidade de uma ou ambas as tarefas.","beneficios":"Treina atenção dividida. Promove automação de movimentos. Alta transferência para situações reais.","cuidados":"Supervisão. Apoio disponível. Começar com tarefas simples.","material":"Bola, cadeira.","obs":"","defaultSeries":"3","defaultReps":"1 min","defaultDescanso":"30s","tags":"cognitivo,tarefa dual,motor,atenção dividida","foto":""},
{"id":"cg05","nome":"Associação Cor-Movimento","grupo":"Cognitivo","nivel":"Básico","momento":"Parte Inicial","foco":"Velocidade de Processamento e Associação","descricao":"Cada cor é associada a um movimento específico. Treina velocidade de processamento e memória de trabalho.","execucao":"1. Definir 3–4 cores com movimentos (ex: vermelho = levantar braços, azul = agachar, amarelo = girar).\n2. Mostrar as cores aleatoriamente.\n3. O aluno executa o movimento correspondente.\n4. Progressão: aumentar velocidade de apresentação das cores.","beneficios":"Treina velocidade de processamento. Estimula memória de trabalho. Melhora tempo de reação.","cuidados":"Iniciar com 2 cores. Progressão gradual.","material":"Cartões coloridos ou bolas coloridas.","obs":"","defaultSeries":"2","defaultReps":"2–3 min","defaultDescanso":"30s","tags":"cognitivo,cores,processamento,memória de trabalho,reação","foto":""},
{"id":"cg06","nome":"Associação Número-Movimento","grupo":"Cognitivo","nivel":"Básico","momento":"Parte Inicial","foco":"Velocidade de Processamento e Memória de Trabalho","descricao":"Cada número é associado a um movimento. Variação da associação cor-movimento com maior demanda numérica.","execucao":"1. Definir 4–5 números com movimentos específicos.\n2. O professor fala um número, o aluno executa o movimento.\n3. Progressão: sequências de números (ex: 1-3-2-4).\n4. O aluno deve executar a sequência de movimentos.","beneficios":"Treina memória de trabalho e velocidade de processamento numérico.","cuidados":"Iniciar com 3 números apenas.","material":"Sem equipamento ou cartões.","obs":"","defaultSeries":"2","defaultReps":"2–3 min","defaultDescanso":"30s","tags":"cognitivo,números,processamento,memória de trabalho","foto":""},
{"id":"cg07","nome":"Exercício de Atenção Seletiva","grupo":"Cognitivo","nivel":"Básico","momento":"Parte Inicial","foco":"Atenção Seletiva e Inibição","descricao":"Reagir apenas a estímulos específicos e inibir resposta a outros. Treina atenção seletiva e controle inibitório.","execucao":"1. O professor fala palavras aleatoriamente.\n2. O aluno eleva os braços apenas quando ouvir uma palavra de uma categoria específica (ex: animais).\n3. Progressão: duas categorias com movimentos diferentes.","beneficios":"Treina atenção seletiva. Melhora controle inibitório. Exercita o filtro cognitivo.","cuidados":"Progressão gradual. Pausas se necessário.","material":"Sem equipamento.","obs":"","defaultSeries":"2","defaultReps":"2–3 min","defaultDescanso":"30s","tags":"cognitivo,atenção seletiva,inibição,processamento","foto":""},
{"id":"cg08","nome":"Exercício de Memória Imediata","grupo":"Cognitivo","nivel":"Básico","momento":"Parte Inicial","foco":"Memória de Curto Prazo e Evocação","descricao":"Memorizar uma sequência de itens e reproduzir. Treina a memória de curto prazo.","execucao":"1. O professor mostra ou fala 3–5 objetos/palavras/imagens.\n2. O aluno memoriza.\n3. Após 30s, o aluno reproduz a sequência.\n4. Progressão: aumentar o número de itens ou o intervalo de tempo.\n5. Variação motora: associar cada item a um movimento.","beneficios":"Treina memória de curto prazo. Estimula estratégias de memorização. Pode ser combinado com exercício físico.","cuidados":"Adaptar o número de itens ao nível cognitivo.","material":"Cartões, objetos ou verbal.","obs":"","defaultSeries":"2","defaultReps":"5–10 minutos","defaultDescanso":"30s","tags":"cognitivo,memória,curto prazo,evocação","foto":""},
{"id":"cg09","nome":"Exercício de Memória Operacional","grupo":"Cognitivo","nivel":"Intermediário","momento":"Parte Principal","foco":"Memória Operacional e Função Executiva","descricao":"Manipular informações na memória enquanto realiza outra tarefa. Alta demanda de função executiva.","execucao":"1. O professor fala uma série de números.\n2. O aluno deve repeti-los em ordem inversa.\n3. Progressão: repeti-los em ordem crescente independente da apresentação.\n4. Combinar com exercício físico (ex: enquanto caminha).","beneficios":"Treina memória operacional. Estimula função executiva. Alta demanda cognitiva.","cuidados":"Iniciar com 3 itens. Progressão muito gradual.","material":"Sem equipamento.","obs":"","defaultSeries":"2","defaultReps":"5 min","defaultDescanso":"30s","tags":"cognitivo,memória operacional,função executiva,avançado","foto":""},
{"id":"cg10","nome":"Resolução de Comandos","grupo":"Cognitivo","nivel":"Básico","momento":"Parte Inicial","foco":"Sequenciamento e Função Executiva","descricao":"Executar sequências de comandos em ordem. Treina o planejamento e o sequenciamento motor.","execucao":"1. O professor dá uma sequência de instruções (ex: 'toque o joelho direito, depois o ombro esquerdo, depois bata palmas').\n2. O aluno executa a sequência sem que o professor repita.\n3. Progressão: sequências mais longas.","beneficios":"Treina sequenciamento e planejamento motor. Estimula memória de trabalho e função executiva.","cuidados":"Adaptar o número de comandos ao nível.","material":"Sem equipamento.","obs":"","defaultSeries":"2","defaultReps":"5 min","defaultDescanso":"30s","tags":"cognitivo,sequenciamento,função executiva,motor","foto":""},
{"id":"cg11","nome":"Reação a Estímulos Visuais","grupo":"Cognitivo","nivel":"Básico","momento":"Parte Inicial","foco":"Tempo de Reação Visual e Coordenação","descricao":"Reagir rapidamente a estímulos visuais com movimento específico. Treina o tempo de reação visuomotor.","execucao":"1. O professor levanta um objeto (ou mostra um sinal).\n2. O aluno reage imediatamente com um movimento pré-definido.\n3. Progressão: diferentes objetos com diferentes movimentos.\n4. Medir o tempo de reação.","beneficios":"Melhora o tempo de reação visual. Alta transferência para situações de risco de queda.","cuidados":"Começar com um único estímulo.","material":"Objetos coloridos ou cartões.","obs":"","defaultSeries":"2","defaultReps":"2–3 min","defaultDescanso":"30s","tags":"cognitivo,reação,visual,visuomotor,tempo de reação","foto":""},
{"id":"cg12","nome":"Reação a Estímulos Auditivos","grupo":"Cognitivo","nivel":"Básico","momento":"Parte Inicial","foco":"Tempo de Reação Auditivo e Coordenação","descricao":"Reagir rapidamente a estímulos sonoros com movimento específico. Treina o tempo de reação audiomotor.","execucao":"1. Definir sons com movimentos (ex: palma = levantar, assobio = sentar).\n2. O professor emite o som aleatoriamente.\n3. O aluno reage com o movimento correspondente.\n4. Progressão: múltiplos sons com múltiplos movimentos.","beneficios":"Melhora tempo de reação auditivo. Treina atenção e vigilância. Combina bem com marcha.","cuidados":"Começar com um único estímulo e movimento.","material":"Instrumento musical simples, apito ou palmas.","obs":"","defaultSeries":"2","defaultReps":"2–3 min","defaultDescanso":"30s","tags":"cognitivo,reação,auditivo,audiomotor,atenção","foto":""},
{"id":"cg13","nome":"Circuito Cognitivo-Motor","grupo":"Cognitivo","nivel":"Intermediário","momento":"Parte Principal","foco":"Integração Cognitivo-Motora e Tarefa Dual","descricao":"Circuito integrando exercícios físicos com tarefas cognitivas em cada estação. Alta transferência funcional.","execucao":"1. Estação 1: Marcha + contar regressivamente (30s).\n2. Estação 2: Step + nomear animais (30s).\n3. Estação 3: Equilíbrio + resolver cálculo simples (30s).\n4. Estação 4: Lançar bola + responder perguntas (30s).\n5. 2–3 rounds.","beneficios":"Máxima integração cognitivo-motora. Alta demanda e alta transferência para vida real.","cuidados":"Supervisão. Adaptar as tarefas ao nível. Apoio disponível.","material":"Step, cadeira, bola.","obs":"","defaultSeries":"2","defaultReps":"4 estações × 30s","defaultDescanso":"30s entre estações","tags":"cognitivo,motor,circuito,tarefa dual,integrado","foto":""},
{"id":"cg14","nome":"Tomada de Decisão Motora","grupo":"Cognitivo","nivel":"Intermediário","momento":"Parte Principal","foco":"Tomada de Decisão e Velocidade de Processamento","descricao":"Situações em que o aluno deve decidir rapidamente qual movimento executar. Treina a tomada de decisão motora.","execucao":"1. O professor apresenta dois estímulos possíveis (cores, direções, palavras).\n2. Para cada estímulo, um movimento diferente.\n3. O aluno deve decidir e executar rapidamente.\n4. Progressão: mais opções, mais velocidade.","beneficios":"Treina tomada de decisão rápida. Melhora velocidade de processamento. Alta transferência para situações de risco.","cuidados":"Começar com 2 opções apenas.","material":"Cartões ou objetos.","obs":"","defaultSeries":"2","defaultReps":"3 min","defaultDescanso":"30s","tags":"cognitivo,tomada de decisão,processamento,velocidade","foto":""},
{"id":"cg15","nome":"Velocidade de Processamento","grupo":"Cognitivo","nivel":"Intermediário","momento":"Parte Inicial","foco":"Velocidade de Processamento e Agilidade Cognitiva","descricao":"Exercícios específicos para melhorar a velocidade de processamento de informações, fundamental para segurança e autonomia.","execucao":"1. Sequência de números ou letras mostrada rapidamente.\n2. O aluno identifica o que foi mostrado o mais rápido possível.\n3. Variação: encontrar a letra ou número diferente em uma sequência.\n4. Progressão: aumentar a velocidade de apresentação.","beneficios":"Melhora velocidade de processamento. Essencial para reações rápidas e tomada de decisão.","cuidados":"Progressão gradual. Não gerar frustração. Comparar com performance anterior do próprio aluno.","material":"Cartões com números ou letras. Tablet ou papel.","obs":"","defaultSeries":"2","defaultReps":"3–5 min","defaultDescanso":"30s","tags":"cognitivo,velocidade de processamento,agilidade cognitiva","foto":""},

{"id":"re01","nome":"Respiração Costal","grupo":"Respiração","nivel":"Básico","momento":"Parte Final","foco":"Expansão Costal e Mobilidade Torácica","descricao":"Respiração com ênfase na expansão das costelas para os lados. Melhora a capacidade respiratória e a mobilidade torácica.","execucao":"1. Sentado ou deitado.\n2. Coloque as mãos nas laterais do tórax.\n3. Inspire expandindo as costelas para os lados (sinta as mãos afastarem).\n4. Expire deixando as costelas se aproximarem.\n5. 10 respirações lentas e profundas.","beneficios":"Melhora expansão costal. Aumenta capacidade pulmonar. Melhora mobilidade torácica.","cuidados":"Respiração suave. Sem forçar.","material":"Cadeira ou tapete.","obs":"","defaultSeries":"2","defaultReps":"10 respirações","defaultDescanso":"15s","tags":"respiração,costal,expansão,torácica","foto":""},
{"id":"re02","nome":"Respiração Abdominal","grupo":"Respiração","nivel":"Básico","momento":"Parte Final","foco":"Respiração Profunda e Relaxamento","descricao":"Respiração com ênfase no movimento do abdome. Ativa o sistema parassimpático e promove relaxamento profundo.","execucao":"1. Sentado ou deitado.\n2. Uma mão no abdome, outra no peito.\n3. Inspire lentamente expandindo o abdome (mão do abdome sobe, mão do peito quieta).\n4. Expire deixando o abdome afundar.\n5. 10–15 respirações.","beneficios":"Ativa o sistema parassimpático. Promove relaxamento. Melhora a eficiência respiratória.","cuidados":"Não forçar. Respiração natural e suave.","material":"Cadeira ou tapete.","obs":"Similar à respiração diafragmática. Foco no abdome.","defaultSeries":"2","defaultReps":"10–15 respirações","defaultDescanso":"15s","tags":"respiração,abdominal,parassimpático,relaxamento","foto":""},
{"id":"re03","nome":"Respiração Quadrada","grupo":"Respiração","nivel":"Básico","momento":"Parte Final","foco":"Regulação do Sistema Nervoso","descricao":"Técnica de respiração com quatro fases iguais. Regula o sistema nervoso e reduz o estresse.","execucao":"1. Inspire pelo nariz contando até 4.\n2. Retenha o ar contando até 4.\n3. Expire pela boca contando até 4.\n4. Retenha sem ar contando até 4.\n5. Repita 5–8 ciclos.","beneficios":"Equilibra o sistema nervoso autônomo. Reduz estresse e ansiedade. Melhora concentração.","cuidados":"Não forçar a retenção. Se sentir desconforto, reduzir a contagem para 3.","material":"Cadeira confortável ou tapete.","obs":"Excelente para alunos com ansiedade ou hipertensão.","defaultSeries":"1","defaultReps":"5–8 ciclos","defaultDescanso":"—","tags":"respiração,quadrada,sistema nervoso,estresse,relaxamento","foto":""},
{"id":"re04","nome":"Inspiração Nasal Lenta","grupo":"Respiração","nivel":"Básico","momento":"Parte Final","foco":"Ativação Parassimpática e Qualidade do Ar","descricao":"Inspiração lenta e consciente pelo nariz. A respiração nasal filtra, aquece e umidifica o ar — superior à respiração bucal.","execucao":"1. Inspire lentamente pelo nariz contando até 5–8.\n2. Sinta o ar filtrado e aquecido.\n3. Expire naturalmente.\n4. Atenção à qualidade do fluxo nasal.\n5. 10 respirações.","beneficios":"Melhora qualidade do ar inspirado. Ativa o nervo vago. Reduz a frequência respiratória.","cuidados":"Se tiver obstrução nasal, usar bucal e investigar a causa.","material":"Ambiente tranquilo.","obs":"","defaultSeries":"2","defaultReps":"10 respirações","defaultDescanso":"15s","tags":"respiração,nasal,parassimpático,qualidade","foto":""},
{"id":"re05","nome":"Expiração Prolongada","grupo":"Respiração","nivel":"Básico","momento":"Parte Final","foco":"Ativação Parassimpática e Relaxamento","descricao":"Expiração mais longa que a inspiração. Ativa o sistema parassimpático e promove relaxamento imediato.","execucao":"1. Inspire pelo nariz contando até 4.\n2. Expire pela boca contando até 8 (o dobro da inspiração).\n3. Lábios levemente franzidos como se soprasse uma vela.\n4. 8–10 ciclos.","beneficios":"A expiração prolongada ativa o nervo vago e o sistema parassimpático. Reduz FC e PA.","cuidados":"Não forçar a expiração. Deve ser confortável.","material":"Cadeira confortável.","obs":"Uma das técnicas mais eficazes para redução de FC após treino.","defaultSeries":"1","defaultReps":"8–10 ciclos","defaultDescanso":"—","tags":"respiração,expiração prolongada,parassimpático,FC,relaxamento","foto":""},
{"id":"re06","nome":"Expiração com Resistência","grupo":"Respiração","nivel":"Básico","momento":"Parte Final","foco":"Fortalecimento dos Músculos Expiratórios","descricao":"Expirar contra resistência (lábios franzidos, canudo, bola de sopro). Fortalece os músculos expiratórios.","execucao":"1. Inspire profundamente.\n2. Expire lentamente através de um canudo, soprando através de lábios franzidos ou inflando uma bola.\n3. Controlar a velocidade da expiração.\n4. 10 repetições.","beneficios":"Fortalece músculos expiratórios. Melhora a capacidade de tossir (importante para idosos). Exercita a musculatura respiratória.","cuidados":"Não expirar com muita força. Movimento suave e controlado.","material":"Canudo, bola de borracha ou bexiga.","obs":"Importante para alunos com DPOC ou fraqueza respiratória.","defaultSeries":"2","defaultReps":"10","defaultDescanso":"15s","tags":"respiração,expiração,resistência,musculatura respiratória","foto":""},
{"id":"re07","nome":"Expansão Torácica","grupo":"Respiração","nivel":"Básico","momento":"Parte Final","foco":"Expansão do Tórax e Capacidade Pulmonar","descricao":"Exercício combinando postura e respiração para maximizar a expansão torácica.","execucao":"1. Sentado com coluna ereta e ombros abertos.\n2. Inspire profundamente abrindo o peito, ombros para trás.\n3. Levante levemente os braços para os lados ao inspirar.\n4. Expire baixando os braços.\n5. 10 respirações.","beneficios":"Maximiza a expansão torácica. Combate a postura cifótica. Aumenta capacidade pulmonar.","cuidados":"Movimentos suaves. Não forçar a amplitude do ombro.","material":"Cadeira.","obs":"","defaultSeries":"2","defaultReps":"10","defaultDescanso":"15s","tags":"respiração,expansão torácica,capacidade pulmonar,postura","foto":""},
{"id":"re08","nome":"Respiração Associada ao Movimento","grupo":"Respiração","nivel":"Básico","momento":"Parte Inicial","foco":"Sincronização Respiração-Movimento","descricao":"Sincronizar a respiração com os movimentos dos exercícios. Melhora a eficiência e a segurança do treino.","execucao":"1. Em qualquer exercício: inspire na fase de menor esforço, expire na fase de maior esforço.\n2. Ex Agachamento: inspire descendo, expire subindo.\n3. Ex Remada: inspire abrindo, expire puxando.\n4. Praticar conscientemente durante 10 repetições de qualquer exercício.","beneficios":"Sincroniza respiração e esforço. Reduz pressão intratorácica. Melhora eficiência do movimento.","cuidados":"Nunca prender a respiração em exercícios de força (manobra de Valsalva).","material":"Sem equipamento adicional.","obs":"Ensinar no início do programa e reforçar continuamente.","defaultSeries":"1","defaultReps":"durante os exercícios","defaultDescanso":"—","tags":"respiração,movimento,sincronização,valsalva","foto":""},
{"id":"re09","nome":"Relaxamento Respiratório Guiado","grupo":"Respiração","nivel":"Básico","momento":"Parte Final","foco":"Relaxamento Profundo e Encerramento da Sessão","descricao":"Técnica guiada de relaxamento respiratório progressivo. Encerra a sessão promovendo recuperação e bem-estar.","execucao":"1. Deitado ou sentado confortavelmente.\n2. O professor guia verbalmente: 'Inspire... 2... 3... 4... Expire... 2... 3... 4... 5... 6...'.\n3. Com cada expiração, relaxar progressivamente cada parte do corpo.\n4. 5–10 minutos de relaxamento guiado.","beneficios":"Promove recuperação após o treino. Ativa o parassimpático. Melhora bem-estar subjetivo e adesão ao programa.","cuidados":"Ambiente tranquilo. Não conduzir em deitado se aluno tiver refluxo ou DPOC severo.","material":"Tapete ou cadeira confortável. Música suave opcional.","obs":"Encerramento ideal de toda sessão de treino do público 50+.","defaultSeries":"1","defaultReps":"5–10 min","defaultDescanso":"—","tags":"respiração,relaxamento,guiado,encerramento,recuperação","foto":""},

{"id":"fu01","nome":"Tríceps com Elástico","grupo":"MMSS","nivel":"Básico","momento":"Parte Principal","foco":"Tríceps","descricao":"Extensão de cotovelo com elástico. Fortalece o tríceps para empurrar e se levantar do chão.","execucao":"1. Elástico preso acima (porta, barra).\n2. Segure o elástico com as mãos acima da cabeça, cotovelos dobrados.\n3. Estenda os cotovelos empurrando as mãos para baixo ou para frente.\n4. Retorne lentamente.\n5. 3 séries de 12–15.","beneficios":"Fortalece tríceps. Melhora capacidade de empurrar e se apoiar.","cuidados":"Cotovelos próximos à cabeça. Não travar os cotovelos.","material":"Faixa elástica.","obs":"Nível 1 — Tríceps. Progressão: sentado, em pé, unilateral.","defaultSeries":"3","defaultReps":"12–15","defaultDescanso":"60s","tags":"mmss,tríceps,empurrar,elástico,nível1","foto":""},
{"id":"fu02","nome":"Desenvolvimento em Pé","grupo":"MMSS","nivel":"Intermediário","momento":"Parte Principal","foco":"Deltoides, Tríceps e Core","descricao":"Press de ombros em pé com halteres. Maior demanda de core e equilíbrio que a versão sentada.","execucao":"1. Em pé, halteres na altura dos ombros.\n2. Core contraído, quadris neutros.\n3. Empurre para cima até quase estender os braços.\n4. Desça controladamente.\n5. 3 séries de 10.","beneficios":"Fortalece deltoides e tríceps. Demanda de core maior que sentado. Mais funcional.","cuidados":"Não arquear a lombar. Core ativo durante todo o movimento.","material":"Halteres.","obs":"Nível 2 — Desenvolvimento.","defaultSeries":"3","defaultReps":"10","defaultDescanso":"60s","tags":"mmss,empurrar,ombros,tríceps,core,nível2","foto":""},
{"id":"fu03","nome":"Rosca Alternada","grupo":"MMSS","nivel":"Básico","momento":"Parte Principal","foco":"Bíceps e Controle Unilateral","descricao":"Rosca direta alternando os braços. Maior controle e atenção por repetição.","execucao":"1. Em pé ou sentado, halteres nas mãos.\n2. Flexione um cotovelo levando o peso ao ombro.\n3. Desça lentamente antes de iniciar o outro lado.\n4. Alterne continuamente.\n5. 3 séries de 10–12 por lado.","beneficios":"Fortalece bíceps bilateralmente. Maior atenção a cada repetição. Pode identificar assimetrias.","cuidados":"Cotovelos fixos ao lado do corpo. Não balançar o tronco.","material":"Halteres leves.","obs":"Nível 3–4 — Rosca Bíceps.","defaultSeries":"3","defaultReps":"10–12 cada","defaultDescanso":"60s","tags":"mmss,bíceps,alternado,unilateral,nível3","foto":""}

const Card=({children,style,onClick})=>(<div onClick={onClick} style={{background:"#fff",borderRadius:13,border:"1.5px solid #e2e8f0",padding:13,marginBottom:9,...style,cursor:onClick?"pointer":undefined}}>{children}</div>);
const Btn=({children,onClick,variant="primary",full,sm,disabled,style})=>{
  const base={border:"none",borderRadius:9,fontWeight:700,cursor:disabled?"not-allowed":"pointer",display:"inline-flex",alignItems:"center",justifyContent:"center",gap:5,fontFamily:"inherit",opacity:disabled?0.5:1};
  const v={primary:{background:O,color:"#fff",padding:sm?"7px 11px":"10px 15px",fontSize:sm?12:13},secondary:{background:"#f1f5f9",color:"#475569",padding:sm?"7px 11px":"10px 15px",fontSize:sm?12:13},ghost:{background:"transparent",color:"#64748b",padding:sm?"5px 8px":"8px 12px",fontSize:sm?11:12,border:"1.5px solid #e2e8f0"},danger:{background:"#fee2e2",color:"#dc2626",padding:sm?"7px 11px":"10px 15px",fontSize:sm?12:13}};
  return <button onClick={disabled?undefined:onClick} style={{...base,...v[variant],width:full?"100%":undefined,...style}}>{children}</button>;
};
const Inp=({label,value,onChange,type="text",placeholder,opts,rows,required})=>(

const FotoUpload=({foto,onChange})=>{
  const ref=useRef();
  const handle=e=>{const f=e.target.files[0];if(!f)return;if(f.size>2097152){alert("Máx 2MB");return;}const r=new FileReader();r.onload=ev=>onChange(ev.target.result);r.readAsDataURL(f);};
  return(<div style={{marginBottom:11}}>
    <div style={{fontSize:10,fontWeight:700,color:"#64748b",marginBottom:4,textTransform:"uppercase"}}>Foto</div>
    {foto?(<div style={{position:"relative",display:"inline-block"}}><img src={foto} alt="" style={{width:"100%",maxWidth:280,borderRadius:9,border:"1.5px solid #e2e8f0",display:"block",maxHeight:160,objectFit:"cover"}}/><button onClick={()=>onChange("")} style={{position:"absolute",top:5,right:5,border:"none",background:"rgba(0,0,0,0.55)",borderRadius:99,width:24,height:24,color:"#fff",cursor:"pointer",fontSize:12}}>✕</button></div>):(<div onClick={()=>ref.current.click()} style={{border:"2px dashed #cbd5e1",borderRadius:9,padding:"20px 14px",textAlign:"center",cursor:"pointer",background:"#f8fafc"}}><div style={{fontSize:26,marginBottom:5}}>📷</div><div style={{fontSize:12,color:"#64748b"}}>Toque para adicionar foto</div><div style={{fontSize:10,color:"#94a3b8",marginTop:2}}>JPG, PNG — máx. 2MB</div></div>)}
    <input ref={ref} type="file" accept="image/*" onChange={handle} style={{display:"none"}}/>
  </div>);
};
