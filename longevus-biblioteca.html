{"id":"bi01","nome":"Sentar e Levantar da Cadeira","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Quadríceps e Glúteos","descricao":"Simula e fortalece o movimento de levantar do sofá e vaso sanitário. Fundamental para autonomia diária.","execucao":"1. Cadeira firme, pés na largura dos ombros.\n2. Incline o tronco levemente para a frente.\n3. Levante sem usar as mãos.\n4. Retorne lentamente, controlando a descida.","beneficios":"Fortalece quadríceps e glúteos. Essencial para prevenção de quedas.","cuidados":"Se precisar de apoio, use os braços da cadeira. Contraindicado em dor aguda no joelho sem liberação.","material":"Cadeira firme sem rodinhas","obs":"Progressão: caneleira. Regressão: apoio nas mãos.","defaultSeries":"3","defaultReps":"10–12","defaultDescanso":"60s","tags":"quedas,sarcopenia,mmii,funcional,sppb","foto":""},
{"id":"bi02","nome":"Elevação de Calcanhares","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Panturrilha e Tornozelo","descricao":"Fortalece a panturrilha responsável pelo impulso na caminhada e estabilidade do tornozelo.","execucao":"1. Em pé com apoio leve.\n2. Pés paralelos na largura dos quadris.\n3. Eleve-se na ponta dos pés lentamente.\n4. Mantenha 1 segundo. Desça lentamente.","beneficios":"Fortalece panturrilha. Melhora equilíbrio e impulso na marcha. Previne cãibras.","cuidados":"Use apoio. Atenção em casos de dor no tendão de Aquiles.","material":"Cadeira ou parede","obs":"Progressão: sem apoio.","defaultSeries":"3","defaultReps":"12–15","defaultDescanso":"45s","tags":"sarcopenia,mmii,marcha,panturrilha","foto":""},
{"id":"bi03","nome":"Extensão de Perna para Trás","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Glúteos e Extensores do Quadril","descricao":"Fortalece glúteos e extensores do quadril, fundamentais para propulsão na caminhada.","execucao":"1. Em pé com apoio.\n2. Eleve uma perna para trás com joelho esticado.\n3. Contraia o glúteo no ponto mais alto.\n4. Retorne lentamente.","beneficios":"Fortalece glúteos. Melhora propulsão na marcha.","cuidados":"Evite arquear a lombar. Movimento parte do quadril.","material":"Cadeira ou parede","obs":"Progressão: caneleira.","defaultSeries":"3","defaultReps":"10 cada","defaultDescanso":"45s","tags":"sarcopenia,mmii,glúteos,marcha,quedas","foto":""},
{"id":"bi04","nome":"Elevação de Perna à Frente","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Quadríceps e Flexores do Quadril","descricao":"Fortalece quadríceps e flexores do quadril, essenciais para subir escadas.","execucao":"1. Em pé com apoio.\n2. Eleve a perna à frente com joelho dobrado até a altura do quadril.\n3. Mantenha 1 segundo. Retorne lentamente.","beneficios":"Melhora capacidade de subir escadas e levantar da cadeira.","cuidados":"Mantenha o tronco ereto. Não incline para compensar.","material":"Cadeira ou parede","obs":"Progressão: caneleira.","defaultSeries":"3","defaultReps":"10 cada","defaultDescanso":"45s","tags":"sarcopenia,mmii,quadríceps,escadas","foto":""},
{"id":"bi05","nome":"Extensão de Joelhos Sentado","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Quadríceps","descricao":"Fortalecimento isolado do quadríceps sentado. Indicado para quem tem dificuldade de equilíbrio em pé.","execucao":"1. Sentado com costas apoiadas.\n2. Estique uma perna lentamente até posição horizontal.\n3. Mantenha 2s. Abaixe lentamente.","beneficios":"Fortalece quadríceps de forma segura. Ideal para alunos frágeis.","cuidados":"Não travar o joelho. Movimento lento.","material":"Cadeira firme. Opcional: caneleira.","obs":"Versão mais segura para reabilitação.","defaultSeries":"3","defaultReps":"10–15 cada","defaultDescanso":"45s","tags":"sarcopenia,mmii,quadríceps,reabilitação","foto":""},
{"id":"bi06","nome":"Abdução de Quadril em Pé","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Glúteo Médio e Abdutor","descricao":"Fortalece abdutores do quadril, essenciais para estabilidade lateral do joelho na marcha.","execucao":"1. Em pé com apoio.\n2. Abra a perna para o lado com joelho esticado.\n3. Mantenha o tronco ereto.\n4. Retorne lentamente.","beneficios":"Fortalece glúteo médio. Melhora estabilidade lateral na marcha.","cuidados":"Não inclinar o tronco para o lado. Progressão: caneleira.","material":"Cadeira ou parede","obs":"","defaultSeries":"3","defaultReps":"10–12 cada","defaultDescanso":"45s","tags":"mmii,glúteos,marcha,equilíbrio","foto":""},
{"id":"bi07","nome":"Agachamento Assistido","grupo":"MMII","nivel":"Intermediário","momento":"Parte Principal","foco":"Quadríceps, Glúteos e Core","descricao":"Agachamento com apoio leve. Trabalha os principais grupos musculares dos MMII de forma integrada.","execucao":"1. De frente para cadeira com apoio leve.\n2. Pés na largura dos ombros.\n3. Desça como se fosse sentar.\n4. Empurre o chão para subir.","beneficios":"Fortalece quadríceps, glúteos e core de forma integrada.","cuidados":"Joelhos alinhados com os pés. Sem dor aguda.","material":"Cadeira para apoio leve","obs":"Progressão: agachamento livre, adicionar peso.","defaultSeries":"3","defaultReps":"10","defaultDescanso":"60s","tags":"sarcopenia,mmii,funcional,quedas","foto":""},
{"id":"bi08","nome":"Ponte de Quadril","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Glúteos e Cadeia Posterior","descricao":"Fortalecimento dos glúteos em posição deitada. Seguro para alunos com dificuldade de equilíbrio.","execucao":"1. Deitado de costas, joelhos dobrados, pés no chão.\n2. Contraia abdome e glúteos.\n3. Eleve o quadril até linha reta joelhos-quadril-ombros.\n4. Mantenha 2–3s. Desça lentamente.","beneficios":"Fortalece glúteos. Melhora estabilidade lombar.","cuidados":"Não arquear a lombar. Manter contração abdominal.","material":"Tapete","obs":"Progressão: apoio unipodal. Indicado pós-AVC.","defaultSeries":"3","defaultReps":"10","defaultDescanso":"45s","tags":"sarcopenia,mmii,glúteos,lombar,avc","foto":""},
{"id":"bi09","nome":"Flexão de Parede","grupo":"MMSS","nivel":"Básico","momento":"Parte Principal","foco":"Peito, Tríceps e Ombros","descricao":"Alternativa segura à flexão de chão. Fortalece membros superiores para empurrar.","execucao":"1. De frente para a parede, distância de um braço.\n2. Mãos na parede na largura dos ombros.\n3. Dobre os cotovelos aproximando o peito da parede.\n4. Empurre para retornar.","beneficios":"Fortalece peito, tríceps e ombros. Progressiva e segura.","cuidados":"Manter o corpo alinhado. Amplitude confortável.","material":"Parede firme","obs":"Progressão: afastar os pés da parede.","defaultSeries":"3","defaultReps":"10–12","defaultDescanso":"60s","tags":"sarcopenia,mmss,peitoral,funcional","foto":""},
{"id":"bi10","nome":"Elevação Lateral dos Braços","grupo":"MMSS","nivel":"Básico","momento":"Parte Principal","foco":"Deltoides","descricao":"Fortalece os ombros para alcançar objetos em altura e manter postura ereta.","execucao":"1. Sentado ou em pé, peso leve nas mãos.\n2. Eleve os braços lateralmente até a altura dos ombros.\n3. Abaixe lentamente e controlado.","beneficios":"Fortalece deltoides. Melhora alcance e postura.","cuidados":"Não usar impulso. Movimento lento. Pesos leves.","material":"Halteres leves ou garrafas de água","obs":"","defaultSeries":"3","defaultReps":"10–12","defaultDescanso":"60s","tags":"sarcopenia,mmss,ombros,postura","foto":""},
{"id":"bi11","nome":"Rosca Direta","grupo":"MMSS","nivel":"Básico","momento":"Parte Principal","foco":"Bíceps","descricao":"Fortalece os bíceps para carregar objetos e realizar atividades funcionais.","execucao":"1. Sentado ou em pé, halteres com palmas para cima.\n2. Flexione o cotovelo levando o peso ao ombro.\n3. Desça lentamente.","beneficios":"Fortalece bíceps. Melhora capacidade de carregar objetos.","cuidados":"Cotovelos fixos ao lado do corpo. Não balançar o tronco.","material":"Halteres leves","obs":"","defaultSeries":"3","defaultReps":"12","defaultDescanso":"60s","tags":"sarcopenia,mmss,bíceps","foto":""},
{"id":"bi12","nome":"Remada com Elástico","grupo":"MMSS","nivel":"Básico","momento":"Parte Principal","foco":"Costas, Romboides e Bíceps","descricao":"Fortalece as costas e bíceps, contribuindo para postura ereta e prevenção da cifose.","execucao":"1. Elástico preso à frente na altura do peito.\n2. Puxe em direção ao abdome, cotovelos para trás.\n3. Aperte as escápulas. Retorne lentamente.","beneficios":"Fortalece romboides e trapézio médio. Melhora postura.","cuidados":"Não arquear a lombar. Movimento de puxar com as costas.","material":"Faixa elástica","obs":"Progressão: elástico mais forte.","defaultSeries":"3","defaultReps":"12","defaultDescanso":"60s","tags":"sarcopenia,mmss,costas,postura","foto":""},
{"id":"bi13","nome":"Tocar Joelho Oposto Sentado","grupo":"Core","nivel":"Básico","momento":"Parte Principal","foco":"Abdome e Oblíquos","descricao":"Fortalece core e oblíquos com coordenação cruzada entre braços e pernas.","execucao":"1. Na ponta da cadeira, coluna reta.\n2. Gire o tronco tocando cotovelo direito no joelho esquerdo.\n3. Retorne e repita para o lado oposto.","beneficios":"Fortalece abdome e oblíquos. Melhora coordenação cruzada.","cuidados":"Movimento lento. Não puxar o pescoço.","material":"Cadeira firme","obs":"","defaultSeries":"3","defaultReps":"10–12 cada","defaultDescanso":"30s","tags":"core,coordenação,abdome,oblíquos","foto":""},
{"id":"bi14","nome":"Contração Abdominal Bracing","grupo":"Core","nivel":"Básico","momento":"Parte Principal","foco":"Core Profundo","descricao":"Ativa o core profundo, fundamental para estabilidade da coluna e prevenção de dor lombar.","execucao":"1. Sentado ereto.\n2. Expire contraindo o abdome firmemente.\n3. Mantenha 5–10s respirando normalmente.\n4. Relaxe e repita.","beneficios":"Ativa transverso do abdome. Reduz dor lombar.","cuidados":"Não prender a respiração. Contração, não sucção.","material":"Qualquer superfície","obs":"Pode ser feito diariamente.","defaultSeries":"3","defaultReps":"10 × 5–10s","defaultDescanso":"20s","tags":"core,lombar,postura,estabilidade","foto":""},
{"id":"bi15","nome":"Extensão de Tronco na Cadeira","grupo":"Core","nivel":"Básico","momento":"Parte Principal","foco":"Extensores da Coluna","descricao":"Fortalece extensores da coluna, combatendo a cifose do envelhecimento.","execucao":"1. Na ponta da cadeira, braços cruzados.\n2. Incline o tronco levemente para frente.\n3. Retorne à posição ereta contraindo as costas.\n4. Mantenha 2s no topo.","beneficios":"Fortalece extensores. Melhora postura ereta. Combate cifose.","cuidados":"Não hiperextender. Movimento controlado.","material":"Cadeira firme","obs":"","defaultSeries":"3","defaultReps":"12","defaultDescanso":"30s","tags":"core,postura,coluna,extensores","foto":""},
{"id":"bi16","nome":"Pés Unidos Equilíbrio","grupo":"Equilíbrio","nivel":"Básico","momento":"Parte Principal","foco":"Sistema Vestibular e Propriocepção","descricao":"Base do treinamento de equilíbrio. Treina sistema vestibular e sensorimotor.","execucao":"1. Em pé com pés unidos, apoio por perto.\n2. Mantenha 30–60s com olhos abertos.\n3. Progressão: olhos fechados.\n4. Progressão 2: lançar e receber bola.","beneficios":"Treina sistema vestibular. Base para todos os exercícios de equilíbrio.","cuidados":"Apoio sempre por perto. Nunca fechar olhos sem supervisão.","material":"Espaço aberto com apoio","obs":"Progressão: olhos abertos → fechados → tarefa dual.","defaultSeries":"3","defaultReps":"30–60s","defaultDescanso":"30s","tags":"quedas,equilíbrio,vestibular,sppb","foto":""},
{"id":"bi17","nome":"Equilíbrio em Uma Perna","grupo":"Equilíbrio","nivel":"Básico","momento":"Parte Principal","foco":"Estabilidade do Tornozelo","descricao":"Um dos exercícios mais eficazes para prevenção de quedas. Fortalece estabilizadores do tornozelo.","execucao":"1. Em pé próximo a apoio.\n2. Levante uma perna dobrando o joelho.\n3. Mantenha 20–30s. Use apoio apenas se necessário.\n4. Troque de perna.","beneficios":"Melhora equilíbrio estático. Principal exercício de prevenção de quedas.","cuidados":"Olhar fixo a um ponto à frente. Progressão gradual.","material":"Cadeira ou parede","obs":"Progredir: com apoio → sem apoio → olhos fechados.","defaultSeries":"3","defaultReps":"20–30s cada","defaultDescanso":"30s","tags":"quedas,equilíbrio,tornozelo,sppb","foto":""},
{"id":"bi18","nome":"Caminhada Tandem","grupo":"Equilíbrio","nivel":"Intermediário","momento":"Parte Principal","foco":"Equilíbrio Dinâmico","descricao":"Caminhar calcanhar-ponta em linha reta. Melhora equilíbrio dinâmico e propriocepção.","execucao":"1. Próximo a uma parede.\n2. Coloque calcanhar de um pé à frente dos dedos do outro.\n3. Continue caminhando nesse padrão.\n4. 10–20 passos.","beneficios":"Melhora equilíbrio dinâmico na marcha.","cuidados":"Apoio disponível. Iniciar com passos curtos.","material":"Corredor livre","obs":"","defaultSeries":"3","defaultReps":"10–20 passos","defaultDescanso":"30s","tags":"quedas,equilíbrio,marcha,propriocepção","foto":""},
{"id":"bi19","nome":"Deslocamento de Tronco AP","grupo":"Equilíbrio","nivel":"Básico","momento":"Parte Principal","foco":"Equilíbrio Anteroposterior","descricao":"Treina a estratégia de tornozelo no controle anteroposterior do equilíbrio.","execucao":"1. Em pé com apoio.\n2. Desloque o tronco para frente (sem tirar calcanhares). Retorne.\n3. Desloque para trás (sem tirar os dedos). Retorne.","beneficios":"Treina estratégia de tornozelo. Componente do SPPB.","cuidados":"Oscilação controlada. Não dar passos para compensar.","material":"Cadeira ou parede","obs":"","defaultSeries":"2","defaultReps":"15 cada sentido","defaultDescanso":"30s","tags":"quedas,equilíbrio,sppb,anteroposterior","foto":""},
{"id":"bi20","nome":"Rotação de Tornozelos e Punhos","grupo":"Mobilidade","nivel":"Básico","momento":"Parte Inicial","foco":"Articulações Distais","descricao":"Lubrifica tornozelos e punhos. Reduz rigidez. Ideal para início de sessão.","execucao":"1. Sentado.\n2. Gire o tornozelo 10x em cada sentido. Repita com o outro pé.\n3. Estenda os braços e gire os punhos 10x em cada sentido.","beneficios":"Lubrifica articulações. Melhora circulação. Reduz rigidez matinal.","cuidados":"Movimento suave. Reduzir amplitude se sentir dor.","material":"Cadeira","obs":"Excelente para artrite.","defaultSeries":"2","defaultReps":"10 cada sentido","defaultDescanso":"10s","tags":"mobilidade,artrite,circulação,aquecimento","foto":""},
{"id":"bi21","nome":"Rotação de Quadril em Círculos","grupo":"Mobilidade","nivel":"Básico","momento":"Parte Inicial","foco":"Quadril e Lombar","descricao":"Melhora mobilidade do quadril e lombar. Reduz rigidez antes dos exercícios.","execucao":"1. Em pé com apoio.\n2. Mãos na cintura.\n3. Círculos lentos com o quadril.\n4. 10x em cada sentido.","beneficios":"Melhora mobilidade do quadril. Lubrifica articulação.","cuidados":"Movimento suave. Reduzir amplitude se sentir dor.","material":"Cadeira ou parede","obs":"","defaultSeries":"2","defaultReps":"10 cada sentido","defaultDescanso":"15s","tags":"mobilidade,quadril,lombar,aquecimento","foto":""},
{"id":"bi22","nome":"Marcha com Elevação de Joelhos","grupo":"Mobilidade","nivel":"Básico","momento":"Parte Inicial","foco":"Flexores do Quadril e Marcha","descricao":"Aquece flexores do quadril e ativa o padrão de marcha. Cardio leve de aquecimento.","execucao":"1. Em pé com apoio leve.\n2. Marche elevando os joelhos alternadamente.\n3. Coordene o movimento dos braços.\n4. 2–3 minutos contínuos.","beneficios":"Aquece a musculatura. Ativa flexores do quadril. Aumenta FC gradualmente.","cuidados":"Apoio disponível. Ritmo confortável.","material":"Cadeira ou parede","obs":"Principal exercício de aquecimento.","defaultSeries":"1","defaultReps":"2–3 min","defaultDescanso":"30s","tags":"aquecimento,marcha,cardio,mobilidade","foto":""},
{"id":"bi23","nome":"Rotação do Pescoço","grupo":"Mobilidade","nivel":"Básico","momento":"Parte Inicial","foco":"Coluna Cervical","descricao":"Alivia tensão no pescoço. Melhora amplitude de movimento da cabeça.","execucao":"1. Sentado, ombros relaxados.\n2. Gire lentamente para a direita (10–15s). Retorne.\n3. Gire para a esquerda.\n4. Incline a orelha ao ombro cada lado.","beneficios":"Alivia tensão cervical. Melhora amplitude de movimento.","cuidados":"Muito lento e suave. Parar se sentir tontura.","material":"Cadeira","obs":"Contraindicado em instabilidade cervical.","defaultSeries":"2","defaultReps":"10–15s cada posição","defaultDescanso":"10s","tags":"mobilidade,cervical,rigidez,aquecimento","foto":""},
{"id":"bi24","nome":"Alongamento da Panturrilha","grupo":"Alongamento","nivel":"Básico","momento":"Parte Final","foco":"Panturrilha e Tornozelo","descricao":"Previne cãibras. Melhora flexibilidade do tornozelo e qualidade da marcha.","execucao":"1. De frente para a parede, um passo para trás com uma perna.\n2. Calcanhar no chão, joelho esticado.\n3. Dobre o joelho da frente e incline até sentir o alongamento.\n4. 20–30s. Troque.","beneficios":"Previne cãibras. Melhora flexibilidade do tornozelo.","cuidados":"Suave, nunca doloroso. Calcanhar no chão.","material":"Parede","obs":"","defaultSeries":"2","defaultReps":"30s cada","defaultDescanso":"10s","tags":"alongamento,panturrilha,tornozelo,marcha","foto":""},
{"id":"bi25","nome":"Alongamento Lateral do Tronco","grupo":"Alongamento","nivel":"Básico","momento":"Parte Final","foco":"Tronco e Intercostais","descricao":"Aumenta flexibilidade da coluna lateral e intercostais.","execucao":"1. Na ponta da cadeira.\n2. Levante o braço direito e incline para o lado esquerdo.\n3. Mantenha o quadril fixo na cadeira.\n4. 15–20s. Repita para o outro lado.","beneficios":"Aumenta flexibilidade lateral da coluna.","cuidados":"Inclinação lateral pura, sem rotação.","material":"Cadeira firme","obs":"","defaultSeries":"2","defaultReps":"20s cada","defaultDescanso":"10s","tags":"alongamento,coluna,intercostais,postura","foto":""},
{"id":"bi26","nome":"Alongamento de Quadril e Glúteo","grupo":"Alongamento","nivel":"Básico","momento":"Parte Final","foco":"Quadril e Glúteos","descricao":"Alivia tensão lombar e ciática. Melhora mobilidade do quadril.","execucao":"1. Na ponta da cadeira.\n2. Cruze a perna (tornozelo sobre o joelho oposto).\n3. Incline o tronco para frente mantendo a coluna reta.\n4. 20–30s. Repita do outro lado.","beneficios":"Alivia tensão lombar e ciática. Melhora mobilidade do quadril.","cuidados":"Não forçar se sentir dor no joelho. Contraindicado em prótese de quadril sem liberação.","material":"Cadeira firme","obs":"Excelente para queixa de ciática.","defaultSeries":"2","defaultReps":"30s cada","defaultDescanso":"10s","tags":"alongamento,quadril,glúteos,ciática,lombar","foto":""},
{"id":"bi27","nome":"Alongamento de Isquiotibiais","grupo":"Alongamento","nivel":"Básico","momento":"Parte Final","foco":"Posterior da Coxa","descricao":"Melhora flexibilidade dos isquiotibiais. Reduz tensão lombar.","execucao":"1. Na ponta da cadeira.\n2. Estique uma perna à frente, calcanhar no chão.\n3. Passe toalha na sola do pé e puxe com coluna reta.\n4. 20–30s. Troque.","beneficios":"Melhora flexibilidade. Reduz tensão lombar.","cuidados":"Coluna reta. Não curvar as costas.","material":"Cadeira firme. Toalha ou elástico.","obs":"","defaultSeries":"2","defaultReps":"30s cada","defaultDescanso":"10s","tags":"alongamento,isquiotibiais,lombar,marcha","foto":""},
{"id":"bi28","nome":"Alongamento de Ombros com Toalha","grupo":"Alongamento","nivel":"Básico","momento":"Parte Final","foco":"Peito e Ombros","descricao":"Abre o peito e alonga os ombros. Combate a cifose postural do envelhecimento.","execucao":"1. Sentado ou em pé.\n2. Segure toalha com as duas mãos, mais afastadas que os ombros.\n3. Levante os braços acima da cabeça.\n4. Puxe a toalha para os lados sentindo o alongamento.\n5. 20–30s.","beneficios":"Melhora postura. Aumenta amplitude dos ombros.","cuidados":"Não forçar além do conforto.","material":"Toalha ou faixa elástica","obs":"","defaultSeries":"2","defaultReps":"30s","defaultDescanso":"10s","tags":"alongamento,ombros,peito,postura,cifose","foto":""},
{"id":"bi29","nome":"Caminhada com Variações","grupo":"Cardio","nivel":"Básico","momento":"Parte Principal","foco":"Resistência Cardiovascular e Marcha","descricao":"Cardio de baixo impacto com variações de marcha.","execucao":"1. Caminhada normal 2–3min.\n2. Variações: ponta dos pés, joelhos altos, passos largos, lateral (30s cada).\n3. Total 5–10 min.","beneficios":"Melhora resistência cardiovascular. Trabalha diferentes padrões de marcha.","cuidados":"Ambiente sem obstáculos. Apoio próximo.","material":"Corredor livre","obs":"","defaultSeries":"1","defaultReps":"5–10 min","defaultDescanso":"—","tags":"cardio,marcha,funcional,aeróbico","foto":""},
{"id":"bi30","nome":"Subida e Descida de Degrau","grupo":"Funcional","nivel":"Intermediário","momento":"Parte Principal","foco":"MMII e Equilíbrio Dinâmico","descricao":"Treina a tarefa funcional de subir escadas.","execucao":"1. Com apoio lateral disponível.\n2. Coloque e retire o pé no degrau alternadamente.\n3. Progrida para subir e descer completamente.\n4. 2 séries de 20.","beneficios":"Treina funcionalidade de escadas. Melhora equilíbrio dinâmico.","cuidados":"Apoio sempre disponível. Degrau estável.","material":"Degrau ou step. Apoio lateral.","obs":"","defaultSeries":"2","defaultReps":"20","defaultDescanso":"60s","tags":"funcional,escadas,mmii,equilíbrio","foto":""},
{"id":"bi31","nome":"Lançar e Pegar Bola","grupo":"Coordenação","nivel":"Intermediário","momento":"Parte Principal","foco":"Coordenação e Tarefa Dual","descricao":"Treina coordenação olho-mão e equilíbrio em tarefa dual.","execucao":"1. Em pé ou sentado, apoio disponível.\n2. Lance a bola para cima e pegue.\n3. Progressão: uma mão lança, a outra pega.\n4. 1–2 minutos.","beneficios":"Melhora coordenação. Treina atenção dividida.","cuidados":"Bola adequada ao nível. Apoio disponível.","material":"Bola de espuma ou borracha","obs":"","defaultSeries":"3","defaultReps":"1 min","defaultDescanso":"30s","tags":"coordenação,equilíbrio,tarefa dual,reação","foto":""},
{"id":"bi32","nome":"Passos Laterais","grupo":"Coordenação","nivel":"Intermediário","momento":"Parte Principal","foco":"Padrão Motor e Agilidade","descricao":"Treina coordenação lateral e agilidade para desviar de obstáculos.","execucao":"1. Em pé com apoio disponível.\n2. 3 passos para a direita, depois 3 para a esquerda.\n3. Progredir em velocidade.","beneficios":"Melhora agilidade lateral. Treina desvio de obstáculos.","cuidados":"Superfície antiderrapante. Iniciar lento.","material":"Espaço aberto","obs":"","defaultSeries":"3","defaultReps":"10 cada lado","defaultDescanso":"30s","tags":"coordenação,marcha,agilidade,lateral","foto":""},
{"id":"bi33","nome":"Respiração Diafragmática","grupo":"Respiração","nivel":"Básico","momento":"Parte Final","foco":"Relaxamento e Sistema Parassimpático","descricao":"Desaquecimento. Reduz FC e ativa o sistema parassimpático ao final da sessão.","execucao":"1. Sentado ou deitado.\n2. Uma mão no peito, outra no abdome.\n3. Inspire pelo nariz 3s expandindo o abdome.\n4. Expire pela boca 6s.\n5. Repita 3–5 min.","beneficios":"Ativa o parassimpático. Reduz FC e PA. Promove relaxamento.","cuidados":"Não forçar. Se sentir tontura, voltar ao ritmo normal.","material":"Cadeira ou tapete","obs":"Encerrar toda sessão com este exercício.","defaultSeries":"1","defaultReps":"3–5 min","defaultDescanso":"—","tags":"respiração,relaxamento,volta calma,desaquecimento","foto":""},
{"id":"pr01","nome":"Sentar/Levantar — Banco Alto Apoio","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Quadríceps e Glúteos","descricao":"Versão mais acessível. Banco alto e apoio nas mãos. Nível 1 da progressão Sentar/Levantar.","execucao":"1. Banco alto (acima do joelho).\n2. Apoie as mãos nos braços da cadeira.\n3. Levante usando as mãos como suporte.\n4. Sente lentamente.","beneficios":"Iniciação segura ao padrão de agachar.","cuidados":"Banco estável e sem deslizar.","material":"Banco ou cadeira alta. Apoio firme.","obs":"Nível 1 — Sentar/Levantar.","defaultSeries":"3","defaultReps":"8–10","defaultDescanso":"60s","tags":"mmii,agachar,nível1","foto":""},
{"id":"pr02","nome":"Sentar/Levantar — Banco Alto Livre","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Quadríceps e Glúteos","descricao":"Banco alto sem usar as mãos. Primeiro nível de independência funcional.","execucao":"1. Banco alto.\n2. Levante e sente sem usar as mãos (braços cruzados).\n3. Movimento controlado.","beneficios":"Independência funcional. Menor demanda de amplitude.","cuidados":"Banco estável.","material":"Banco ou cadeira alta.","obs":"Nível 2 — Sentar/Levantar.","defaultSeries":"3","defaultReps":"10","defaultDescanso":"60s","tags":"mmii,agachar,nível2","foto":""},
{"id":"pr03","nome":"Agachamento Mini","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Quadríceps e Glúteos","descricao":"Agachamento com amplitude reduzida (20–30°). Para iniciantes ou com restrição articular.","execucao":"1. Pés na largura dos ombros, apoio leve.\n2. Flexione os joelhos apenas 20–30°.\n3. Retorne à posição ereta.","beneficios":"Introduz o padrão de agachar com segurança.","cuidados":"Joelhos na direção dos dedos dos pés.","material":"Cadeira para apoio.","obs":"Nível 1 — Agachamento.","defaultSeries":"3","defaultReps":"10–12","defaultDescanso":"60s","tags":"mmii,agachar,nível1","foto":""},
{"id":"pr04","nome":"Agachamento Parcial","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Quadríceps, Glúteos e Core","descricao":"Agachamento com amplitude de 45–60°. Passo intermediário entre mini e completo.","execucao":"1. Pés na largura dos ombros.\n2. Flexione os joelhos até 45–60°, quadril vai para trás.\n3. Empurre o chão para retornar.","beneficios":"Amplitude progressiva. Maior ativação de glúteos.","cuidados":"Coluna neutra.","material":"Apoio leve opcional.","obs":"Nível 2 — Agachamento.","defaultSeries":"3","defaultReps":"10","defaultDescanso":"60s","tags":"mmii,agachar,nível2","foto":""},
{"id":"pr05","nome":"Goblet Squat","grupo":"MMII","nivel":"Intermediário","momento":"Parte Principal","foco":"Quadríceps, Glúteos, Core e Mobilidade de Quadril","descricao":"Agachamento com peso na frente do peito. O contrapeso facilita postura ereta e profundidade.","execucao":"1. Segure halter com as duas mãos na frente do peito.\n2. Pés afastados e levemente abertos.\n3. Agache profundamente mantendo o tronco ereto.\n4. Empurre o chão para subir.","beneficios":"Melhora profundidade do agachamento e mobilidade de quadril.","cuidados":"Calcanhares no chão. Peso adequado.","material":"Halter ou garrafa pesada.","obs":"Nível 4 — Agachamento e Box Squat.","defaultSeries":"3","defaultReps":"8–10","defaultDescanso":"60s","tags":"mmii,agachar,glúteos,core,nível4","foto":""},
{"id":"pr06","nome":"Box Squat — Banco Alto","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Quadríceps e Glúteos","descricao":"Agachamento com banco alto como alvo. Ensina o padrão motor correto com segurança.","execucao":"1. Banco alto atrás de você.\n2. Agache até tocar o banco com os glúteos (sem sentar com peso).\n3. Pause 1s. Empurre o chão para subir.","beneficios":"Ensina o padrão de agachar com referência física.","cuidados":"Apenas tocar o banco. Tronco controlado.","material":"Banco ou caixa estável.","obs":"Nível 1 — Box Squat.","defaultSeries":"3","defaultReps":"10","defaultDescanso":"60s","tags":"mmii,agachar,nível1","foto":""},
{"id":"pr07","nome":"Afundo Isométrico","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Quadríceps, Glúteos e Equilíbrio","descricao":"Posição de afundo mantida estaticamente. Desenvolve força antes do movimento dinâmico.","execucao":"1. Passo largo à frente.\n2. Abaixe o joelho de trás sem tocar o chão.\n3. Ambos os joelhos a 90°.\n4. Mantenha 20–30s. Alterne.","beneficios":"Desenvolve força isométrica de quadríceps e glúteos.","cuidados":"Joelho dianteiro alinhado. Tronco ereto.","material":"Apoio opcional.","obs":"Nível 1 — Afundo.","defaultSeries":"3","defaultReps":"20–30s cada","defaultDescanso":"45s","tags":"mmii,afundo,isométrico,nível1","foto":""},
{"id":"pr08","nome":"Afundo Assistido","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Quadríceps, Glúteos e Equilíbrio","descricao":"Afundo dinâmico com apoio nas mãos. Primeiro passo para o afundo livre.","execucao":"1. Segure cadeira ou barra com as mãos.\n2. Passo à frente, desça o joelho de trás.\n3. Suba retornando à posição inicial. Alterne.","beneficios":"Desenvolve força funcional com segurança.","cuidados":"Apoio apenas para equilíbrio.","material":"Cadeira ou barra.","obs":"Nível 2 — Afundo.","defaultSeries":"3","defaultReps":"8 cada","defaultDescanso":"60s","tags":"mmii,afundo,nível2","foto":""},
{"id":"pr09","nome":"Afundo Tradicional","grupo":"MMII","nivel":"Intermediário","momento":"Parte Principal","foco":"Quadríceps, Glúteos e Core","descricao":"Afundo livre sem apoio. Alta demanda funcional para MMII.","execucao":"1. Em pé sem apoio.\n2. Passo largo à frente.\n3. Desça o joelho de trás.\n4. Empurre para retornar.","beneficios":"Forte ativação de quadríceps, glúteos e estabilizadores.","cuidados":"Núcleo contraído. Joelho dianteiro alinhado.","material":"Espaço livre.","obs":"Nível 3 — Afundo.","defaultSeries":"3","defaultReps":"8–10 cada","defaultDescanso":"60s","tags":"mmii,afundo,nível3","foto":""},
{"id":"pr10","nome":"Afundo Caminhando","grupo":"MMII","nivel":"Intermediário","momento":"Parte Principal","foco":"Quadríceps, Glúteos e Equilíbrio Dinâmico","descricao":"Afundo com deslocamento para frente. Maior demanda de equilíbrio e coordenação.","execucao":"1. Em vez de retornar, dê o próximo passo com o pé de trás.\n2. Continue caminhando nesse padrão.\n3. 8–10 passos.","beneficios":"Integra força, equilíbrio e coordenação de marcha.","cuidados":"Espaço livre. Controlar o joelho sobre o pé.","material":"Corredor livre.","obs":"Nível 4 — Afundo.","defaultSeries":"3","defaultReps":"8–10 passos","defaultDescanso":"60s","tags":"mmii,afundo,nível4","foto":""},
{"id":"pr11","nome":"Afundo Búlgaro","grupo":"MMII","nivel":"Avançado","momento":"Parte Principal","foco":"Quadríceps, Glúteos e Equilíbrio Unilateral","descricao":"Afundo com pé traseiro elevado. Máxima demanda unilateral.","execucao":"1. Pé de trás apoiado em banco.\n2. Pé da frente bem avançado.\n3. Desça controladamente.\n4. Empurre com o pé da frente para subir.","beneficios":"Máxima ativação unilateral de quadríceps e glúteos.","cuidados":"Controle avançado necessário. Apoio disponível inicialmente.","material":"Banco firme.","obs":"Nível 5 — Afundo e Split Squat.","defaultSeries":"3","defaultReps":"6–8 cada","defaultDescanso":"90s","tags":"mmii,afundo,avançado,nível5","foto":""},
{"id":"pr12","nome":"Step-Up Baixo com Apoio","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Quadríceps, Glúteos e Equilíbrio","descricao":"Subir degrau baixo com apoio lateral. Treina escadas com segurança.","execucao":"1. Step baixo com apoio lateral.\n2. Coloque um pé no degrau.\n3. Empurre para subir.\n4. Desça controladamente.","beneficios":"Treina o padrão funcional de escadas.","cuidados":"Apoio sempre disponível. Controlar a descida.","material":"Step ou degrau. Apoio lateral.","obs":"Nível 1 — Step-up.","defaultSeries":"2","defaultReps":"10 cada","defaultDescanso":"45s","tags":"mmii,step,escadas,nível1","foto":""},
{"id":"pr13","nome":"Step-Up Baixo Livre","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Quadríceps, Glúteos e Equilíbrio","descricao":"Step-up baixo sem apoio das mãos. Maior demanda de equilíbrio.","execucao":"1. Step baixo sem usar as mãos.\n2. Suba com o pé direito empurrando com a perna direita.\n3. Traga o pé esquerdo.\n4. Desça com controle.","beneficios":"Independência funcional para subir escadas.","cuidados":"Apoio disponível mas não utilizado.","material":"Step ou degrau.","obs":"Nível 2 — Step-up.","defaultSeries":"3","defaultReps":"8–10 cada","defaultDescanso":"45s","tags":"mmii,step,escadas,nível2","foto":""},
{"id":"pr14","nome":"Step-Down Controlado","grupo":"MMII","nivel":"Intermediário","momento":"Parte Principal","foco":"Controle Excêntrico de Quadríceps","descricao":"Descida lenta de degrau. Treina o controle excêntrico para descer escadas com segurança.","execucao":"1. Em pé no degrau, apoio disponível.\n2. Em uma perna, abaixe o outro pé lentamente (4–5s).\n3. Toque levemente o chão e retorne.","beneficios":"Fortalece controle excêntrico. Essencial para segurança em escadas.","cuidados":"Muito lento. Joelho alinhado. Apoio disponível.","material":"Degrau. Apoio lateral.","obs":"Fundamental para prevenção de quedas em escadas.","defaultSeries":"3","defaultReps":"6–8 cada","defaultDescanso":"60s","tags":"mmii,step,escadas,excêntrico,nível2","foto":""},
{"id":"pr15","nome":"Agachamento Lateral","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Adutores, Abdutores e Quadríceps","descricao":"Peso transferido para um lado enquanto a outra perna fica estendida.","execucao":"1. Pés bem afastados, dedos levemente para fora.\n2. Desça transferindo o peso para o lado direito, perna esquerda estendida.\n3. Retorne ao centro e repita para o outro lado.","beneficios":"Fortalece adutores, abdutores e quadríceps.","cuidados":"Pé do lado que agacha totalmente no chão. Joelho alinhado.","material":"Apoio leve opcional.","obs":"Nível 1–2 — Agachamento Lateral.","defaultSeries":"3","defaultReps":"8 cada","defaultDescanso":"60s","tags":"mmii,agachar,lateral,adutores,nível2","foto":""},
{"id":"pr16","nome":"Cossack Squat","grupo":"MMII","nivel":"Avançado","momento":"Parte Principal","foco":"Adutores, Mobilidade de Quadril e Tornozelo","descricao":"Agachamento lateral profundo com amplitude máxima.","execucao":"1. Pés muito afastados, dedos para fora.\n2. Desça profundamente para um lado, outra perna totalmente estendida.\n3. 5 cada lado.","beneficios":"Máxima amplitude de adutores e mobilidade de quadril.","cuidados":"Progressão gradual. Não forçar amplitude.","material":"Apoio opcional.","obs":"Nível 5 — Agachamento Lateral.","defaultSeries":"3","defaultReps":"5 cada","defaultDescanso":"60s","tags":"mmii,cossack,mobilidade,avançado,nível5","foto":""},
{"id":"pr17","nome":"Agachamento Sumô","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Adutores, Glúteos e Quadríceps","descricao":"Pés muito afastados, dedos para fora. Maior ênfase em adutores e glúteos.","execucao":"1. Pés bem afastados (45–60° para fora).\n2. Desça com os joelhos na direção dos dedos.\n3. Quadril entre as pernas.\n4. Empurre para subir.","beneficios":"Ativa mais adutores e glúteos. Boa opção para rigidez de quadril.","cuidados":"Joelhos na direção dos dedos. Não colapsar para dentro.","material":"Apoio leve opcional.","obs":"Nível 1–3 — Agachamento Sumô.","defaultSeries":"3","defaultReps":"10–12","defaultDescanso":"60s","tags":"mmii,sumô,adutores,glúteos,nível1","foto":""},
{"id":"pr18","nome":"Split Squat Apoiado","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Quadríceps, Glúteos e Equilíbrio","descricao":"Agachamento com pernas divididas e apoio bilateral. Base para o afundo.","execucao":"1. Apoio bilateral nas cadeiras dos dois lados.\n2. Uma perna à frente, outra atrás.\n3. Desça o joelho de trás e suba. Pés fixos.","beneficios":"Trabalha unilateralmente com segurança máxima.","cuidados":"Pés fixos. Apoio apenas para equilíbrio.","material":"Cadeiras laterais.","obs":"Nível 1 — Split Squat.","defaultSeries":"3","defaultReps":"8–10 cada","defaultDescanso":"60s","tags":"mmii,split,unilateral,nível1","foto":""},
{"id":"pr19","nome":"Sentar e Levantar Rápido","grupo":"MMII","nivel":"Intermediário","momento":"Parte Principal","foco":"Potência de MMII","descricao":"Versão em velocidade do sentar/levantar. Treina potência e mede capacidade funcional (5STS).","execucao":"1. Cadeira padrão, sem usar as mãos.\n2. Levante o mais rápido possível.\n3. Sente controladamente.\n4. Cronometrar 5 repetições.","beneficios":"Desenvolve potência de MMII. Métrica do teste 5STS.","cuidados":"Subida rápida, descida sempre controlada.","material":"Cadeira firme.","obs":"Usar cronômetro para monitorar evolução.","defaultSeries":"3","defaultReps":"5 rápidas","defaultDescanso":"90s","tags":"mmii,potência,funcional,nível3","foto":""},
{"id":"pr20","nome":"Front Squat com Bastão","grupo":"MMII","nivel":"Avançado","momento":"Parte Principal","foco":"Quadríceps, Core e Postura","descricao":"Agachamento com carga na frente. Exige postura ereta e mobilidade avançada.","execucao":"1. Bastão nos ombros, cotovelos para frente.\n2. Pés na largura dos ombros.\n3. Agache com tronco mais vertical que o convencional.","beneficios":"Máxima ativação de quadríceps. Exige core forte.","cuidados":"Requer mobilidade de tornozelo e quadril.","material":"Bastão ou halteres.","obs":"Nível 5 — Agachamento.","defaultSeries":"3","defaultReps":"6–8","defaultDescanso":"90s","tags":"mmii,front squat,avançado,nível5","foto":""},
{"id":"pr21","nome":"Ponte de Quadril com Pausa","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Glúteos e Core","descricao":"Ponte com pausa no topo para maior ativação dos glúteos.","execucao":"1. Deitado, joelhos dobrados.\n2. Eleve o quadril.\n3. Mantenha 2–3s no topo.\n4. Desça lentamente.","beneficios":"Maior ativação dos glúteos pela pausa isométrica.","cuidados":"Não hiperextender a lombar.","material":"Tapete.","obs":"Nível 2 — Ponte.","defaultSeries":"3","defaultReps":"10–12","defaultDescanso":"45s","tags":"mmii,hinge,glúteos,nível2","foto":""},
{"id":"pr22","nome":"Ponte com Elástico","grupo":"MMII","nivel":"Intermediário","momento":"Parte Principal","foco":"Glúteos, Abdutores e Core","descricao":"Ponte com elástico acima dos joelhos, ativando glúteo médio e abdutores.","execucao":"1. Elástico acima dos joelhos.\n2. Execute a ponte empurrando os joelhos para fora.\n3. Joelhos alinhados com os pés.","beneficios":"Ativa glúteo médio além do glúteo máximo.","cuidados":"Manter alinhamento dos joelhos.","material":"Faixa elástica. Tapete.","obs":"Nível 3 — Ponte.","defaultSeries":"3","defaultReps":"10–12","defaultDescanso":"45s","tags":"mmii,hinge,glúteos,abdutores,nível3","foto":""},
{"id":"pr23","nome":"Hinge de Parede","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Padrão Hinge e Extensores do Quadril","descricao":"Aprendizado do padrão hinge usando a parede como feedback.","execucao":"1. A 30–40cm da parede.\n2. Empurre o quadril para trás até tocar a parede.\n3. Costas retas, joelhos levemente flexionados.\n4. Contraia os glúteos para retornar.","beneficios":"Ensina o hinge com feedback da parede.","cuidados":"Não curvar as costas.","material":"Parede.","obs":"Nível 1 — Hinge.","defaultSeries":"3","defaultReps":"10","defaultDescanso":"45s","tags":"mmii,hinge,padrão motor,nível1","foto":""},
{"id":"pr24","nome":"Terra Romeno com Bastão","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Isquiotibiais, Glúteos e Postura","descricao":"Terra romeno com bastão nas costas para garantir alinhamento correto.","execucao":"1. Bastão verticalmente nas costas (3 pontos de contato).\n2. Incline o tronco em hinge mantendo os pontos de contato.\n3. Desça até sentir o alongamento nos isquiotibiais.\n4. Retorne contraindo os glúteos.","beneficios":"Ensina a manter coluna neutra no hinge.","cuidados":"Manter os 3 pontos de contato do bastão.","material":"Bastão ou cabo de vassoura.","obs":"Nível 1 — Terra Romeno.","defaultSeries":"3","defaultReps":"10","defaultDescanso":"45s","tags":"mmii,hinge,isquiotibiais,nível1","foto":""},
{"id":"pr25","nome":"Terra Romeno com Halter","grupo":"MMII","nivel":"Intermediário","momento":"Parte Principal","foco":"Isquiotibiais, Glúteos e Cadeia Posterior","descricao":"Terra romeno com halteres. Principal exercício de cadeia posterior.","execucao":"1. Halteres na frente das coxas.\n2. Empurre o quadril para trás inclinando o tronco.\n3. Desça até sentir o alongamento nos isquiotibiais.\n4. Contraia glúteos para retornar.","beneficios":"Fortalece isquiotibiais e glúteos. Previne dor lombar.","cuidados":"Coluna neutra durante todo o movimento.","material":"Halteres.","obs":"Nível 2–3 — Terra Romeno.","defaultSeries":"3","defaultReps":"8–10","defaultDescanso":"60s","tags":"mmii,hinge,isquiotibiais,glúteos,nível3","foto":""},
{"id":"pr26","nome":"Hip Thrust Bilateral","grupo":"MMII","nivel":"Intermediário","momento":"Parte Principal","foco":"Glúteo Máximo e Cadeia Posterior","descricao":"Extensão de quadril com ombros no banco. Principal exercício de glúteo máximo.","execucao":"1. Escápulas no banco, pés no chão.\n2. Eleve o quadril até o tronco ficar paralelo ao chão.\n3. Contraia os glúteos 1–2s no topo.\n4. Desça lentamente.","beneficios":"Máxima ativação do glúteo máximo. Melhora potência de marcha.","cuidados":"Não hiperextender a lombar. Banco estável.","material":"Banco firme.","obs":"Nível 1 — Hip Thrust.","defaultSeries":"3","defaultReps":"10–12","defaultDescanso":"60s","tags":"mmii,hinge,glúteos,hip thrust,nível1","foto":""},
{"id":"pr27","nome":"Terra Sumô","grupo":"MMII","nivel":"Intermediário","momento":"Parte Principal","foco":"Glúteos, Adutores e Cadeia Posterior","descricao":"Terra com pés muito afastados. Maior ênfase em glúteos e adutores.","execucao":"1. Pés bem afastados (45–60° para fora), halter entre as pernas.\n2. Hinge inclinando o tronco, segure o peso.\n3. Levante estendendo quadril e joelhos.","beneficios":"Maior ativação de glúteos e adutores.","cuidados":"Coluna neutra.","material":"Halter ou kettlebell.","obs":"Nível 1–3 — Terra Sumô.","defaultSeries":"3","defaultReps":"8–10","defaultDescanso":"60s","tags":"mmii,hinge,terra sumô,glúteos,nível2","foto":""},
{"id":"pr28","nome":"Pull Through com Elástico","grupo":"MMII","nivel":"Intermediário","momento":"Parte Principal","foco":"Glúteos, Isquiotibiais e Hinge","descricao":"Extensão de quadril puxando elástico entre as pernas. Ensina o hinge com resistência.","execucao":"1. Elástico preso atrás e baixo.\n2. De costas ao ponto de fixação, passe o elástico entre as pernas.\n3. Incline em hinge, depois estenda o quadril para frente.","beneficios":"Forte ativação de glúteos e isquiotibiais.","cuidados":"Movimento vem do quadril, não da lombar.","material":"Elástico preso próximo ao chão.","obs":"Nível 1–2 — Pull Through.","defaultSeries":"3","defaultReps":"12","defaultDescanso":"60s","tags":"mmii,hinge,pull through,glúteos,nível2","foto":""},
{"id":"pr29","nome":"Swing com Kettlebell","grupo":"MMII","nivel":"Intermediário","momento":"Parte Principal","foco":"Glúteos, Isquiotibiais e Potência de Quadril","descricao":"Movimento pendular com kettlebell. Ensina o hinge cíclico e tem componente cardiorrespiratório.","execucao":"1. Kettlebell leve entre as pernas.\n2. Incline em hinge, kettlebell balança para trás.\n3. Estenda o quadril fazendo o kettlebell ir até a altura dos quadris.\n4. Movimento contínuo.","beneficios":"Treina potência de quadril. Alta ativação de glúteos e isquiotibiais.","cuidados":"Aprender o hinge antes. A força vem do quadril, não dos braços.","material":"Kettlebell leve.","obs":"Nível 1–2 — Swing.","defaultSeries":"3","defaultReps":"10","defaultDescanso":"60s","tags":"mmii,hinge,swing,kettlebell,potência,nível2","foto":""},
{"id":"pr30","nome":"Good Morning com Bastão","grupo":"MMII","nivel":"Básico","momento":"Parte Principal","foco":"Isquiotibiais, Glúteos e Postura","descricao":"Inclinação do tronco com bastão nas costas. Reforça o hinge com foco em postura.","execucao":"1. Bastão atrás da cabeça.\n2. Pés na largura dos quadris, joelhos levemente flexionados.\n3. Incline para frente em hinge.\n4. Contraia glúteos e isquiotibiais para retornar.","beneficios":"Fortalece isquiotibiais e glúteos. Ensina dissociação do quadril.","cuidados":"Coluna neutra. Não arredondar.","material":"Bastão.","obs":"Nível 1 — Good Morning.","defaultSeries":"3","defaultReps":"10","defaultDescanso":"45s","tags":"mmii,hinge,isquiotibiais,postura,nível1","foto":""},
{"id":"pr31","nome":"Extensão Lombar no Banco","grupo":"Core","nivel":"Básico","momento":"Parte Principal","foco":"Extensores da Coluna e Glúteos","descricao":"Extensão da coluna em banco. Fortalece extensores lombares e glúteos.","execucao":"1. Quadris apoiados no banco, pés fixos.\n2. Incline o tronco para frente.\n3. Contraia extensores e glúteos para retornar.\n4. Mantenha 1–2s no topo.","beneficios":"Fortalece extensores lombares. Melhora postura.","cuidados":"Não hiperextender. Iniciar sem carga.","material":"Banco romano ou cadeira de extensão.","obs":"Nível 1–2 — Extensão Lombar.","defaultSeries":"3","defaultReps":"10–12","defaultDescanso":"60s","tags":"core,hinge,lombar,extensores,nível1","foto":""},
{"id":"pr32","nome":"Terra Unilateral Assistido","grupo":"MMII","nivel":"Intermediário","momento":"Parte Principal","foco":"Isquiotibiais, Glúteos e Equilíbrio","descricao":"Terra romeno em uma perna com apoio leve. Combina hinge com equilíbrio unilateral.","execucao":"1. Em pé em uma perna, apoio leve.\n2. Incline em hinge estendendo a perna livre para trás.\n3. Desça até sentir o alongamento.\n4. Retorne contraindo o glúteo.","beneficios":"Fortalece isquiotibiais e glúteos unilateralmente. Melhora equilíbrio.","cuidados":"Coluna neutra. Quadril nivelado.","material":"Cadeira ou parede para apoio.","obs":"Nível 4 — Terra Unilateral.","defaultSeries":"3","defaultReps":"8 cada","defaultDescanso":"60s","tags":"mmii,hinge,terra unilateral,equilíbrio,nível4","foto":""},
{"id":"pr33","nome":"Chest Press com Elástico","grupo":"MMSS","nivel":"Básico","momento":"Parte Principal","foco":"Peitoral, Tríceps e Ombros","descricao":"Press de peito com elástico. Alternativa segura ao supino.","execucao":"1. Elástico preso atrás na altura do peito.\n2. Empurre os braços para frente até quase estender os cotovelos.\n3. Retorne controladamente.","beneficios":"Treina o padrão de empurrar horizontal de forma segura.","cuidados":"Elástico preso firmemente. Core ativo.","material":"Faixa elástica.","obs":"Nível 1–2 — Chest Press.","defaultSeries":"3","defaultReps":"12–15","defaultDescanso":"60s","tags":"mmss,empurrar,peitoral,elástico,nível1","foto":""},
{"id":"pr34","nome":"Supino com Halteres","grupo":"MMSS","nivel":"Básico","momento":"Parte Principal","foco":"Peitoral, Tríceps e Deltoides Anterior","descricao":"Supino deitado com halteres leves. Desenvolve força de empurrar.","execucao":"1. Deitado, halteres na altura do peito, cotovelos a 90°.\n2. Empurre para cima até estender os braços.\n3. Desça controladamente.","beneficios":"Fortalece peitoral, tríceps e deltoides anterior.","cuidados":"Não travar cotovelos. Pés apoiados.","material":"Halteres leves. Banco ou colchonete.","obs":"Nível 2 — Supino.","defaultSeries":"3","defaultReps":"10–12","defaultDescanso":"60s","tags":"mmss,empurrar,peitoral,tríceps,nível2","foto":""},
{"id":"pr35","nome":"Desenvolvimento Sentado","grupo":"MMSS","nivel":"Básico","momento":"Parte Principal","foco":"Deltoides e Tríceps","descricao":"Press de ombros sentado com halteres. Fortalece deltoides para alcançar em altura.","execucao":"1. Sentado, costas apoiadas, halteres na altura dos ombros.\n2. Empurre para cima até quase estender os braços.\n3. Desça controladamente.","beneficios":"Fortalece deltoides e tríceps. Melhora alcance em altura.","cuidados":"Não travar cotovelos. Costas no encosto.","material":"Halteres leves. Cadeira com encosto.","obs":"Nível 1 — Desenvolvimento.","defaultSeries":"3","defaultReps":"10–12","defaultDescanso":"60s","tags":"mmss,empurrar,ombros,tríceps,nível1","foto":""},
{"id":"pr36","nome":"Arnold Press","grupo":"MMSS","nivel":"Intermediário","momento":"Parte Principal","foco":"Deltoides 3 porções e Manguito Rotador","descricao":"Press com rotação de palmas. Trabalha as 3 porções do deltoides.","execucao":"1. Halteres à frente do rosto, palmas para você.\n2. Ao subir, gire os braços (palmas para frente) e empurre.\n3. Desça revertendo o movimento.","beneficios":"Ativa as 3 porções do deltoides. Fortalece o manguito.","cuidados":"Amplitude de rotação confortável. Pesos leves inicialmente.","material":"Halteres leves.","obs":"Nível 1–2 — Arnold Press.","defaultSeries":"3","defaultReps":"10","defaultDescanso":"60s","tags":"mmss,empurrar,ombros,deltoides,manguito,nível2","foto":""},
{"id":"pr37","nome":"Press Elástico","grupo":"MMSS","nivel":"Básico","momento":"Parte Principal","foco":"Peitoral, Ombros e Tríceps","descricao":"Empurrar com elástico. Resistência progressiva, seguro e adaptável.","execucao":"1. Elástico preso atrás, mãos na altura do peito.\n2. Empurre para frente até estender os braços.\n3. Retorne controladamente.","beneficios":"Fortalece o padrão de empurrar de forma segura.","cuidados":"Core ativo. Cotovelos na altura dos ombros.","material":"Faixa elástica.","obs":"Nível 1 — Press Elástico.","defaultSeries":"3","defaultReps":"12–15","defaultDescanso":"60s","tags":"mmss,empurrar,elástico,nível1","foto":""},
{"id":"pr38","nome":"Crucifixo com Halteres","grupo":"MMSS","nivel":"Básico","momento":"Parte Principal","foco":"Peitoral e Deltoides Anterior","descricao":"Abertura com halteres. Trabalha peitoral em amplitude e melhora postura.","execucao":"1. Deitado, halteres com braços estendidos acima do peito.\n2. Abra os braços em arco até a altura do peito.\n3. Retorne contraindo o peitoral.","beneficios":"Trabalha peitoral em amplitude. Melhora abertura do tórax.","cuidados":"Cotovelos levemente dobrados.","material":"Halteres leves.","obs":"Nível 1–2 — Crucifixo.","defaultSeries":"3","defaultReps":"10–12","defaultDescanso":"60s","tags":"mmss,empurrar,peitoral,postura,nível1","foto":""},
{"id":"pr39","nome":"Flexão no Banco Médio","grupo":"MMSS","nivel":"Básico","momento":"Parte Principal","foco":"Peitoral, Tríceps e Core","descricao":"Flexão com mãos em banco na altura do quadril. Entre a flexão de parede e o chão.","execucao":"1. Mãos em banco firme na altura do quadril.\n2. Corpo em linha reta.\n3. Dobre os cotovelos descendo o peito ao banco.\n4. Empurre para voltar.","beneficios":"Progressão entre flexão de parede e chão.","cuidados":"Corpo alinhado. Banco completamente estável.","material":"Banco firme ou mesa resistente.","obs":"Nível 3 — Flexão.","defaultSeries":"3","defaultReps":"8–10","defaultDescanso":"60s","tags":"mmss,empurrar,flexão,peitoral,nível3","foto":""},
{"id":"pr40","nome":"Flexão Tradicional","grupo":"MMSS","nivel":"Avançado","momento":"Parte Principal","foco":"Peitoral, Tríceps, Deltoides e Core","descricao":"Flexão clássica no chão. Exercício de empurrar completo.","execucao":"1. Mãos no chão na largura dos ombros, corpo em linha reta.\n2. Desça o peito ao chão.\n3. Empurre de volta.","beneficios":"Alta ativação de peitoral, tríceps e core.","cuidados":"Corpo completamente alinhado.","material":"Tapete.","obs":"Nível 5 — Flexão.","defaultSeries":"3","defaultReps":"8–12","defaultDescanso":"60s","tags":"mmss,empurrar,flexão,avançado,nível5","foto":""},
{"id":"pr41","nome":"Landmine Press Bilateral","grupo":"MMSS","nivel":"Intermediário","momento":"Parte Principal","foco":"Peitoral, Ombros e Core","descricao":"Press em ângulo oblíquo com halter. Mais seguro para ombros com restrições.","execucao":"1. Segure halter com as duas mãos na altura do peito.\n2. Empurre em diagonal para cima (45°).\n3. Retorne controladamente.","beneficios":"Ângulo oblíquo mais seguro para ombros.","cuidados":"Ângulo de empurrar diagonal.","material":"Halter ou elástico.","obs":"Nível 1 — Landmine Press.","defaultSeries":"3","defaultReps":"10–12","defaultDescanso":"60s","tags":"mmss,empurrar,landmine,ombros,nível1","foto":""},
{"id":"pr42","nome":"Remada Elástico Média","grupo":"MMSS","nivel":"Intermediário","momento":"Parte Principal","foco":"Costas, Romboides e Bíceps","descricao":"Remada com elástico de resistência média. Progressão natural da remada leve.","execucao":"1. Elástico na altura do peito.\n2. Puxe em direção ao abdome, cotovelos para trás.\n3. Aperte as escápulas. Retorne controladamente.","beneficios":"Maior ativação com resistência progressiva.","cuidados":"Não usar o tronco para puxar.","material":"Faixa elástica média.","obs":"Nível 2 — Remada Elástico.","defaultSeries":"3","defaultReps":"12","defaultDescanso":"60s","tags":"mmss,puxar,costas,romboides,nível2","foto":""},
{"id":"pr43","nome":"Face Pull com Elástico","grupo":"MMSS","nivel":"Básico","momento":"Parte Principal","foco":"Deltoides Posterior e Manguito Rotador","descricao":"Puxada em direção ao rosto. Essencial para saúde do ombro e correção postural.","execucao":"1. Elástico na altura dos olhos.\n2. Puxe em direção ao rosto, cotovelos para os lados.\n3. Aperte as escápulas e rotacione os ombros para trás.\n4. Retorne lentamente.","beneficios":"Fortalece deltoides posterior. Fundamental para saúde do ombro.","cuidados":"Puxar em direção ao nariz. Cotovelos acima dos ombros.","material":"Faixa elástica.","obs":"Incluir em todos os treinos de MMSS.","defaultSeries":"3","defaultReps":"15","defaultDescanso":"45s","tags":"mmss,puxar,ombros,manguito,postura,nível1","foto":""},
{"id":"pr44","nome":"Pull Apart com Elástico","grupo":"MMSS","nivel":"Básico","momento":"Parte Principal","foco":"Deltoides Posterior e Romboides","descricao":"Puxar o elástico para os lados. Corrige postura arredondada dos ombros.","execucao":"1. Segure o elástico horizontalmente com braços estendidos.\n2. Puxe para os lados abrindo os braços.\n3. Aperte as escápulas juntas.\n4. Retorne.","beneficios":"Corrige postura arredondada. Fortalece cadeia posterior dos ombros.","cuidados":"Cotovelos levemente dobrados. Braços na altura dos ombros.","material":"Faixa elástica.","obs":"Nível 1 — Pull Apart.","defaultSeries":"3","defaultReps":"15","defaultDescanso":"30s","tags":"mmss,puxar,postura,ombros,nível1","foto":""},
{"id":"pr45","nome":"Pulldown com Elástico","grupo":"MMSS","nivel":"Básico","momento":"Parte Principal","foco":"Latíssimo, Romboides e Bíceps","descricao":"Simulação do puxador alto com elástico. Fortalece o latíssimo.","execucao":"1. Elástico preso acima da cabeça.\n2. Puxe para baixo em direção ao peito, cotovelos descendo para os lados.\n3. Retorne controladamente.","beneficios":"Fortalece latíssimo. Melhora capacidade de puxar.","cuidados":"Core ativo. Não usar o corpo para puxar.","material":"Faixa elástica presa acima.","obs":"Nível 1–2 — Pulldown.","defaultSeries":"3","defaultReps":"12","defaultDescanso":"60s","tags":"mmss,puxar,latíssimo,costas,nível1","foto":""},
{"id":"pr46","nome":"Pullover com Halter","grupo":"MMSS","nivel":"Intermediário","momento":"Parte Principal","foco":"Latíssimo, Peitoral e Core","descricao":"Arco de ombros com halter sobre banco. Grande amplitude para latíssimo e peitoral.","execucao":"1. Escápulas apoiadas no banco.\n2. Halter leve com as duas mãos acima do peito.\n3. Leve para trás da cabeça em arco.\n4. Retorne contraindo o latíssimo.","beneficios":"Grande amplitude para latíssimo e peitoral.","cuidados":"Amplitude limitada pelo ombro. Peso leve.","material":"Halter leve. Banco.","obs":"Nível 1–2 — Pullover.","defaultSeries":"3","defaultReps":"10","defaultDescanso":"60s","tags":"mmss,puxar,latíssimo,peitoral,nível2","foto":""},
{"id":"pr47","nome":"Remada com Halter Apoiada","grupo":"MMSS","nivel":"Básico","momento":"Parte Principal","foco":"Latíssimo, Romboides e Bíceps","descricao":"Remada unilateral com apoio no banco. Posição estável para aprender.","execucao":"1. Apoie joelho e mão no banco.\n2. Halter na mão oposta, braço estendido.\n3. Puxe o halter em direção ao quadril.\n4. Desça lentamente.","beneficios":"Fortalece latíssimo unilateralmente. Posição estável.","cuidados":"Não rotar o tronco para puxar.","material":"Halter. Banco firme.","obs":"Nível 1 — Remada Halter.","defaultSeries":"3","defaultReps":"10 cada","defaultDescanso":"60s","tags":"mmss,puxar,costas,remada,nível1","foto":""},
{"id":"pr48","nome":"Remada Curvada com Halteres","grupo":"MMSS","nivel":"Intermediário","momento":"Parte Principal","foco":"Costas, Romboides e Bíceps","descricao":"Remada bilateral com tronco inclinado. Alta ativação das costas.","execucao":"1. Em pé, tronco inclinado 45°, halteres nas mãos.\n2. Puxe em direção ao abdome, cotovelos para trás.\n3. Aperte as escápulas. Desça lentamente.","beneficios":"Alta ativação de costas, romboides e bíceps.","cuidados":"Coluna neutra. Não usar o tronco para puxar.","material":"Halteres.","obs":"Nível 4 — Remada Halter.","defaultSeries":"3","defaultReps":"10","defaultDescanso":"60s","tags":"mmss,puxar,costas,remada curvada,nível4","foto":""},
{"id":"pr49","nome":"Remada Australiana","grupo":"MMSS","nivel":"Intermediário","momento":"Parte Principal","foco":"Costas, Romboides e Bíceps — Peso Corporal","descricao":"Remada com o corpo sob uma barra baixa. Progressão para a barra fixa.","execucao":"1. Deite sob barra baixa ou mesa resistente.\n2. Corpo rígido, puxe o peito em direção à barra.\n3. Desça lentamente.","beneficios":"Usa peso corporal. Excelente progressão para barra fixa.","cuidados":"Corpo completamente rígido.","material":"Barra baixa, mesa resistente ou TRX.","obs":"Nível 4 — Barra Assistida.","defaultSeries":"3","defaultReps":"8–10","defaultDescanso":"60s","tags":"mmss,puxar,australiana,barra,nível4","foto":""},
{"id":"pr50","nome":"Escapular na Barra","grupo":"MMSS","nivel":"Básico","momento":"Parte Principal","foco":"Escápulas e Manguito Rotador","descricao":"Ativação e controle das escápulas. Fundamental para saúde do ombro.","execucao":"1. Pendurado na barra (ou com elástico).\n2. Sem dobrar cotovelos, deprima as escápulas (ombros para baixo e para trás).\n3. Mantenha 3–5s. Relaxe.","beneficios":"Fortalece controle escapular. Fundamental para prevenção de lesões.","cuidados":"Movimento escapular puro, sem dobrar os cotovelos.","material":"Barra ou elástico acima.","obs":"Nível 1 — Escapular Barra.","defaultSeries":"3","defaultReps":"10 × 3–5s","defaultDescanso":"30s","tags":"mmss,puxar,escapular,manguito,nível1","foto":""},
{"id":"pr51","nome":"Prancha na Parede","grupo":"Core","nivel":"Básico","momento":"Parte Principal","foco":"Core Profundo e Estabilidade","descricao":"Prancha vertical contra a parede. Versão mais acessível para iniciantes.","execucao":"1. Mãos na parede, braços estendidos.\n2. Afaste os pés até o corpo ficar diagonal.\n3. Contraia abdome e glúteos. Corpo rígido.\n4. Mantenha 20–30s.","beneficios":"Ativa core profundo de forma segura.","cuidados":"Corpo alinhado. Respirar normalmente.","material":"Parede.","obs":"Nível 1 — Prancha.","defaultSeries":"3","defaultReps":"20–30s","defaultDescanso":"30s","tags":"core,prancha,estabilidade,nível1","foto":""},
{"id":"pr52","nome":"Prancha nos Joelhos","grupo":"Core","nivel":"Básico","momento":"Parte Principal","foco":"Core Profundo e Lombar","descricao":"Prancha clássica com apoio nos joelhos. Progressão entre parede e tradicional.","execucao":"1. Apoio nos antebraços e nos joelhos.\n2. Corpo em linha reta dos joelhos à cabeça.\n3. Contraia abdome e glúteos.\n4. Mantenha 20–40s.","beneficios":"Fortalece core progressivamente.","cuidados":"Não elevar o quadril. Pescoço neutro.","material":"Tapete.","obs":"Nível 3 — Prancha.","defaultSeries":"3","defaultReps":"20–40s","defaultDescanso":"30s","tags":"core,prancha,estabilidade,nível2","foto":""},
{"id":"pr53","nome":"Prancha Lateral na Parede","grupo":"Core","nivel":"Básico","momento":"Parte Principal","foco":"Oblíquos e Estabilidade Lateral","descricao":"Prancha lateral vertical contra a parede. Versão acessível para estabilidade lateral.","execucao":"1. De lado para a parede, braço estendido com a mão na parede.\n2. Afaste os pés até o corpo ficar diagonal.\n3. Corpo rígido, quadril levantado.\n4. 20–30s cada lado.","beneficios":"Ativa oblíquos de forma segura.","cuidados":"Quadril elevado. Não dobrar lateralmente.","material":"Parede.","obs":"Nível 1 — Prancha Lateral.","defaultSeries":"3","defaultReps":"20–30s cada","defaultDescanso":"30s","tags":"core,prancha lateral,oblíquos,nível1","foto":""},
{"id":"pr54","nome":"Prancha Lateral nos Joelhos","grupo":"Core","nivel":"Básico","momento":"Parte Principal","foco":"Oblíquos e Estabilidade Lateral","descricao":"Prancha lateral com apoio no joelho. Menor demanda que a prancha lateral completa.","execucao":"1. Apoio no antebraço e no joelho.\n2. Eleve o quadril até o corpo formar linha reta joelho-ombro.\n3. Core contraído.\n4. 20–40s cada lado.","beneficios":"Fortalece oblíquos com menor demanda.","cuidados":"Quadril nivelado. Respirar normalmente.","material":"Tapete.","obs":"Nível 2 — Prancha Lateral.","defaultSeries":"3","defaultReps":"20–40s cada","defaultDescanso":"30s","tags":"core,prancha lateral,oblíquos,nível2","foto":""},
{"id":"pr55","nome":"Bird Dog","grupo":"Core","nivel":"Básico","momento":"Parte Principal","foco":"Core, Glúteos e Estabilidade Lombar","descricao":"Extensão oposta de braço e perna nos quatro apoios. Excelente para controle motor e dor lombar.","execucao":"1. Quatro apoios, costas paralelas ao chão.\n2. Estenda o braço direito e a perna esquerda simultaneamente.\n3. Quadril nivelado, core contraído.\n4. Segure 2–3s. Alterne.","beneficios":"Ativa core profundo e glúteos. Melhora controle motor lombar.","cuidados":"Quadril não roda ou sobe. Movimento lento.","material":"Tapete.","obs":"Nível 3 — Bird Dog.","defaultSeries":"3","defaultReps":"8–10 cada","defaultDescanso":"30s","tags":"core,bird dog,glúteos,lombar,nível3","foto":""},
{"id":"pr56","nome":"Dead Bug","grupo":"Core","nivel":"Intermediário","momento":"Parte Principal","foco":"Core Profundo, Coordenação e Estabilidade","descricao":"Extensão oposta de braço e perna deitado. Treina o core profundo com dissociação.","execucao":"1. Deitado, braços para o teto, quadril e joelhos a 90°.\n2. Abaixe o braço direito para trás e a perna esquerda para o chão.\n3. Expire ao abaixar — lombar no chão.\n4. Retorne e alterne.","beneficios":"Forte ativação do transverso. Seguro para a coluna.","cuidados":"Lombar no chão durante todo o movimento. Expirar ao abaixar.","material":"Tapete.","obs":"Nível 2–3 — Dead Bug.","defaultSeries":"3","defaultReps":"6–8 cada","defaultDescanso":"30s","tags":"core,dead bug,coordenação,lombar,nível3","foto":""},
{"id":"pr57","nome":"Pallof Press com Elástico","grupo":"Core","nivel":"Intermediário","momento":"Parte Principal","foco":"Core Anti-Rotação","descricao":"Press frontal contra resistência rotacional do elástico. Treina o core anti-rotação.","execucao":"1. Elástico lateral na altura do peito.\n2. De lado ao ponto de fixação, segure com as duas mãos.\n3. Empurre os braços para frente resistindo à rotação.\n4. Segure 2s. Retorne.","beneficios":"Fortalece o core para resistir à rotação.","cuidados":"Quadris voltados para frente. Não girar o tronco.","material":"Faixa elástica lateral.","obs":"Nível 2 — Pallof Press.","defaultSeries":"3","defaultReps":"10 cada","defaultDescanso":"30s","tags":"core,anti-rotação,estabilidade,nível2","foto":""},
