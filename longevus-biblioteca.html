      <div style={{background:"#fff",borderBottom:"1.5px solid #e2e8f0",padding:"10px 15px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <a href="longevus-programa.html" style={{display:"flex",alignItems:"center",justifyContent:"center",width:32,height:32,borderRadius:8,background:"#f8fafc",border:"1px solid #e2e8f0",textDecoration:"none",color:"#0f172a",fontSize:18,fontWeight:700}}>&#8592;</a><img src={__LOGO__} alt="Longevus" style={{height:34,width:"auto",objectFit:"contain"}}/>
          <div><div style={{fontWeight:800,fontSize:14}}>Longevus</div><div style={{fontSize:10,color:"#94a3b8"}}>Biblioteca · {biblioteca.length} exercícios</div></div>
        </div>
        <div style={{display:"flex",gap:6}}><Btn sm variant="ghost" onClick={()=>{if(window.confirm("Resetar biblioteca? Isso carregará todos os 175 exercícios. Exercícios personalizados serão perdidos.")){localStorage.removeItem("longevus_biblioteca");window.location.reload();}}}>🔄</Btn><Btn sm onClick={()=>{setEditEx(null);setModal("form");}}>+ Novo</Btn></div>
      </div>
      <div style={{padding:"14px 13px",maxWidth:640,margin:"0 auto",paddingBottom:90}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:12}}>
          {[["Total",biblioteca.length],["Grupos",[...new Set(biblioteca.map(e=>e.grupo))].length],["Com foto",biblioteca.filter(e=>e.foto).length]].map(([l,v])=>(<div key={l} style={{background:"#fff",border:"1.5px solid #e2e8f0",borderRadius:8,padding:"8px 4px",textAlign:"center"}}><div style={{fontSize:18,fontWeight:800,color:O}}>{v}</div><div style={{fontSize:9,color:"#94a3b8",marginTop:1}}>{l}</div></div>))}
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar nome, foco ou tag..." style={{width:"100%",padding:"8px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",background:"#fff",fontSize:13,fontFamily:"inherit",marginBottom:8}}/>
        <div style={{display:"flex",gap:4,marginBottom:7}}>
          {nOpts.map(n=>(<button key={n.v} onClick={()=>setFn(n.v)} style={{flex:1,border:`1.5px solid ${fn===n.v?O:"#e2e8f0"}`,background:fn===n.v?"#fff4ee":"#fff",borderRadius:7,padding:"5px 2px",fontSize:10,fontWeight:700,color:fn===n.v?O:"#64748b",cursor:"pointer"}}>{n.l}</button>))}
        </div>
        <div style={{marginBottom:6,overflowX:"auto",paddingBottom:3}}>
          <div style={{display:"flex",gap:4,minWidth:"max-content"}}>
            {grupos.map(g=>(<button key={g} onClick={()=>setFg(g)} style={{border:`1.5px solid ${fg===g?O:"#e2e8f0"}`,background:fg===g?O:"#fff",borderRadius:99,padding:"4px 9px",fontSize:10,fontWeight:700,color:fg===g?"#fff":"#64748b",cursor:"pointer",whiteSpace:"nowrap"}}>{g}</button>))}
          </div>
        </div>
        <div style={{marginBottom:12,overflowX:"auto",paddingBottom:3}}>
          <div style={{display:"flex",gap:4,minWidth:"max-content"}}>
            {momentos.map(m=>(<button key={m} onClick={()=>setFm(m)} style={{border:`1.5px solid ${fm===m?"#6366f1":"#e2e8f0"}`,background:fm===m?"#6366f1":"#fff",borderRadius:99,padding:"4px 9px",fontSize:10,fontWeight:700,color:fm===m?"#fff":"#64748b",cursor:"pointer",whiteSpace:"nowrap"}}>{m}</button>))}
          </div>
        </div>
        <div style={{fontSize:10,color:"#94a3b8",marginBottom:9}}>{filtered.length} exercício{filtered.length!==1?"s":""} encontrado{filtered.length!==1?"s":""}</div>
        {filtered.length===0?(<Card style={{textAlign:"center",padding:36}}><div style={{fontSize:32,marginBottom:8}}>📚</div><div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{biblioteca.length===0?"Biblioteca vazia":"Nenhum encontrado"}</div><div style={{color:"#94a3b8",fontSize:11,marginBottom:14}}>{biblioteca.length===0?"Cadastre exercícios.":"Tente outra busca."}</div>{biblioteca.length===0&&<Btn onClick={()=>{setEditEx(null);setModal("form");}}>Cadastrar primeiro</Btn>}</Card>):filtered.map(ex=>(<ExCard key={ex.id} ex={ex} onEdit={ex=>{setEditEx(ex);setModal("form");}} onDelete={delEx} onView={ex=>{setVerEx(ex);setModal("ver");}}/>))}
      </div>
    </div>
    {modal==="form"&&(<Modal title={editEx?"Editar Exercício":"Novo Exercício"} onClose={()=>{setModal(null);setEditEx(null);}}><ExForm initial={editEx} onSave={saveEx} onCancel={()=>{setModal(null);setEditEx(null);}}/></Modal>)}
    {modal==="ver"&&verEx&&(<ExDetalhe ex={verEx} onClose={()=>{setModal(null);setVerEx(null);}} onEdit={ex=>{setModal(null);setVerEx(null);setEditEx(ex);setModal("form");}}/>)}
    <NavBar active="biblioteca"/>
  </>);
}

function App(){
const [session,setSession]=useState(null);
const [authLoading,setAuthLoading]=useState(true);
useEffect(()=>{
supa.auth.getSession().then(({data})=>{ setSession(data?.session||null); setAuthLoading(false); });
const { data: listener } = supa.auth.onAuthStateChange((_event, sess)=>{ setSession(sess); });
return ()=>{ listener?.subscription?.unsubscribe(); };
},[]);
if (authLoading) {
return <div style={{ minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8",fontSize:14 }}>Carregando...</div>;
}
if (!session) {
return <Login onLogin={()=>{}}/>;
}
return <AppInner/>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
